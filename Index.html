function RelatoriosTab({ animals, production, romaneios, romaneioAnimais, avesLotes, avesProducao, avesMortalidade, avesRacao, avesVendas, avesVendasAnimais, profile }) {
  const isAdmin = profile?.role === "administrador";
  const acessos = isAdmin ? ["leite", "corte", "bezerro", "aves"] : profile?.acesso_rebanhos || [];
  const temLeite = isAdmin || acessos.includes("leite");
  const temCorte = isAdmin || acessos.includes("corte") || acessos.includes("bezerro");
  const temAves = isAdmin || acessos.includes("aves");

  const opcoes = [];
  if (temLeite) opcoes.push(["leite", "Leite"]);
  if (temCorte) opcoes.push(["corte", "Corte"]);
  if (temAves) opcoes.push(["aves", "Aves"]);

  const [subTab, setSubTab] = useState(opcoes[0] ? opcoes[0][0] : null);

  const pillStyle = (active) => ({
    background: active ? "#B8862E" : "#FFFFFF",
    color: active ? "#F5F2E9" : "#1F3324",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 20,
    padding: "6px 14px",
    fontSize: 12,
    fontWeight: 700,
    cursor: "pointer",
    whiteSpace: "nowrap",
  });

  if (opcoes.length === 0) {
    return (
      <div>
        <SectionTitle>Relatórios</SectionTitle>
        <EmptyState text="Você ainda não tem acesso a nenhum rebanho para gerar relatórios." />
      </div>
    );
  }

  return (
    <div>
      <SectionTitle>Relatórios</SectionTitle>
      <div style={{ display: "flex", gap: 8, marginTop: 12, marginBottom: 18, overflowX: "auto" }}>
        {opcoes.map(([id, label]) => (
          <button key={id} onClick={() => setSubTab(id)} style={pillStyle(subTab === id)}>
            {label}
          </button>
        ))}
      </div>
      {subTab === "leite" && <RelatorioLeiteSecao production={production} animals={animals} />}
      {subTab === "corte" && <RelatorioCorteSecao romaneios={romaneios} romaneioAnimais={romaneioAnimais} animals={animals} />}
      {subTab === "aves" && (
        <RelatorioAvesSecao
          lotes={avesLotes}
          producao={avesProducao}
          mortalidade={avesMortalidade}
          racao={avesRacao}
          vendasOvos={avesVendas}
          vendasAnimais={avesVendasAnimais}
        />
      )}
    </div>
  );
}

function usePeriodoRelatorio(inicioPadrao) {
  const hoje = todayISO();
  const inicioMes = hoje.slice(0, 8) + "01";
  const dia30atras = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 30);
    return d.toISOString().slice(0, 10);
  })();
  const [dataInicio, setDataInicio] = useState(inicioPadrao === "mes" ? inicioMes : dia30atras);
  const [dataFim, setDataFim] = useState(hoje);
  const preset = (ini) => {
    setDataInicio(ini);
    setDataFim(hoje);
  };
  const inRange = (d) => d && d >= dataInicio && d <= dataFim;
  const numDias = Math.max(1, Math.round((new Date(dataFim) - new Date(dataInicio)) / 86400000) + 1);
  return { hoje, inicioMes, dia30atras, dataInicio, setDataInicio, dataFim, setDataFim, preset, inRange, numDias };
}

function PeriodoBar({ periodo }) {
  const btn = (label, onClick, active) => (
    <button
      key={label}
      onClick={onClick}
      style={{
        background: active ? "#B8862E" : "#FFFFFF",
        color: active ? "#F5F2E9" : "#1F3324",
        border: "1px solid rgba(11,61,46,0.14)",
        borderRadius: 8,
        padding: "8px 12px",
        fontSize: 12,
        fontWeight: 700,
        cursor: "pointer",
        whiteSpace: "nowrap",
      }}
    >
      {label}
    </button>
  );
  return (
    <>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, overflowX: "auto" }}>
        {btn("30 dias", () => periodo.preset(periodo.dia30atras), periodo.dataInicio === periodo.dia30atras && periodo.dataFim === periodo.hoje)}
        {btn("Este mês", () => periodo.preset(periodo.inicioMes), periodo.dataInicio === periodo.inicioMes && periodo.dataFim === periodo.hoje)}
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
        <div style={{ flex: 1 }}>
          <Field label="De" type="date" value={periodo.dataInicio} onChange={periodo.setDataInicio} />
        </div>
        <div style={{ flex: 1 }}>
          <Field label="Até" type="date" value={periodo.dataFim} onChange={periodo.setDataFim} />
        </div>
      </div>
    </>
  );
}

function RelatorioLeiteSecao({ production, animals }) {
  const periodo = usePeriodoRelatorio("30dias");
  const fmtN = (n, casas = 1) => Number(n || 0).toFixed(casas);

  const producaoPeriodo = production.filter((p) => periodo.inRange(p.data));
  const totalLitros = producaoPeriodo.reduce((s, p) => s + Number(p.litros || 0), 0);
  const mediaDiaria = totalLitros / periodo.numDias;
  const vacasLactacao = animals.filter((a) => a.finalidade === "leite" && a.status === "lactacao").length;
  const mediaPorVaca = vacasLactacao > 0 ? mediaDiaria / vacasLactacao : 0;

  const porData = {};
  producaoPeriodo.forEach((p) => {
    porData[p.data] = (porData[p.data] || 0) + Number(p.litros || 0);
  });
  const datasOrdenadas = Object.keys(porData).sort();

  return (
    <div>
      <PeriodoBar periodo={periodo} />
      {producaoPeriodo.length === 0 ? (
        <EmptyState text="Nenhuma produção de leite lançada nesse período." />
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 22 }}>
            <IndicadorCard label="Produção total" value={`${fmtN(totalLitros)} L`} color="#3E7C99" />
            <IndicadorCard label="Média diária" value={`${fmtN(mediaDiaria)} L/dia`} color="#3E7C99" />
            <IndicadorCard label="Vacas em lactação" value={vacasLactacao} />
            <IndicadorCard label="Média por vaca" value={`${fmtN(mediaPorVaca)} L/dia`} />
          </div>
          <div style={{ height: 220, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 12 }}>
            <LineChartCanvasOnly labels={datasOrdenadas.map(formatDataBR)} valores={datasOrdenadas.map((d) => porData[d])} color="#3E7C99" />
          </div>
        </>
      )}
    </div>
  );
}

function RelatorioCorteSecao({ romaneios, romaneioAnimais, animals }) {
  const periodo = usePeriodoRelatorio("30dias");
  const fmtN = (n, casas = 1) => Number(n || 0).toFixed(casas);
  const fmtR = (n) => `R$ ${Number(n || 0).toFixed(2)}`;

  const romaneiosPeriodo = romaneios.filter((r) => periodo.inRange(r.data));
  const idsPeriodo = new Set(romaneiosPeriodo.map((r) => r.id));
  const linhasPeriodo = romaneioAnimais.filter((ra) => idsPeriodo.has(ra.romaneio_id));
  const animaisVendidos = linhasPeriodo.length;
  const pesoVivoVendido = romaneiosPeriodo.reduce((s, r) => s + Number(r.peso_total_vivo || 0), 0);
  const receita = romaneiosPeriodo.reduce((s, r) => s + Number(r.valor_liquido || 0), 0);
  const ticketMedio = animaisVendidos > 0 ? receita / animaisVendidos : null;

  const porData = {};
  romaneiosPeriodo.forEach((r) => {
    porData[r.data] = (porData[r.data] || 0) + Number(r.valor_liquido || 0);
  });
  const datasOrdenadas = Object.keys(porData).sort();

  return (
    <div>
      <PeriodoBar periodo={periodo} />
      {romaneiosPeriodo.length === 0 ? (
        <EmptyState text="Nenhuma venda de gado nesse período." />
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 22 }}>
            <IndicadorCard label="Animais vendidos" value={animaisVendidos} color="#B5453A" />
            <IndicadorCard label="Peso vivo vendido" value={`${fmtN(pesoVivoVendido, 0)} kg`} />
            <IndicadorCard label="Receita no período" value={fmtR(receita)} color="#5BAA47" />
            <IndicadorCard label="Ticket médio por animal" value={ticketMedio != null ? fmtR(ticketMedio) : "—"} />
          </div>
          <div style={{ height: 220, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 12 }}>
            <LineChartCanvasOnly labels={datasOrdenadas.map(formatDataBR)} valores={datasOrdenadas.map((d) => porData[d])} color="#B5453A" />
          </div>
        </>
      )}
    </div>
  );
}

function RelatorioAvesSecao({ lotes, producao, mortalidade, racao, vendasOvos, vendasAnimais }) {
  const periodo = usePeriodoRelatorio("30dias");
  const fmtN = (n, casas = 1) => Number(n || 0).toFixed(casas);
  const fmtR = (n) => `R$ ${Number(n || 0).toFixed(2)}`;

  // Postura
  const producaoPeriodo = producao.filter((p) => periodo.inRange(p.data));
  const totalOvos = producaoPeriodo.reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
  const mediaDiariaOvos = totalOvos / periodo.numDias;
  const taxas = producaoPeriodo
    .map((p) => {
      const lote = lotes.find((l) => l.id === p.lote_id);
      if (!lote || !lote.quantidade_alojada) return null;
      return (Number(p.quantidade_ovos) / Number(lote.quantidade_alojada)) * 100;
    })
    .filter((t) => t != null);
  const taxaMedia = taxas.length > 0 ? taxas.reduce((s, t) => s + t, 0) / taxas.length : null;

  // Mortalidade
  const mortalidadePeriodo = mortalidade.filter((m) => periodo.inRange(m.data));
  const totalMortes = mortalidadePeriodo.reduce((s, m) => s + Number(m.quantidade || 0), 0);
  const totalAlojado = lotes.reduce((s, l) => s + Number(l.quantidade_alojada || 0), 0);
  const taxaMortalidade = totalAlojado > 0 ? (totalMortes / totalAlojado) * 100 : null;

  // Ração
  const racaoPeriodo = racao.filter((r) => periodo.inRange(r.data));
  const totalRacaoKg = racaoPeriodo.reduce((s, r) => s + Number(r.quantidade_kg || 0), 0);

  // Vendas de ovos
  const vendasOvosPeriodo = vendasOvos.filter((v) => periodo.inRange(v.data));
  const totalDuzias = vendasOvosPeriodo.reduce((s, v) => s + Number(v.quantidade_duzias || 0), 0);
  const receitaOvos = vendasOvosPeriodo.reduce((s, v) => s + Number(v.valor_total || 0), 0);

  // Vendas de aves
  const vendasAnimaisPeriodo = (vendasAnimais || []).filter((v) => periodo.inRange(v.data));
  const totalAvesVendidas = vendasAnimaisPeriodo.reduce((s, v) => s + Number(v.quantidade || 0), 0);
  const receitaAves = vendasAnimaisPeriodo.reduce((s, v) => s + Number(v.valor_total || 0), 0);

  const receitaTotal = receitaOvos + receitaAves;

  const porData = {};
  producaoPeriodo.forEach((p) => {
    porData[p.data] = (porData[p.data] || 0) + Number(p.quantidade_ovos || 0);
  });
  const datasOrdenadas = Object.keys(porData).sort();

  const semDados = producaoPeriodo.length === 0 && mortalidadePeriodo.length === 0 && racaoPeriodo.length === 0 && vendasOvosPeriodo.length === 0 && vendasAnimaisPeriodo.length === 0;

  return (
    <div>
      <PeriodoBar periodo={periodo} />
      {semDados ? (
        <EmptyState text="Nenhum lançamento de aves nesse período." />
      ) : (
        <>
          <IndicadoresGrupo titulo="Postura">
            <IndicadorCard label="Ovos coletados" value={totalOvos} color="#8C6A3F" />
            <IndicadorCard label="Média diária" value={`${fmtN(mediaDiariaOvos)} ovos/dia`} color="#8C6A3F" />
            <IndicadorCard label="Taxa de postura média" value={taxaMedia != null ? `${fmtN(taxaMedia)}%` : "—"} />
          </IndicadoresGrupo>

          <IndicadoresGrupo titulo="Mortalidade e ração">
            <IndicadorCard label="Aves mortas no período" value={totalMortes} color="#B5453A" />
            <IndicadorCard label="Taxa de mortalidade" value={taxaMortalidade != null ? `${fmtN(taxaMortalidade)}%` : "—"} sub="Sobre o total alojado nos lotes" />
            <IndicadorCard label="Ração consumida" value={`${fmtN(totalRacaoKg, 0)} kg`} />
          </IndicadoresGrupo>

          <IndicadoresGrupo titulo="Vendas">
            <IndicadorCard label="Ovos vendidos" value={`${fmtN(totalDuzias, 0)} dúzias`} sub={fmtR(receitaOvos)} color="#5BAA47" />
            <IndicadorCard label="Aves vendidas" value={totalAvesVendidas} sub={fmtR(receitaAves)} color="#5BAA47" />
            <IndicadorCard label="Receita total de aves" value={fmtR(receitaTotal)} color="#5BAA47" />
          </IndicadoresGrupo>

          {datasOrdenadas.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.03em" }}>
                Evolução da postura
              </div>
              <div style={{ height: 220, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 12 }}>
                <LineChartCanvasOnly labels={datasOrdenadas.map(formatDataBR)} valores={datasOrdenadas.map((d) => porData[d])} color="#8C6A3F" />
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ---------------- PAINEL DE INDICADORES ----------------
function IndicadorCard({ label, value, sub, color }) {
  return (
    <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "14px 16px" }}>
      <div style={{ fontSize: 11, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, fontWeight: 700, color: color || "#1F3324" }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function IndicadoresGrupo({ titulo, children }) {
  return (
    <div style={{ marginBottom: 22 }}>
      <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.03em" }}>{titulo}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>{children}</div>
    </div>
  );
}

function IndicadoresTab({
  animals,
  production,
  financeiro,
  entregas,
  romaneios,
  romaneioAnimais,
  pesagens,
  tratosConfinamento,
  lotesConfinamento,
  healthRecords,
  protocolos,
  avesVendas,
  insumos,
  comprasInsumos,
  pagamentosMaoObra,
}) {
  const hoje = todayISO();
  const inicioMes = hoje.slice(0, 8) + "01";
  const inicioAno = hoje.slice(0, 4) + "-01-01";
  const dia30atras = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 30);
    return d.toISOString().slice(0, 10);
  })();

  const [dataInicio, setDataInicio] = useState(inicioMes);
  const [dataFim, setDataFim] = useState(hoje);
  const [valorArrobaAtual, setValorArrobaAtual] = useState("");
  const [rendimentoAtual, setRendimentoAtual] = useState("50");

  const preset = (ini) => {
    setDataInicio(ini);
    setDataFim(hoje);
  };

  const inRange = (d) => d && d >= dataInicio && d <= dataFim;
  const numDias = Math.max(1, Math.round((new Date(dataFim) - new Date(dataInicio)) / 86400000) + 1);

  const fmtN = (n, casas = 1) => Number(n || 0).toFixed(casas);
  const fmtR = (n) => `R$ ${Number(n || 0).toFixed(2)}`;

  // ---------- REBANHO GERAL ----------
  const ativos = animals.filter((a) => !["vendida", "morta", "abatido"].includes(a.status));
  const porFinalidade = { leite: 0, corte: 0, bezerro: 0 };
  ativos.forEach((a) => {
    porFinalidade[a.finalidade] = (porFinalidade[a.finalidade] || 0) + 1;
  });
  const comprasPeriodo = animals.filter((a) => inRange(a.data_compra));
  const investimentoPeriodo = comprasPeriodo.reduce((s, a) => s + Number(a.valor_compra || 0), 0);

  const ativosComValor = ativos.filter((a) => a.valor_compra != null);
  const valorTotalPlantel = ativosComValor.reduce((s, a) => s + Number(a.valor_compra), 0);
  const valorPorFinalidade = { leite: 0, corte: 0, bezerro: 0 };
  ativosComValor.forEach((a) => {
    valorPorFinalidade[a.finalidade] = (valorPorFinalidade[a.finalidade] || 0) + Number(a.valor_compra);
  });

  // ---------- LEITE ----------
  const producaoPeriodo = production.filter((p) => inRange(p.data));
  const totalLitros = producaoPeriodo.reduce((s, p) => s + Number(p.litros || 0), 0);
  const mediaDiariaLeite = totalLitros / numDias;
  const vacasLactacao = animals.filter((a) => a.finalidade === "leite" && a.status === "lactacao").length;
  const mediaPorVaca = vacasLactacao > 0 ? mediaDiariaLeite / vacasLactacao : 0;

  const ciclosPeriodo = financeiro.filter((f) => f.data <= dataFim && (f.data_fim || f.data) >= dataInicio);
  const receitaLeite = ciclosPeriodo.reduce((s, f) => s + Number(f.valor_total || 0), 0);
  const recebidoLeite = ciclosPeriodo.reduce((s, f) => s + Number(f.valor_recebido || 0), 0);
  const litrosFaturados = ciclosPeriodo.reduce((s, f) => s + Number(f.litros_entregues || 0), 0);
  const precoMedioLitro = litrosFaturados > 0 ? receitaLeite / litrosFaturados : null;

  const entregasPeriodo = entregas.filter((e) => inRange(e.data));
  const totalEntregue = entregasPeriodo.reduce((s, e) => s + Number(e.litros_entregues || 0), 0);

  // ---------- CORTE / CONFINAMENTO ----------
  const romaneiosPeriodo = romaneios.filter((r) => inRange(r.data));
  const romaneioIdsPeriodo = new Set(romaneiosPeriodo.map((r) => r.id));
  const linhasVendidasPeriodo = romaneioAnimais.filter((ra) => romaneioIdsPeriodo.has(ra.romaneio_id));
  const animaisVendidos = linhasVendidasPeriodo.length;
  const pesoVivoVendido = romaneiosPeriodo.reduce((s, r) => s + Number(r.peso_total_vivo || 0), 0);
  const receitaVendaGado = romaneiosPeriodo.reduce((s, r) => s + Number(r.valor_liquido || 0), 0);
  const romaneiosArroba = romaneiosPeriodo.filter((r) => r.tipo_venda === "arroba" && r.valor_arroba);
  const arrobaMedia = romaneiosArroba.length > 0 ? romaneiosArroba.reduce((s, r) => s + Number(r.valor_arroba), 0) / romaneiosArroba.length : null;
  const custoAquisicaoVendidos = linhasVendidasPeriodo.reduce((s, l) => {
    const animal = animals.find((a) => a.id === l.animal_id);
    return s + (animal && animal.valor_compra != null ? Number(animal.valor_compra) : 0);
  }, 0);
  const lucroCorte = receitaVendaGado - custoAquisicaoVendidos;

  const lotesAbertos = lotesConfinamento.filter((l) => !l.data_saida);
  const animaisConfinados = lotesAbertos.reduce((s, l) => s + Number(l.quantidade_animais || 0), 0);
  const kgTratoPeriodo = tratosConfinamento.filter((t) => inRange(t.data)).reduce((s, t) => s + Number(t.quantidade_kg || 0), 0);
  const consumoPorCabecaDia = animaisConfinados > 0 ? kgTratoPeriodo / animaisConfinados / numDias : null;

  const animaisCorteBezerro = animals.filter((a) => (a.finalidade === "corte" || a.finalidade === "bezerro") && !["vendida", "morta", "abatido"].includes(a.status));
  const pesagensPeriodo = pesagens.filter((p) => inRange(p.data));
  const rankingGanho = computeGanhoPesoRanking(animaisCorteBezerro, pesagensPeriodo);
  const gpdMedio = rankingGanho.length > 0 ? rankingGanho.reduce((s, r) => s + r.gpd, 0) / rankingGanho.length : null;

  const arrobaParaEstimativa = valorArrobaAtual !== "" ? Number(valorArrobaAtual) : arrobaMedia;
  const rendimentoParaEstimativa = Number(rendimentoAtual) || 50;
  const animaisCorteAtivos = animals.filter((a) => (a.finalidade === "corte" || a.finalidade === "bezerro") && !["vendida", "morta", "abatido"].includes(a.status));
  const pesoAtualAnimal = (a) => {
    const registros = pesagens.filter((p) => p.animal_id === a.id).sort((x, y) => (x.data < y.data ? 1 : -1));
    if (registros.length > 0) return Number(registros[0].peso);
    if (a.peso_compra != null) return Number(a.peso_compra);
    if (a.peso_nascimento != null) return Number(a.peso_nascimento);
    return null;
  };
  const animaisComPeso = animaisCorteAtivos.map((a) => ({ a, peso: pesoAtualAnimal(a) })).filter((x) => x.peso != null);
  const valorEstimadoPlantelCorte =
    arrobaParaEstimativa != null
      ? animaisComPeso.reduce((s, { peso }) => s + (peso * (rendimentoParaEstimativa / 100)) / 15 * arrobaParaEstimativa, 0)
      : null;

  // ---------- SANIDADE ----------
  const ocorrenciasPeriodo = healthRecords.filter((h) => inRange(h.data));
  const nomesProtocolos = protocolos.map((p) => p.nome.toLowerCase());
  const vacinacoesPeriodo = ocorrenciasPeriodo.filter((h) => nomesProtocolos.includes((h.tipo || "").toLowerCase()));

  const btnPreset = (label, onClick, active) => (
    <button
      onClick={onClick}
      style={{
        background: active ? "#B8862E" : "#FFFFFF",
        color: active ? "#F5F2E9" : "#1F3324",
        border: "1px solid rgba(11,61,46,0.14)",
        borderRadius: 8,
        padding: "8px 12px",
        fontSize: 12,
        fontWeight: 700,
        cursor: "pointer",
        whiteSpace: "nowrap",
      }}
    >
      {label}
    </button>
  );

  return (
    <div>
      <SectionTitle>Painel de indicadores</SectionTitle>

      <div style={{ display: "flex", gap: 8, marginTop: 12, marginBottom: 12, overflowX: "auto" }}>
        {btnPreset("Este mês", () => preset(inicioMes), dataInicio === inicioMes && dataFim === hoje)}
        {btnPreset("Últimos 30 dias", () => preset(dia30atras), dataInicio === dia30atras && dataFim === hoje)}
        {btnPreset("Este ano", () => preset(inicioAno), dataInicio === inicioAno && dataFim === hoje)}
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <div style={{ flex: 1 }}>
          <Field label="De" type="date" value={dataInicio} onChange={setDataInicio} />
        </div>
        <div style={{ flex: 1 }}>
          <Field label="Até" type="date" value={dataFim} onChange={setDataFim} />
        </div>
      </div>

      <IndicadoresGrupo titulo="Rebanho">
        <IndicadorCard label="Animais ativos" value={ativos.length} sub={`${porFinalidade.leite || 0} leite • ${porFinalidade.corte || 0} corte • ${porFinalidade.bezerro || 0} bezerro`} />
        <IndicadorCard label="Compras no período" value={comprasPeriodo.length} sub={fmtR(investimentoPeriodo) + " investidos"} color="#3E7C99" />
        <IndicadorCard
          label="Valor do plantel"
          value={fmtR(valorTotalPlantel)}
          sub={`${ativosComValor.length} de ${ativos.length} animais com valor de compra registrado`}
          color="#B8862E"
        />
        <IndicadorCard
          label="Valor por categoria"
          value={fmtR(valorPorFinalidade.leite || 0) + " leite"}
          sub={`${fmtR(valorPorFinalidade.corte || 0)} corte • ${fmtR(valorPorFinalidade.bezerro || 0)} bezerro`}
        />
      </IndicadoresGrupo>

      <IndicadoresGrupo titulo="Leite">
        <IndicadorCard label="Produção total" value={`${fmtN(totalLitros)} L`} color="#B8862E" />
        <IndicadorCard label="Média diária" value={`${fmtN(mediaDiariaLeite)} L/dia`} color="#B8862E" />
        <IndicadorCard label="Vacas em lactação" value={vacasLactacao} />
        <IndicadorCard label="Média por vaca" value={`${fmtN(mediaPorVaca)} L/dia`} />
        <IndicadorCard label="Preço médio do litro" value={precoMedioLitro != null ? fmtR(precoMedioLitro) : "—"} color="#5BAA47" />
        <IndicadorCard label="Receita (ciclos no período)" value={fmtR(receitaLeite)} sub={`Recebido: ${fmtR(recebidoLeite)}`} color="#5BAA47" />
        <IndicadorCard label="Entregue ao comprador" value={`${fmtN(totalEntregue)} L`} sub={totalLitros > 0 ? `${fmtN((totalEntregue / totalLitros) * 100, 0)}% da produção` : ""} />
      </IndicadoresGrupo>

      <IndicadoresGrupo titulo="Corte e confinamento">
        <IndicadorCard label="Animais vendidos" value={animaisVendidos} sub={`${fmtN(pesoVivoVendido)} kg vivo`} color="#B5453A" />
        <IndicadorCard label="Receita de vendas" value={fmtR(receitaVendaGado)} color="#5BAA47" />
        <IndicadorCard label="Valor médio da arroba" value={arrobaMedia != null ? fmtR(arrobaMedia) : "—"} />
        <IndicadorCard
          label="Lucro estimado nas vendas"
          value={fmtR(lucroCorte)}
          sub="Receita − custo de compra"
          color={lucroCorte >= 0 ? "#5BAA47" : "#B5453A"}
        />
        <IndicadorCard label="Animais confinados hoje" value={animaisConfinados} sub={`${lotesAbertos.length} lote(s) aberto(s)`} />
        <IndicadorCard label="Trato lançado no período" value={`${fmtN(kgTratoPeriodo, 0)} kg`} sub={consumoPorCabecaDia != null ? `${fmtN(consumoPorCabecaDia)} kg/cabeça/dia` : ""} />
        <IndicadorCard label="Ganho de peso médio" value={gpdMedio != null ? `${fmtN(gpdMedio, 2)} kg/dia` : "—"} sub={`${rankingGanho.length} animal(is) com pesagem no período`} />
      </IndicadoresGrupo>

      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.03em" }}>
          Valor estimado do gado de corte hoje
        </div>
        <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <Field
              label="Valor da arroba hoje (R$)"
              type="number"
              value={valorArrobaAtual}
              onChange={setValorArrobaAtual}
              placeholder={arrobaMedia != null ? fmtN(arrobaMedia, 2) : "0.00"}
            />
          </div>
          <div style={{ flex: 1 }}>
            <Field label="Rendimento de carcaça (%)" type="number" value={rendimentoAtual} onChange={setRendimentoAtual} placeholder="50" />
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <IndicadorCard
            label="Valor estimado do plantel de corte"
            value={valorEstimadoPlantelCorte != null ? fmtR(valorEstimadoPlantelCorte) : "Informe a arroba"}
            sub={`${animaisComPeso.length} de ${animaisCorteAtivos.length} animais com peso conhecido`}
            color="#B8862E"
          />
          <IndicadorCard
            label="Peso vivo total do plantel"
            value={`${fmtN(animaisComPeso.reduce((s, { peso }) => s + peso, 0), 0)} kg`}
            sub="Última pesagem, ou peso de compra/nascimento"
          />
        </div>
        {valorArrobaAtual === "" && arrobaMedia == null && (
          <div style={{ fontSize: 11, color: "#B5453A", marginTop: 8 }}>
            Informe o valor da arroba hoje para calcular (ainda não há vendas registradas no período para sugerir um valor).
          </div>
        )}
      </div>

      <IndicadoresGrupo titulo="Sanidade">
        <IndicadorCard label="Ocorrências registradas" value={ocorrenciasPeriodo.length} />
        <IndicadorCard label="Vacinações aplicadas" value={vacinacoesPeriodo.length} />
      </IndicadoresGrupo>

      {(() => {
        const comprasPeriodoInsumos = (comprasInsumos || []).filter((c) => inRange(c.data));
        const pagamentosPeriodoMaoObra = (pagamentosMaoObra || []).filter((p) => inRange(p.data));
        const custoPorCategoria = { leite: 0, corte: 0, bezerro: 0, aves: 0, geral: 0 };
        comprasPeriodoInsumos.forEach((c) => {
          custoPorCategoria[c.categoria_animal || "geral"] = (custoPorCategoria[c.categoria_animal || "geral"] || 0) + Number(c.valor_total || 0);
        });
        const maoObraPorCategoria = { leite: 0, corte: 0, bezerro: 0, aves: 0, geral: 0 };
        pagamentosPeriodoMaoObra.forEach((p) => {
          maoObraPorCategoria[p.categoria_animal || "geral"] = (maoObraPorCategoria[p.categoria_animal || "geral"] || 0) + Number(p.valor || 0);
        });
        const receitaAvesPeriodo = (avesVendas || []).filter((v) => inRange(v.data)).reduce((s, v) => s + Number(v.valor_total || 0), 0);
        const lucroLeite = receitaLeite - custoPorCategoria.leite - maoObraPorCategoria.leite;
        const lucroCorteLiquido = receitaVendaGado - custoAquisicaoVendidos - custoPorCategoria.corte - maoObraPorCategoria.corte;
        const lucroAves = receitaAvesPeriodo - custoPorCategoria.aves - maoObraPorCategoria.aves;
        return (
          <IndicadoresGrupo titulo="Custo x lucro por categoria (insumos + mão de obra)">
            <IndicadorCard
              label="Leite: custos (insumos + mão de obra)"
              value={fmtR(custoPorCategoria.leite + maoObraPorCategoria.leite)}
              sub={`Receita: ${fmtR(receitaLeite)}`}
            />
            <IndicadorCard label="Leite: lucro líquido" value={fmtR(lucroLeite)} color={lucroLeite >= 0 ? "#5BAA47" : "#B5453A"} />
            <IndicadorCard
              label="Corte: custos (insumos + mão de obra)"
              value={fmtR(custoPorCategoria.corte + maoObraPorCategoria.corte)}
              sub={`Receita: ${fmtR(receitaVendaGado)}`}
            />
            <IndicadorCard
              label="Corte: lucro líquido"
              value={fmtR(lucroCorteLiquido)}
              sub="Receita − compra dos animais − insumos − mão de obra"
              color={lucroCorteLiquido >= 0 ? "#5BAA47" : "#B5453A"}
            />
            <IndicadorCard
              label="Aves: custos (insumos + mão de obra)"
              value={fmtR(custoPorCategoria.aves + maoObraPorCategoria.aves)}
              sub={`Receita: ${fmtR(receitaAvesPeriodo)}`}
            />
            <IndicadorCard label="Aves: lucro líquido" value={fmtR(lucroAves)} color={lucroAves >= 0 ? "#5BAA47" : "#B5453A"} />
            <IndicadorCard
              label="Bezerro(a): custos (insumos + mão de obra)"
              value={fmtR(custoPorCategoria.bezerro + maoObraPorCategoria.bezerro)}
              sub="Sem venda direta (some ao virar corte)"
            />
            <IndicadorCard
              label="Custos gerais (não alocados)"
              value={fmtR(custoPorCategoria.geral + maoObraPorCategoria.geral)}
              sub="Insumos + mão de obra sem categoria específica"
            />
          </IndicadoresGrupo>
        );
      })()}
    </div>
  );
}

function TransferenciaLoteModal({ fazendas, animals, apiFetch, reload, setBanner, onClose }) {
  const [fazendaOrigem, setFazendaOrigem] = useState("todas");
  const [fazendaDestino, setFazendaDestino] = useState("");
  const [finalidadeFiltro, setFinalidadeFiltro] = useState("todos");
  const [selecionados, setSelecionados] = useState({});
  const [observacoes, setObservacoes] = useState("");
  const [saving, setSaving] = useState(false);

  const disponiveis = animals
    .filter((a) => !["vendida", "morta", "abatido"].includes(a.status))
    .filter((a) => fazendaOrigem === "todas" || (a.fazenda_id || "") === fazendaOrigem)
    .filter((a) => finalidadeFiltro === "todos" || a.finalidade === finalidadeFiltro)
    .filter((a) => a.fazenda_id !== fazendaDestino || fazendaDestino === "")
    .sort((a, b) => animalNome(a).localeCompare(animalNome(b)));

  const toggleAnimal = (id) => {
    setSelecionados((s) => {
      const n = { ...s };
      if (n[id]) delete n[id];
      else n[id] = true;
      return n;
    });
  };

  const marcarTodos = () => {
    const n = {};
    disponiveis.forEach((a) => (n[a.id] = true));
    setSelecionados(n);
  };

  const desmarcarTodos = () => setSelecionados({});

  const idsSelecionados = Object.keys(selecionados).filter((id) => selecionados[id]);

  const confirmar = async (e) => {
    e.preventDefault();
    if (!fazendaDestino) {
      setBanner({ type: "error", text: "Selecione a fazenda de destino." });
      return;
    }
    if (idsSelecionados.length === 0) {
      setBanner({ type: "error", text: "Selecione ao menos um animal para transferir." });
      return;
    }
    setSaving(true);
    try {
      const criado = await apiFetch(`/rest/v1/transferencias_lote`, {
        method: "POST",
        headers: { Prefer: "return=representation" },
        body: JSON.stringify({
          fazenda_destino_id: fazendaDestino,
          data: todayISO(),
          quantidade_animais: idsSelecionados.length,
          observacoes: observacoes || null,
        }),
      });
      const transferenciaId = criado[0].id;

      const itens = idsSelecionados.map((id) => {
        const animal = animals.find((a) => a.id === id);
        return { transferencia_id: transferenciaId, animal_id: id, fazenda_origem_id: animal ? animal.fazenda_id || null : null };
      });
      await apiFetch(`/rest/v1/transferencia_lote_animais`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify(itens),
      });

      await apiFetch(`/rest/v1/animals?id=in.(${idsSelecionados.join(",")})`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ fazenda_id: fazendaDestino }),
      });

      const nomeDestino = fazendas.find((f) => f.id === fazendaDestino)?.nome || "destino";
      setBanner({ type: "success", text: `${idsSelecionados.length} animal(is) transferido(s) para ${nomeDestino}.` });
      reload();
      onClose();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao transferir: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <div
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 16 }}
      onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 16, padding: 20, width: "100%", maxWidth: 480, maxHeight: "85vh", overflowY: "auto" }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 16 }}>Transferir animais em lote</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#6E7A61", cursor: "pointer" }}>
            <X size={20} />
          </button>
        </div>

        <form onSubmit={confirmar} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Fazenda de destino</span>
            <select
              value={fazendaDestino}
              onChange={(e) => setFazendaDestino(e.target.value)}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Selecione...</option>
              {fazendas.map((f) => (
                <option key={f.id} value={f.id}>
                  {f.nome}
                </option>
              ))}
            </select>
          </label>

          <div style={{ display: "flex", gap: 10 }}>
            <label style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Filtrar por fazenda atual</span>
              <select
                value={fazendaOrigem}
                onChange={(e) => setFazendaOrigem(e.target.value)}
                style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
              >
                <option value="todas">Todas</option>
                {fazendas.map((f) => (
                  <option key={f.id} value={f.id}>
                    {f.nome}
                  </option>
                ))}
              </select>
            </label>
            <label style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Filtrar por categoria</span>
              <select
                value={finalidadeFiltro}
                onChange={(e) => setFinalidadeFiltro(e.target.value)}
                style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
              >
                <option value="todos">Todas</option>
                {Object.entries(FINALIDADE_LABELS).map(([v, l]) => (
                  <option key={v} value={v}>
                    {l}
                  </option>
                ))}
              </select>
            </label>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
              Animais ({idsSelecionados.length} de {disponiveis.length} selecionado(s))
            </span>
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={marcarTodos} style={{ background: "none", border: "none", color: "#5BAA47", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                Marcar todos
              </button>
              <button type="button" onClick={desmarcarTodos} style={{ background: "none", border: "none", color: "#B5453A", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                Limpar
              </button>
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 260, overflowY: "auto" }}>
            {disponiveis.length === 0 && <EmptyState text="Nenhum animal encontrado com esses filtros." />}
            {disponiveis.map((a) => {
              const marcado = !!selecionados[a.id];
              const fazendaAtual = fazendas.find((f) => f.id === a.fazenda_id);
              return (
                <label
                  key={a.id}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    background: "#F5F2E9",
                    borderRadius: 8,
                    padding: "8px 10px",
                    border: marcado ? "1px solid #B8862E" : "1px solid rgba(11,61,46,0.12)",
                    cursor: "pointer",
                  }}
                >
                  <input type="checkbox" checked={marcado} onChange={() => toggleAnimal(a.id)} />
                  <div style={{ flex: 1, fontSize: 13 }}>
                    {animalNome(a)} <span style={{ color: "#6E7A61", fontSize: 11 }}>({FINALIDADE_LABELS[a.finalidade]})</span>
                  </div>
                  <span style={{ fontSize: 11, color: "#6E7A61" }}>{fazendaAtual ? fazendaAtual.nome : "Sem fazenda"}</span>
                </label>
              );
            })}
          </div>

          <Field label="Observações (opcional)" value={observacoes} onChange={setObservacoes} placeholder="Ex: transferência para engorda" />

          <SaveButton saving={saving} />
        </form>
      </div>
    </div>
  );
}

function ProgramasMelhoramentoSecao({ programas, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome: "", contato: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Informe o nome do programa." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/programas_melhoramento`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ nome: form.nome.trim(), contato: form.contato || null, observacoes: form.observacoes || null }),
      });
      setBanner({ type: "success", text: "Programa cadastrado." });
      setForm({ nome: "", contato: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (p) => {
    if (!window.confirm(`Excluir o programa "${p.nome}"?`)) return;
    try {
      await apiFetch(`/rest/v1/programas_melhoramento?id=eq.${p.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Programa excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Programas de melhoramento ({programas.length})</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome do programa" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: PMGZ, Girolando Leite, ANCP" required />
          <Field label="Contato (opcional)" value={form.contato} onChange={(v) => setForm({ ...form, contato: v })} placeholder="Telefone, e-mail ou responsável" />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {programas.length === 0 && <EmptyState text="Nenhum programa de melhoramento cadastrado ainda." />}
        {programas.map((p) => (
          <div key={p.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{p.nome}</div>
              {p.contato && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{p.contato}</div>}
            </div>
            <button onClick={() => excluir(p)} style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              Excluir
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function ComunicadosMelhoramentoSecao({ programas, comunicados, animals, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ programa_id: "", animal_id: "", tipo: "nascimento", data_evento: todayISO(), observacoes: "" });
  const [saving, setSaving] = useState(false);
  const [filtroStatus, setFiltroStatus] = useState("pendente");
  const [enviandoId, setEnviandoId] = useState(null);

  const animaisOrdenados = [...animals].sort((a, b) => animalNome(a).localeCompare(animalNome(b)));

  const submit = async (e) => {
    e.preventDefault();
    if (!form.programa_id) {
      setBanner({ type: "error", text: "Selecione o programa." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/comunicados_melhoramento`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          programa_id: form.programa_id,
          animal_id: form.animal_id || null,
          tipo: form.tipo,
          data_evento: form.data_evento,
          status: "pendente",
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Comunicado registrado." });
      setForm({ programa_id: form.programa_id, animal_id: "", tipo: "nascimento", data_evento: todayISO(), observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const marcarEnviado = async (c) => {
    setEnviandoId(c.id);
    try {
      await apiFetch(`/rest/v1/comunicados_melhoramento?id=eq.${c.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ status: "enviado", data_envio: todayISO() }),
      });
      setBanner({ type: "success", text: "Comunicado marcado como enviado." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro: " + err.message });
    } finally {
      setEnviandoId(null);
    }
  };

  const filtrados = comunicados.filter((c) => filtroStatus === "todos" || c.status === filtroStatus);
  const pendentesCount = comunicados.filter((c) => c.status === "pendente").length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>
          Comunicados ({pendentesCount} pendente{pendentesCount === 1 ? "" : "s"})
        </SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Programa</span>
            <select
              value={form.programa_id}
              onChange={(e) => setForm({ ...form, programa_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Selecione...</option>
              {programas.map((p) => (
                <option key={p.id} value={p.id}>
                  {p.nome}
                </option>
              ))}
            </select>
          </label>
          {programas.length === 0 && <div style={{ fontSize: 12, color: "#B8862E" }}>Cadastre um programa primeiro, na aba "Programas".</div>}

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Animal (opcional)</span>
            <select
              value={form.animal_id}
              onChange={(e) => setForm({ ...form, animal_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Não vincular a um animal específico</option>
              {animaisOrdenados.map((a) => (
                <option key={a.id} value={a.id}>
                  {animalNome(a)}
                </option>
              ))}
            </select>
          </label>

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Tipo de comunicado</span>
            <select
              value={form.tipo}
              onChange={(e) => setForm({ ...form, tipo: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              {Object.entries(TIPO_COMUNICADO_LABELS).map(([v, l]) => (
                <option key={v} value={v}>
                  {l}
                </option>
              ))}
            </select>
          </label>

          <Field label="Data do evento" type="date" value={form.data_evento} onChange={(v) => setForm({ ...form, data_evento: v })} required />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ display: "flex", gap: 8, marginTop: 16, marginBottom: 12 }}>
        {["pendente", "enviado", "todos"].map((s) => (
          <button
            key={s}
            onClick={() => setFiltroStatus(s)}
            style={{
              background: filtroStatus === s ? "#B8862E" : "#F5F2E9",
              color: filtroStatus === s ? "#F5F2E9" : "#6E7A61",
              border: "1px solid rgba(11,61,46,0.14)",
              borderRadius: 8,
              padding: "6px 12px",
              fontSize: 12,
              fontWeight: 700,
              cursor: "pointer",
              textTransform: "capitalize",
            }}
          >
            {s}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {filtrados.length === 0 && <EmptyState text="Nenhum comunicado nessa categoria." />}
        {filtrados.map((c) => {
          const programa = programas.find((p) => p.id === c.programa_id);
          const animal = animals.find((a) => a.id === c.animal_id);
          return (
            <div key={c.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{TIPO_COMUNICADO_LABELS[c.tipo] || c.tipo}</div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {programa ? programa.nome : "Programa removido"} {animal ? `• ${animalNome(animal)}` : ""} • Evento em {formatDataBR(c.data_evento)}
                  </div>
                </div>
                <Badge color={c.status === "enviado" ? "#5BAA47" : "#B8862E"}>{c.status === "enviado" ? "Enviado" : "Pendente"}</Badge>
              </div>
              {c.status === "enviado" && c.data_envio && <div style={{ fontSize: 11, color: "#5BAA47", marginTop: 6 }}>Enviado em {formatDataBR(c.data_envio)}</div>}
              {c.status === "pendente" && (
                <button
                  onClick={() => marcarEnviado(c)}
                  disabled={enviandoId === c.id}
                  style={{ marginTop: 10, width: "100%", background: "rgba(124,154,92,0.15)", border: "1px solid #5BAA47", borderRadius: 8, padding: "8px 0", color: "#5BAA47", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  {enviandoId === c.id ? "Marcando..." : "Marcar como enviado"}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AvesLotesSecao({ lotes, producao, mortalidade, fazendas, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome: "", galpao: "", linhagem: "", data_alojamento: todayISO(), quantidade_alojada: "", idade_semanas_alojamento: "", fazenda_id: "", observacoes: "" });
  const [saving, setSaving] = useState(false);
  const [encerrandoId, setEncerrandoId] = useState(null);

  const lotesAtivos = lotes.filter((l) => l.status !== "encerrado").sort((a, b) => (a.data_alojamento < b.data_alojamento ? 1 : -1));
  const lotesEncerrados = lotes.filter((l) => l.status === "encerrado").sort((a, b) => (a.data_encerramento < b.data_encerramento ? 1 : -1));

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Dê um nome/código ao lote." });
      return;
    }
    if (!form.quantidade_alojada) {
      setBanner({ type: "error", text: "Informe a quantidade de aves alojadas." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/aves_lotes`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          nome: form.nome.trim(),
          galpao: form.galpao || null,
          linhagem: form.linhagem || null,
          data_alojamento: form.data_alojamento,
          quantidade_alojada: Number(form.quantidade_alojada),
          idade_semanas_alojamento: form.idade_semanas_alojamento !== "" ? Number(form.idade_semanas_alojamento) : null,
          fazenda_id: form.fazenda_id || null,
          status: "ativo",
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Lote de aves cadastrado." });
      setForm({ nome: "", galpao: "", linhagem: "", data_alojamento: todayISO(), quantidade_alojada: "", idade_semanas_alojamento: "", fazenda_id: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const encerrar = async (lote) => {
    if (!window.confirm(`Encerrar o lote "${lote.nome}"?`)) return;
    setEncerrandoId(lote.id);
    try {
      await apiFetch(`/rest/v1/aves_lotes?id=eq.${lote.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ status: "encerrado", data_encerramento: todayISO() }),
      });
      setBanner({ type: "success", text: "Lote encerrado." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao encerrar: " + err.message });
    } finally {
      setEncerrandoId(null);
    }
  };

  const mortesLote = (loteId) => mortalidade.filter((m) => m.lote_id === loteId).reduce((s, m) => s + Number(m.quantidade || 0), 0);
  const avesAtuais = (lote) => Number(lote.quantidade_alojada) - mortesLote(lote.id);
  const ovosHoje = (loteId) => {
    const hoje = todayISO();
    const r = producao.find((p) => p.lote_id === loteId && p.data === hoje);
    return r ? Number(r.quantidade_ovos) : null;
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Lotes de aves ({lotesAtivos.length} ativo(s))</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome / código do lote" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: Lote 7 - Galpão 2" required />
          <Field label="Galpão" value={form.galpao} onChange={(v) => setForm({ ...form, galpao: v })} placeholder="Ex: Galpão 2" />
          <Field label="Linhagem" value={form.linhagem} onChange={(v) => setForm({ ...form, linhagem: v })} placeholder="Ex: Lohmann, Hy-Line" />
          <Field label="Data de alojamento" type="date" value={form.data_alojamento} onChange={(v) => setForm({ ...form, data_alojamento: v })} required />
          <Field label="Quantidade de aves alojadas" type="number" value={form.quantidade_alojada} onChange={(v) => setForm({ ...form, quantidade_alojada: v })} placeholder="0" required />

          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {lotesAtivos.length === 0 && <EmptyState text="Nenhum lote de aves ativo no momento." />}
        {lotesAtivos.map((l) => {

          return (
            <div key={l.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>

                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {[l.galpao, fazenda ? fazenda.nome : null, l.linhagem].filter(Boolean).join(" • ")}
                  </div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    Alojado em {formatDataBR(l.data_alojamento)} • {avesAtuais(l)} aves atuais (de {l.quantidade_alojada})
                  </div>
                </div>
                <Badge color="#8C6A3F">{ovos != null ? `${ovos} ovos hoje` : "Sem postura hoje"}</Badge>
              </div>
              <button
                onClick={() => encerrar(l)}
                disabled={encerrandoId === l.id}
                style={{ marginTop: 10, width: "100%", background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "8px 0", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              >
                {encerrandoId === l.id ? "Encerrando..." : "Encerrar lote"}
              </button>
            </div>
          );
        })}

        {lotesEncerrados.length > 0 && (
          <>
            <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginTop: 12 }}>Encerrados recentemente</div>
            {lotesEncerrados.slice(0, 10).map((l) => (
              <div key={l.id} style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#6E7A61" }}>
                {l.nome} • {formatDataBR(l.data_alojamento)} a {formatDataBR(l.data_encerramento)}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function AvesPosturaLancarSecao({ lotes, producao, apiFetch, reload, setBanner }) {
  const [form, setForm] = useState({ lote_id: "", data: todayISO(), quantidade_ovos: "", ovos_quebrados: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const lotesAtivos = lotes.filter((l) => l.status !== "encerrado");

  const submit = async (e) => {
    e.preventDefault();
    if (!form.lote_id) {
      setBanner({ type: "error", text: "Selecione o lote." });
      return;
    }
    if (form.quantidade_ovos === "") {
      setBanner({ type: "error", text: "Informe a quantidade de ovos coletados." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/aves_producao`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          lote_id: form.lote_id,
          data: form.data,
          quantidade_ovos: Number(form.quantidade_ovos),
          ovos_quebrados: form.ovos_quebrados !== "" ? Number(form.ovos_quebrados) : 0,
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Postura registrada." });
      setForm({ lote_id: form.lote_id, data: todayISO(), quantidade_ovos: "", ovos_quebrados: "", observacoes: "" });
      reload();
    } catch (err) {
      const msg = err.message.includes("duplicate") ? "Já existe um lançamento de postura para esse lote nessa data." : err.message;
      setBanner({ type: "error", text: "Erro ao lançar: " + msg });
    } finally {
      setSaving(false);
    }
  };

  const historicoLote = producao.filter((p) => p.lote_id === form.lote_id).sort((a, b) => (a.data < b.data ? 1 : -1));
  const lote = lotes.find((l) => l.id === form.lote_id);
  const taxaPostura = (registro) => {
    if (!lote || !lote.quantidade_alojada) return null;
    return ((Number(registro.quantidade_ovos) / Number(lote.quantidade_alojada)) * 100).toFixed(1);
  };

  return (
    <div>
      <SectionTitle>Lançar postura do dia</SectionTitle>
      <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
        <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Lote</span>
          <select
            value={form.lote_id}
            onChange={(e) => setForm({ ...form, lote_id: e.target.value })}
            style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
          >
            <option value="">Selecione o lote...</option>
            {lotesAtivos.map((l) => (
              <option key={l.id} value={l.id}>
                {l.nome}
              </option>
            ))}
          </select>
        </label>
        {lotesAtivos.length === 0 && <div style={{ fontSize: 12, color: "#B8862E" }}>Nenhum lote ativo. Cadastre um na aba "Lotes" primeiro.</div>}
        <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
        <Field label="Ovos coletados" type="number" value={form.quantidade_ovos} onChange={(v) => setForm({ ...form, quantidade_ovos: v })} placeholder="0" required />
        <Field label="Ovos quebrados/trincados (opcional)" type="number" value={form.ovos_quebrados} onChange={(v) => setForm({ ...form, ovos_quebrados: v })} placeholder="0" />
        <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
        <SaveButton saving={saving} />
      </form>

      {form.lote_id && (
        <div style={{ marginTop: 20 }}>
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginBottom: 8 }}>Histórico deste lote</div>
          {historicoLote.length === 0 && <EmptyState text="Nenhuma postura lançada para este lote ainda." />}
          {historicoLote.map((p) => (
            <div key={p.id} style={{ display: "flex", justifyContent: "space-between", background: "#F5F2E9", borderRadius: 8, padding: "8px 12px", marginBottom: 6, fontSize: 13 }}>
              <span style={{ color: "#6E7A61" }}>{formatDataBR(p.data)}</span>
              <span style={{ fontWeight: 600 }}>
                {p.quantidade_ovos} ovos{taxaPostura(p) ? ` • ${taxaPostura(p)}%` : ""}
                {p.ovos_quebrados > 0 ? ` • ${p.ovos_quebrados} quebrados` : ""}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AvesEstatisticasSecao({ lotes, producao }) {
  const hoje = todayISO();
  const inicioMes = hoje.slice(0, 8) + "01";
  const dia7atras = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 7);
    return d.toISOString().slice(0, 10);
  })();
  const dia30atras = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 30);
    return d.toISOString().slice(0, 10);
  })();

  const [dataInicio, setDataInicio] = useState(dia30atras);
  const [dataFim, setDataFim] = useState(hoje);
  const [loteFiltro, setLoteFiltro] = useState("");

  const preset = (ini) => {
    setDataInicio(ini);
    setDataFim(hoje);
  };

  const inRange = (d) => d && d >= dataInicio && d <= dataFim;
  const numDias = Math.max(1, Math.round((new Date(dataFim) - new Date(dataInicio)) / 86400000) + 1);
  const fmtN = (n, casas = 1) => Number(n || 0).toFixed(casas);

  const lotesOrdenados = [...lotes].sort((a, b) => (a.data_alojamento < b.data_alojamento ? 1 : -1));

  const producaoPeriodo = producao.filter((p) => inRange(p.data) && (loteFiltro === "" || p.lote_id === loteFiltro));

  const totalOvos = producaoPeriodo.reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
  const totalQuebrados = producaoPeriodo.reduce((s, p) => s + Number(p.ovos_quebrados || 0), 0);
  const mediaDiaria = totalOvos / numDias;
  const totalBrutoOvos = totalOvos + totalQuebrados;
  const percQuebra = totalBrutoOvos > 0 ? (totalQuebrados / totalBrutoOvos) * 100 : null;

  const taxas = producaoPeriodo
    .map((p) => {
      const lote = lotes.find((l) => l.id === p.lote_id);
      if (!lote || !lote.quantidade_alojada) return null;
      return (Number(p.quantidade_ovos) / Number(lote.quantidade_alojada)) * 100;
    })
    .filter((t) => t != null);
  const taxaMedia = taxas.length > 0 ? taxas.reduce((s, t) => s + t, 0) / taxas.length : null;

  const melhorDia = producaoPeriodo.length > 0 ? producaoPeriodo.reduce((max, p) => (Number(p.quantidade_ovos) > Number(max.quantidade_ovos) ? p : max)) : null;

  // evolução diária (soma por data, cobrindo todos os lotes filtrados)
  const porData = {};
  producaoPeriodo.forEach((p) => {
    porData[p.data] = (porData[p.data] || 0) + Number(p.quantidade_ovos || 0);
  });
  const datasOrdenadas = Object.keys(porData).sort();
  const labelsEvolucao = datasOrdenadas.map((d) => formatDataBR(d));
  const valoresEvolucao = datasOrdenadas.map((d) => porData[d]);

  // ranking por lote (só faz sentido quando "todos os lotes" está selecionado)
  const rankingLotes = lotesOrdenados
    .map((l) => {
      const registros = producao.filter((p) => p.lote_id === l.id && inRange(p.data));
      if (registros.length === 0) return null;
      const total = registros.reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
      const taxaLote = l.quantidade_alojada ? (total / registros.length / Number(l.quantidade_alojada)) * 100 : null;
      return { lote: l, total, taxaLote, registros: registros.length };
    })
    .filter(Boolean)
    .sort((a, b) => b.total - a.total);

  const btnPreset = (label, onClick, active) => (
    <button
      key={label}
      onClick={onClick}
      style={{
        background: active ? "#8C6A3F" : "#FFFFFF",
        color: active ? "#F5F2E9" : "#1F3324",
        border: "1px solid rgba(11,61,46,0.14)",
        borderRadius: 8,
        padding: "8px 12px",
        fontSize: 12,
        fontWeight: 700,
        cursor: "pointer",
        whiteSpace: "nowrap",
      }}
    >
      {label}
    </button>
  );

  return (
    <div>
      <SectionTitle>Estatísticas de produção de ovos</SectionTitle>

      <div style={{ display: "flex", gap: 8, marginTop: 12, marginBottom: 12, overflowX: "auto" }}>
        {btnPreset("7 dias", () => preset(dia7atras), dataInicio === dia7atras && dataFim === hoje)}
        {btnPreset("30 dias", () => preset(dia30atras), dataInicio === dia30atras && dataFim === hoje)}
        {btnPreset("Este mês", () => preset(inicioMes), dataInicio === inicioMes && dataFim === hoje)}
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <div style={{ flex: 1 }}>
          <Field label="De" type="date" value={dataInicio} onChange={setDataInicio} />
        </div>
        <div style={{ flex: 1 }}>
          <Field label="Até" type="date" value={dataFim} onChange={setDataFim} />
        </div>
      </div>

      <label style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>
        <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Lote</span>
        <select
          value={loteFiltro}
          onChange={(e) => setLoteFiltro(e.target.value)}
          style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
        >
          <option value="">Todos os lotes</option>
          {lotesOrdenados.map((l) => (
            <option key={l.id} value={l.id}>
              {l.nome}
            </option>
          ))}
        </select>
      </label>

      {producaoPeriodo.length === 0 ? (
        <EmptyState text="Nenhuma postura lançada nesse período." />
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 22 }}>
            <IndicadorCard label="Total de ovos coletados" value={totalOvos} color="#8C6A3F" />
            <IndicadorCard label="Média diária" value={`${fmtN(mediaDiaria)} ovos/dia`} color="#8C6A3F" />
            <IndicadorCard label="Taxa de postura média" value={taxaMedia != null ? `${fmtN(taxaMedia)}%` : "—"} sub="Ovos coletados ÷ aves alojadas" />
            <IndicadorCard
              label="Ovos quebrados/trincados"
              value={totalQuebrados}
              sub={percQuebra != null ? `${fmtN(percQuebra)}% do total` : ""}
              color={percQuebra != null && percQuebra > 5 ? "#B5453A" : undefined}
            />
            {melhorDia && (
              <IndicadorCard
                label="Melhor dia do período"
                value={`${melhorDia.quantidade_ovos} ovos`}
                sub={formatDataBR(melhorDia.data) + (loteFiltro === "" ? ` • ${(lotes.find((l) => l.id === melhorDia.lote_id) || {}).nome || ""}` : "")}
              />
            )}
            <IndicadorCard label="Lançamentos no período" value={producaoPeriodo.length} />
          </div>

          <div style={{ marginBottom: 22 }}>
            <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.03em" }}>
              Evolução diária
            </div>
            <div style={{ height: 220, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 12 }}>
              <LineChartCanvasOnly labels={labelsEvolucao} valores={valoresEvolucao} color="#8C6A3F" />
            </div>
          </div>

          {loteFiltro === "" && rankingLotes.length > 0 && (
            <div>
              <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase", marginBottom: 10, letterSpacing: "0.03em" }}>
                Produção por lote no período
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {rankingLotes.map(({ lote, total, taxaLote, registros }) => (
                  <div key={lote.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{lote.nome}</div>
                      <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 2 }}>{registros} lançamento(s)</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 700, fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}>{total} ovos</div>
                      {taxaLote != null && <div style={{ fontSize: 11, color: "#6E7A61" }}>{fmtN(taxaLote)}% média</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}
