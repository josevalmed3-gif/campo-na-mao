}

function MaquinasGeralSecao({ maquinas, apontamentos, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    nome: "",
    tipo: "retroescavadeira",
    marca_modelo: "",
    ano: "",
    medidor: "horimetro",
    valor_compra: "",
    data_compra: "",
  });

  const today = todayISO();
  const monthPrefix = today.slice(0, 7);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Informe o nome da máquina." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/maquinas`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          nome: form.nome.trim(),
          tipo: form.tipo,
          marca_modelo: form.marca_modelo || null,
          ano: form.ano !== "" ? Number(form.ano) : null,
          medidor: form.medidor,
          medidor_atual: 0,
          valor_compra: form.valor_compra !== "" ? Number(form.valor_compra) : null,
          data_compra: form.data_compra || null,
          status: "ativa",
        }),
      });
      setBanner({ type: "success", text: "Máquina cadastrada." });
      setForm({ nome: "", tipo: "retroescavadeira", marca_modelo: "", ano: "", medidor: "horimetro", valor_compra: "", data_compra: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (m) => {
    if (!window.confirm(`Excluir a máquina "${m.nome}"? Isso não apaga os apontamentos já lançados.`)) return;
    try {
      await apiFetch(`/rest/v1/maquinas?id=eq.${m.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Máquina excluída." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Máquinas ({maquinas.length})</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: Retroescavadeira JCB" required />
          <SelectField label="Tipo" value={form.tipo} onChange={(v) => setForm({ ...form, tipo: v })} options={TIPOS_MAQUINA} />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Field label="Marca / modelo" value={form.marca_modelo} onChange={(v) => setForm({ ...form, marca_modelo: v })} />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Ano" type="number" value={form.ano} onChange={(v) => setForm({ ...form, ano: v })} />
            </div>
          </div>
          <SelectField label="Medidor" value={form.medidor} onChange={(v) => setForm({ ...form, medidor: v })} options={MEDIDOR_TIPOS} />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Field label="Valor de compra (R$)" type="number" value={form.valor_compra} onChange={(v) => setForm({ ...form, valor_compra: v })} />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Data de compra" type="date" value={form.data_compra} onChange={(v) => setForm({ ...form, data_compra: v })} />
            </div>
          </div>
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
        {maquinas.length === 0 && <EmptyState text="Nenhuma máquina cadastrada ainda." />}
        {maquinas.map((m) => {
          const apMaquina = apontamentos.filter((a) => a.maquina_id === m.id);
          const apMes = apMaquina.filter((a) => (a.data || "").startsWith(monthPrefix));
          const horasMes = apMes.reduce((s, a) => s + Number(a.horas || 0), 0);
          const receitaMes = apMes.filter((a) => a.destino === "cliente").reduce((s, a) => s + Number(a.valor_total || 0), 0);
          const unidade = medidorUnidade(m.medidor);
          return (
            <div key={m.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{m.nome}</div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {[TIPOS_MAQUINA.find((t) => t[0] === m.tipo) ? TIPOS_MAQUINA.find((t) => t[0] === m.tipo)[1] : null, m.marca_modelo, m.ano]
                      .filter(Boolean)
                      .join(" • ")}
                  </div>
                </div>
                <button
                  onClick={() => excluir(m)}
                  style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  Excluir
                </button>
              </div>
              <div style={{ display: "flex", gap: 18, marginTop: 12, flexWrap: "wrap" }}>
                {unidade && (
                  <div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#3E7C99" }}>
                      {Number(m.medidor_atual || 0).toFixed(1)} {unidade}
                    </div>
                    <div style={{ fontSize: 11, color: "#6E7A61" }}>Medidor atual</div>
                  </div>
                )}
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#B8862E" }}>{horasMes.toFixed(1)} h</div>
                  <div style={{ fontSize: 11, color: "#6E7A61" }}>Trabalhadas no mês</div>
                </div>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#5BAA47" }}>R$ {receitaMes.toFixed(2)}</div>
                  <div style={{ fontSize: 11, color: "#6E7A61" }}>Receita no mês</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MaquinaApontamentosSecao({ maquinas, clientes, apontamentos, fazendas, isAdmin, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [jaPago, setJaPago] = useState(false);
  const [showNovoCliente, setShowNovoCliente] = useState(false);
  const [novoCliente, setNovoCliente] = useState("");
  const [filtroMaquina, setFiltroMaquina] = useState("");
  const [filtroDestino, setFiltroDestino] = useState("");

  const blankForm = {
    maquina_id: "",
    data: todayISO(),
    destino: isAdmin ? "cliente" : "interno",
    cliente_id: "",
    fazenda_id: "",
    medidor_inicio: "",
    medidor_fim: "",
    horas: "",
    tipo_servico: "",
    valor_hora: "",
    valor_total: "",
    operador: "",
    observacoes: "",
  };
  const [form, setForm] = useState(blankForm);

  const maquinaSelecionada = maquinas.find((m) => m.id === form.maquina_id);
  const temMedidor = maquinaSelecionada && maquinaSelecionada.medidor !== "nenhum";
  const destino = isAdmin ? form.destino : "interno";

  useEffect(() => {
    if (temMedidor && form.medidor_inicio !== "" && form.medidor_fim !== "") {
      const h = Number(form.medidor_fim) - Number(form.medidor_inicio);
      if (h >= 0 && String(h) !== form.horas) setForm((f) => ({ ...f, horas: String(h) }));
    }
  }, [form.medidor_inicio, form.medidor_fim]);

  useEffect(() => {
    if (form.horas !== "" && form.valor_hora !== "") {
      const total = Number(form.horas) * Number(form.valor_hora);
      if (!isNaN(total)) setForm((f) => ({ ...f, valor_total: total.toFixed(2) }));
    }
  }, [form.horas, form.valor_hora]);

  const handleMaquinaChange = (id) => {
    const m = maquinas.find((mm) => mm.id === id);
    setForm((f) => ({
      ...f,
      maquina_id: id,
      medidor_inicio: m && m.medidor !== "nenhum" ? String(m.medidor_atual || 0) : "",
      medidor_fim: "",
      horas: "",
    }));
  };

  const criarClienteRapido = async () => {
    if (!novoCliente.trim()) return;
    try {
      const rows = await apiFetch(`/rest/v1/maquina_clientes`, {
        method: "POST",
        headers: { Prefer: "return=representation" },
        body: JSON.stringify({ nome: novoCliente.trim() }),
      });
      const criado = rows && rows[0];
      setNovoCliente("");
      setShowNovoCliente(false);
      reload();
      if (criado) setForm((f) => ({ ...f, cliente_id: criado.id }));
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao cadastrar cliente: " + err.message });
    }
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.maquina_id) {
      setBanner({ type: "error", text: "Selecione a máquina." });
      return;
    }
    if (destino === "cliente" && !form.cliente_id) {
      setBanner({ type: "error", text: "Selecione o cliente." });
      return;
    }
    if (destino === "interno" && !form.fazenda_id) {
      setBanner({ type: "error", text: "Selecione a fazenda." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/maquina_apontamentos`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          maquina_id: form.maquina_id,
          data: form.data,
          destino: destino,
          cliente_id: destino === "cliente" ? form.cliente_id : null,
          fazenda_id: destino === "interno" ? form.fazenda_id : null,
          medidor_inicio: form.medidor_inicio !== "" ? Number(form.medidor_inicio) : null,
          medidor_fim: form.medidor_fim !== "" ? Number(form.medidor_fim) : null,
          horas: form.horas !== "" ? Number(form.horas) : null,
          tipo_servico: form.tipo_servico || null,
          valor_hora: isAdmin && form.valor_hora !== "" ? Number(form.valor_hora) : null,
          valor_total: isAdmin && form.valor_total !== "" ? Number(form.valor_total) : null,
          status_pagamento: destino === "interno" ? "interno" : jaPago ? "pago" : "pendente",
          data_pagamento: destino === "cliente" && jaPago ? todayISO() : null,
          operador: form.operador || null,
          observacoes: form.observacoes || null,
        }),
      });
      if (form.medidor_fim !== "" && maquinaSelecionada) {
        await apiFetch(`/rest/v1/maquinas?id=eq.${form.maquina_id}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({ medidor_atual: Number(form.medidor_fim) }),
        });
      }
      setBanner({ type: "success", text: "Trabalho lançado." });
      setForm(blankForm);
      setJaPago(false);
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (a) => {
    if (!window.confirm("Excluir este apontamento?")) return;
    try {
      await apiFetch(`/rest/v1/maquina_apontamentos?id=eq.${a.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Apontamento excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  const destinoBtnStyle = (active) => ({
    flex: 1,
    background: active ? "#5BAA47" : "#F5F2E9",
    color: active ? "#F5F2E9" : "#6E7A61",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 8,
    padding: "9px 0",
    fontSize: 13,
    fontWeight: 700,
    cursor: "pointer",
  });

  const listaFiltrada = apontamentos.filter((a) => !filtroMaquina || a.maquina_id === filtroMaquina).filter((a) => !filtroDestino || a.destino === filtroDestino);

  const statusColor = (s) => (s === "pago" ? "#5BAA47" : s === "interno" ? "#6E7A61" : "#B8862E");
  const statusLabel = (s) => (s === "pago" ? "Pago" : s === "interno" ? "Interno" : "Pendente");

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Apontamentos</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <SelectField label="Máquina" value={form.maquina_id} onChange={handleMaquinaChange} options={maquinas.map((m) => [m.id, m.nome])} placeholder="Selecione a máquina" />
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />

          {isAdmin && (
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={() => setForm({ ...form, destino: "cliente" })} style={destinoBtnStyle(form.destino === "cliente")}>
                Cliente
              </button>
              <button type="button" onClick={() => setForm({ ...form, destino: "interno" })} style={destinoBtnStyle(form.destino === "interno")}>
                Interno
              </button>
            </div>
          )}

          {destino === "cliente" && (
            <div>
              <SelectField label="Cliente" value={form.cliente_id} onChange={(v) => setForm({ ...form, cliente_id: v })} options={clientes.map((c) => [c.id, c.nome])} placeholder="Selecione o cliente" />
              {!showNovoCliente ? (
                <button type="button" onClick={() => setShowNovoCliente(true)} style={{ background: "none", border: "none", color: "#B8862E", fontSize: 12, fontWeight: 700, cursor: "pointer", marginTop: 6, padding: 0 }}>
                  + Novo cliente
                </button>
              ) : (
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <input
                    value={novoCliente}
                    onChange={(e) => setNovoCliente(e.target.value)}
                    placeholder="Nome do cliente"
                    style={{ flex: 1, background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "9px 12px", color: "#1F3324", fontSize: 13 }}
                  />
                  <button type="button" onClick={criarClienteRapido} style={{ background: "#B8862E", border: "none", borderRadius: 8, padding: "0 14px", color: "#F5F2E9", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    Salvar
                  </button>
                </div>
              )}
            </div>
          )}

          {destino === "interno" && (
            <SelectField label="Fazenda" value={form.fazenda_id} onChange={(v) => setForm({ ...form, fazenda_id: v })} options={fazendas.map((f) => [f.id, f.nome])} placeholder="Selecione a fazenda" />
          )}

          {temMedidor && (
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <Field label={`Medidor início (${medidorUnidade(maquinaSelecionada.medidor)})`} type="number" value={form.medidor_inicio} onChange={(v) => setForm({ ...form, medidor_inicio: v })} />
              </div>
              <div style={{ flex: 1 }}>
                <Field label={`Medidor fim (${medidorUnidade(maquinaSelecionada.medidor)})`} type="number" value={form.medidor_fim} onChange={(v) => setForm({ ...form, medidor_fim: v })} />
              </div>
            </div>
          )}

          <Field label={temMedidor ? "Horas (calculado, pode ajustar)" : "Horas (opcional)"} type="number" value={form.horas} onChange={(v) => setForm({ ...form, horas: v })} />
          <Field label="Tipo de serviço" value={form.tipo_servico} onChange={(v) => setForm({ ...form, tipo_servico: v })} placeholder="Ex: limpeza de tanque, frete de silagem" />

          {isAdmin && (
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <Field label="Valor/hora (R$)" type="number" value={form.valor_hora} onChange={(v) => setForm({ ...form, valor_hora: v })} />
              </div>
              <div style={{ flex: 1 }}>
                <Field label="Valor total (R$)" type="number" value={form.valor_total} onChange={(v) => setForm({ ...form, valor_total: v })} />
              </div>
            </div>
          )}

          {destino === "cliente" && (
            <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#1F3324" }}>
              <input type="checkbox" checked={jaPago} onChange={(e) => setJaPago(e.target.checked)} />
              Já foi pago
            </label>
          )}

          <Field label="Operador (opcional)" value={form.operador} onChange={(v) => setForm({ ...form, operador: v })} />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ display: "flex", gap: 8, marginTop: 16, overflowX: "auto" }}>
        <select
          value={filtroMaquina}
          onChange={(e) => setFiltroMaquina(e.target.value)}
          style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "8px 10px", color: "#1F3324", fontSize: 12 }}
        >
          <option value="">Todas as máquinas</option>
          {maquinas.map((m) => (
            <option key={m.id} value={m.id}>
              {m.nome}
            </option>
          ))}
        </select>
        <select
          value={filtroDestino}
          onChange={(e) => setFiltroDestino(e.target.value)}
          style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "8px 10px", color: "#1F3324", fontSize: 12 }}
        >
          <option value="">Todos</option>
          <option value="cliente">Cliente</option>
          <option value="interno">Interno</option>
        </select>
      </div>

      <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
        {listaFiltrada.length === 0 && <EmptyState text="Nenhum apontamento lançado ainda." />}
        {listaFiltrada.map((a) => {
          const m = maquinas.find((mm) => mm.id === a.maquina_id);
          const c = clientes.find((cc) => cc.id === a.cliente_id);
          const f = fazendas.find((ff) => ff.id === a.fazenda_id);
          return (
            <div key={a.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>
                    {m ? m.nome : "Máquina"} — {formatDataBR(a.data)}
                  </div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {a.destino === "cliente" ? (c ? c.nome : "Cliente") : f ? f.nome : "Interno"}
                    {a.tipo_servico ? ` • ${a.tipo_servico}` : ""}
                    {a.horas ? ` • ${Number(a.horas).toFixed(1)} h` : ""}
                  </div>
                </div>
                <Badge color={statusColor(a.status_pagamento)}>{statusLabel(a.status_pagamento)}</Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#1F3324" }}>{a.valor_total ? `R$ ${Number(a.valor_total).toFixed(2)}` : "—"}</div>
                <button
                  onClick={() => excluir(a)}
                  style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "5px 10px", color: "#A83B2E", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                >
                  Excluir
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MaquinaAbastecimentoSecao({ maquinas, abastecimentos, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [filtroMaquina, setFiltroMaquina] = useState("");
  const blankForm = { maquina_id: "", data: todayISO(), litros: "", valor_litro: "", valor_total: "", medidor: "", origem: "", observacoes: "" };
  const [form, setForm] = useState(blankForm);

  const maquinaSelecionada = maquinas.find((m) => m.id === form.maquina_id);
  const temMedidor = maquinaSelecionada && maquinaSelecionada.medidor !== "nenhum";

  useEffect(() => {
    if (form.litros !== "" && form.valor_litro !== "") {
      const total = Number(form.litros) * Number(form.valor_litro);
      if (!isNaN(total)) setForm((f) => ({ ...f, valor_total: total.toFixed(2) }));
    }
  }, [form.litros, form.valor_litro]);

  const handleMaquinaChange = (id) => {
    const m = maquinas.find((mm) => mm.id === id);
    setForm((f) => ({ ...f, maquina_id: id, medidor: m && m.medidor !== "nenhum" ? String(m.medidor_atual || 0) : "" }));
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.maquina_id) {
      setBanner({ type: "error", text: "Selecione a máquina." });
      return;
    }
    if (!form.litros || Number(form.litros) <= 0) {
      setBanner({ type: "error", text: "Informe os litros abastecidos." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/maquina_abastecimentos`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          maquina_id: form.maquina_id,
          data: form.data,
          litros: Number(form.litros),
          valor_litro: form.valor_litro !== "" ? Number(form.valor_litro) : null,
          valor_total: form.valor_total !== "" ? Number(form.valor_total) : null,
          medidor: form.medidor !== "" ? Number(form.medidor) : null,
          origem: form.origem || null,
          observacoes: form.observacoes || null,
        }),
      });
      if (form.medidor !== "" && maquinaSelecionada && Number(form.medidor) > Number(maquinaSelecionada.medidor_atual || 0)) {
        await apiFetch(`/rest/v1/maquinas?id=eq.${form.maquina_id}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({ medidor_atual: Number(form.medidor) }),
        });
      }
      setBanner({ type: "success", text: "Abastecimento lançado." });
      setForm(blankForm);
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (a) => {
    if (!window.confirm("Excluir este abastecimento?")) return;
    try {
      await apiFetch(`/rest/v1/maquina_abastecimentos?id=eq.${a.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Abastecimento excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  const today = todayISO();
  const monthPrefix = today.slice(0, 7);
  const doMes = abastecimentos.filter((a) => (a.data || "").startsWith(monthPrefix));
  const litrosMes = doMes.reduce((s, a) => s + Number(a.litros || 0), 0);
  const gastoMes = doMes.reduce((s, a) => s + Number(a.valor_total || 0), 0);

  const listaFiltrada = abastecimentos.filter((a) => !filtroMaquina || a.maquina_id === filtroMaquina);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Abastecimento</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      <div style={{ display: "flex", gap: 12, marginTop: 14 }}>
        <div style={{ flex: 1, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#3E7C99" }}>{litrosMes.toFixed(1)} L</div>
          <div style={{ fontSize: 11, color: "#6E7A61" }}>Abastecido no mês</div>
        </div>
        <div style={{ flex: 1, background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#B8862E" }}>R$ {gastoMes.toFixed(2)}</div>
          <div style={{ fontSize: 11, color: "#6E7A61" }}>Gasto com diesel no mês</div>
        </div>
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <SelectField label="Máquina" value={form.maquina_id} onChange={handleMaquinaChange} options={maquinas.map((m) => [m.id, m.nome])} placeholder="Selecione a máquina" />
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Field label="Litros" type="number" value={form.litros} onChange={(v) => setForm({ ...form, litros: v })} required />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Valor/litro (R$)" type="number" value={form.valor_litro} onChange={(v) => setForm({ ...form, valor_litro: v })} />
            </div>
          </div>
          <Field label="Valor total (R$)" type="number" value={form.valor_total} onChange={(v) => setForm({ ...form, valor_total: v })} />
          {temMedidor && (
            <Field label={`Medidor no momento (${medidorUnidade(maquinaSelecionada.medidor)})`} type="number" value={form.medidor} onChange={(v) => setForm({ ...form, medidor: v })} />
          )}
          <Field label="Origem" value={form.origem} onChange={(v) => setForm({ ...form, origem: v })} placeholder="Ex: posto, tanque da fazenda" />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16 }}>
        <select
          value={filtroMaquina}
          onChange={(e) => setFiltroMaquina(e.target.value)}
          style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "8px 10px", color: "#1F3324", fontSize: 12 }}
        >
          <option value="">Todas as máquinas</option>
          {maquinas.map((m) => (
            <option key={m.id} value={m.id}>
              {m.nome}
            </option>
          ))}
        </select>
      </div>

      <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
        {listaFiltrada.length === 0 && <EmptyState text="Nenhum abastecimento lançado ainda." />}
        {listaFiltrada.map((a) => {
          const m = maquinas.find((mm) => mm.id === a.maquina_id);
          return (
            <div key={a.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>
                  {m ? m.nome : "Máquina"} — {formatDataBR(a.data)}
                </div>
                <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                  {Number(a.litros).toFixed(1)} L{a.valor_total ? ` • R$ ${Number(a.valor_total).toFixed(2)}` : ""}
                  {a.origem ? ` • ${a.origem}` : ""}
                </div>
              </div>
              <button
                onClick={() => excluir(a)}
                style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              >
                Excluir
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

          descricao: form.descricao.trim(),

        }),
      });

      reload();

      await apiFetch(`/rest/v1/maquina_manutencoes?id=eq.${m.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Registro excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  const tipoBtnStyle = (active) => ({
    flex: 1,
    background: active ? "#5BAA47" : "#F5F2E9",
    color: active ? "#F5F2E9" : "#6E7A61",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 8,
    padding: "9px 0",
    fontSize: 13,
    fontWeight: 700,
    cursor: "pointer",
  });

  const listaFiltrada = manutencoes.filter((m) => !filtroMaquina || m.maquina_id === filtroMaquina);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Manutenção</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <SelectField label="Máquina" value={form.maquina_id} onChange={handleMaquinaChange} options={maquinas.map((m) => [m.id, m.nome])} placeholder="Selecione a máquina" />
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <div style={{ display: "flex", gap: 8 }}>
            {TIPOS_MANUTENCAO.map(([id, label]) => (
              <button key={id} type="button" onClick={() => setForm({ ...form, tipo: id })} style={tipoBtnStyle(form.tipo === id)}>
                {label}
              </button>
            ))}
          </div>
          <Field label="Descrição" value={form.descricao} onChange={(v) => setForm({ ...form, descricao: v })} placeholder="Ex: troca de óleo e filtros" required />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Field label="Custo de peças (R$)" type="number" value={form.custo_pecas} onChange={(v) => setForm({ ...form, custo_pecas: v })} />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Custo de mão de obra (R$)" type="number" value={form.custo_mao_obra} onChange={(v) => setForm({ ...form, custo_mao_obra: v })} />
            </div>
          </div>
          {temMedidor && (
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <Field label={`Medidor no momento (${medidorUnidade(maquinaSelecionada.medidor)})`} type="number" value={form.medidor} onChange={(v) => setForm({ ...form, medidor: v })} />
              </div>
              <div style={{ flex: 1 }}>
                <Field label="Próxima revisão em" type="number" value={form.proxima_em} onChange={(v) => setForm({ ...form, proxima_em: v })} />
              </div>
            </div>
          )}
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16 }}>
        <select
          value={filtroMaquina}
          onChange={(e) => setFiltroMaquina(e.target.value)}
          style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "8px 10px", color: "#1F3324", fontSize: 12 }}
        >
          <option value="">Todas as máquinas</option>
          {maquinas.map((m) => (
            <option key={m.id} value={m.id}>
              {m.nome}
            </option>
          ))}
        </select>
      </div>

      <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
        {listaFiltrada.length === 0 && <EmptyState text="Nenhuma manutenção registrada ainda." />}
        {listaFiltrada.map((m) => {
          const maq = maquinas.find((mm) => mm.id === m.maquina_id);
          const custoTotal = Number(m.custo_pecas || 0) + Number(m.custo_mao_obra || 0);
          const vencida = m.proxima_em && maq && Number(maq.medidor_atual || 0) >= Number(m.proxima_em);
          return (
            <div key={m.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>
                    {maq ? maq.nome : "Máquina"} — {formatDataBR(m.data)}
                  </div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{m.descricao}</div>
                </div>
                <Badge color={m.tipo === "preventiva" ? "#5BAA47" : "#B5453A"}>{m.tipo === "preventiva" ? "Preventiva" : "Corretiva"}</Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#1F3324" }}>{custoTotal > 0 ? `R$ ${custoTotal.toFixed(2)}` : "—"}</div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {vencida && <Badge color="#B5453A">Próxima revisão vencida</Badge>}
                  <button
                    onClick={() => excluir(m)}
                    style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "5px 10px", color: "#A83B2E", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                  >
                    Excluir
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MaquinaFinanceiroSecao({ maquinas, clientes, apontamentos, apiFetch, reload, setBanner }) {
  const recebiveis = apontamentos.filter((a) => a.destino === "cliente");
  const porCliente = {};
  recebiveis.forEach((a) => {
    const cid = a.cliente_id || "sem-cliente";
    if (!porCliente[cid]) porCliente[cid] = { pendente: 0, pago: 0, itens: [] };
    porCliente[cid].itens.push(a);
    if (a.status_pagamento === "pago") porCliente[cid].pago += Number(a.valor_total || 0);
    else porCliente[cid].pendente += Number(a.valor_total || 0);
  });

  const totalPendente = recebiveis.filter((a) => a.status_pagamento === "pendente").reduce((s, a) => s + Number(a.valor_total || 0), 0);

  const marcarPago = async (a) => {
    try {
      await apiFetch(`/rest/v1/maquina_apontamentos?id=eq.${a.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ status_pagamento: "pago", data_pagamento: todayISO() }),
      });
      setBanner({ type: "success", text: "Marcado como pago." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro: " + err.message });
    }
  };

  return (
    <div>
      <SectionTitle>A receber</SectionTitle>
      <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: "16px 18px", marginTop: 14 }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 26, fontWeight: 600, color: "#B8862E" }}>R$ {totalPendente.toFixed(2)}</div>
        <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 4 }}>Total pendente de recebimento</div>
      </div>

      <div style={{ marginTop: 18, display: "flex", flexDirection: "column", gap: 10 }}>
        {Object.keys(porCliente).length === 0 && <EmptyState text="Nenhum trabalho para clientes lançado ainda." />}
        {Object.entries(porCliente).map(([cid, dados]) => {
          const cliente = clientes.find((c) => c.id === cid);
          const pendentes = dados.itens.filter((i) => i.status_pagamento === "pendente");
          return (
            <div key={cid} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{cliente ? cliente.nome : "Cliente não identificado"}</div>
                <Badge color={dados.pendente > 0 ? "#B8862E" : "#5BAA47"}>{dados.pendente > 0 ? `R$ ${dados.pendente.toFixed(2)} pendente` : "Em dia"}</Badge>
              </div>
              {pendentes.length > 0 && (
                <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                  {pendentes.map((a) => {
                    const m = maquinas.find((mm) => mm.id === a.maquina_id);
                    return (
                      <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "#6E7A61" }}>
                        <span>
                          {formatDataBR(a.data)} • {m ? m.nome : ""} • R$ {Number(a.valor_total || 0).toFixed(2)}
                        </span>
                        <button
                          onClick={() => marcarPago(a)}
                          style={{ background: "rgba(91,170,71,0.15)", border: "1px solid #5BAA47", borderRadius: 8, padding: "4px 10px", color: "#3E7C36", fontSize: 11, fontWeight: 700, cursor: "pointer" }}
                        >
                          Marcar pago
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 24 }}>
        <MaquinaClientesSecao clientes={clientes} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />
      </div>
    </div>
  );
}

function MaquinaClientesSecao({ clientes, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ nome: "", telefone: "", cidade: "", observacoes: "" });

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Informe o nome do cliente." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/maquina_clientes`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ nome: form.nome.trim(), telefone: form.telefone || null, cidade: form.cidade || null, observacoes: form.observacoes || null }),
      });
      setBanner({ type: "success", text: "Cliente cadastrado." });
      setForm({ nome: "", telefone: "", cidade: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (c) => {
    if (!window.confirm(`Excluir o cliente "${c.nome}"?`)) return;
    try {
      await apiFetch(`/rest/v1/maquina_clientes?id=eq.${c.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Cliente excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Clientes ({clientes.length})</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>
      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} required />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Field label="Telefone" value={form.telefone} onChange={(v) => setForm({ ...form, telefone: v })} />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Cidade" value={form.cidade} onChange={(v) => setForm({ ...form, cidade: v })} />
            </div>
          </div>
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}
      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {clientes.length === 0 && <EmptyState text="Nenhum cliente cadastrado ainda." />}
        {clientes.map((c) => (
          <div key={c.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{c.nome}</div>
              <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{[c.telefone, c.cidade].filter(Boolean).join(" • ") || "Sem detalhes"}</div>
            </div>
            <button
              onClick={() => excluir(c)}
              style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
            >
              Excluir
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------- SHARED ----------------
function IconButton({ onClick, active }) {
  const readOnly = useReadOnly();
  if (readOnly && !active) return null;
  return (
    <button
      onClick={onClick}
      style={{
        background: active ? "#B5453A" : "#B8862E",
        border: "none",
        borderRadius: 10,
        width: 38,
        height: 38,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        cursor: "pointer",
        color: "#F5F2E9",
      }}
    >
      {active ? <X size={18} /> : <Plus size={18} />}
    </button>
  );
}

function SaveButton({ saving }) {
  const readOnly = useReadOnly();
  if (readOnly) {
    return (
      <div
        style={{
          background: "rgba(11,61,46,0.08)",
          color: "#6E7A61",
          borderRadius: 10,
          padding: "11px 0",
          fontWeight: 600,
          fontSize: 13,
          textAlign: "center",
        }}
      >
        Modo somente visualização — não é possível salvar
      </div>
    );
  }
  return (
    <button
      type="submit"
      disabled={saving}
      style={{
        background: "#5BAA47",
        color: "#F5F2E9",
        border: "none",
        borderRadius: 10,
        padding: "11px 0",
        fontWeight: 700,
        fontSize: 14,
        cursor: saving ? "default" : "pointer",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        gap: 8,
        opacity: saving ? 0.7 : 1,
      }}
    >
      {saving && <Loader2 size={16} className="animate-spin" />}
      Salvar
    </button>
  );
}

function Badge({ children, color }) {
  return (
    <span
      style={{
        fontSize: 11,
        fontWeight: 700,
        color: "#F5F2E9",
        background: color,
        padding: "4px 10px",
        borderRadius: 20,
        whiteSpace: "nowrap",
      }}
    >
      {children}
    </span>
  );
}

function EmptyState({ text }) {
  return (
    <div
      style={{
        border: "1px dashed rgba(11,61,46,0.18)",
        borderRadius: 12,
        padding: "24px 16px",
        textAlign: "center",
        color: "#6E7A61",
        fontSize: 13,
      }}
    >
      {text}
    </div>
  );
}
</script>
<script>
function showError(title, details) {
  var el = document.createElement("div");
  el.style.cssText = "position:fixed;top:0;left:0;right:0;background:#B5453A;color:#fff;padding:12px;font-family:monospace;font-size:11px;z-index:99999;white-space:pre-wrap;max-height:60vh;overflow:auto;";
  el.textContent = title + ": " + details;
  document.body.appendChild(el);
}

window.addEventListener("error", function (e) {
  showError("ERRO GLOBAL", e.error && e.error.stack ? e.error.stack : (e.message + " (linha " + e.lineno + ", coluna " + e.colno + ")"));
});
window.addEventListener("unhandledrejection", function (e) {
  showError("ERRO (promise)", e.reason && e.reason.stack ? e.reason.stack : e.reason);
});
