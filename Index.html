function fetchImageAsDataURL(url) {
  return fetch(url)
    .then((res) => res.blob())
    .then(
      (blob) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        })
    );
}

function desenharGraficoLinhaPDF(doc, x, y, w, h, valores, corRGB) {
  if (!valores || valores.length === 0) return;
  const min = Math.min(...valores);
  const max = Math.max(...valores);
  const range = max - min || 1;

  doc.setDrawColor(220);
  doc.setLineWidth(0.2);
  doc.rect(x, y, w, h);

  const stepX = valores.length > 1 ? w / (valores.length - 1) : 0;
  doc.setDrawColor(corRGB[0], corRGB[1], corRGB[2]);
  doc.setLineWidth(0.6);
  for (let i = 0; i < valores.length - 1; i++) {
    const x1 = x + i * stepX;
    const y1 = y + h - ((valores[i] - min) / range) * h;
    const x2 = x + (i + 1) * stepX;
    const y2 = y + h - ((valores[i + 1] - min) / range) * h;
    doc.line(x1, y1, x2, y2);
  }
  doc.setFillColor(corRGB[0], corRGB[1], corRGB[2]);
  valores.forEach((v, i) => {
    const xi = x + i * stepX;
    const yi = y + h - ((v - min) / range) * h;
    doc.circle(xi, yi, 0.7, "F");
  });

  doc.setFontSize(7);
  doc.setTextColor(120);
  doc.text(max.toFixed(1) + " kg", x + w + 2, y + 3);
  doc.text(min.toFixed(1) + " kg", x + w + 2, y + h);
  doc.setTextColor(0);
  doc.setDrawColor(0);
}

function compressImage(file, maxWidth = 800, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Não foi possível ler o arquivo."));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Arquivo de imagem inválido."));
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => (blob ? resolve(blob) : reject(new Error("Falha ao comprimir imagem."))), "image/jpeg", quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function todayISO() {
  const partes = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Sao_Paulo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
  }).formatToParts(new Date());
  const ano = partes.find((p) => p.type === "year").value;
  const mes = partes.find((p) => p.type === "month").value;
  const dia = partes.find((p) => p.type === "day").value;
  return `${ano}-${mes}-${dia}`;
}

function formatDataBR(dataISO) {
  if (!dataISO) return "";
  const [ano, mes, dia] = dataISO.slice(0, 10).split("-");
  return `${dia}/${mes}/${ano}`;
}

  const [maquinaManutencoes, setMaquinaManutencoes] = useState([]);
  const [dataLoading, setDataLoading] = useState(false);
  const [banner, setBanner] = useState(null); // { type, text }

  useEffect(() => {
    if (typeof window === "undefined") return;
    const hash = window.location.hash;
    if (hash && hash.includes("type=recovery")) {
      const params = new URLSearchParams(hash.replace("#", ""));
      const access_token = params.get("access_token");
      if (access_token) {
        setSession({ access_token, user: null });
        setRecoverySession(true);
        window.history.replaceState(null, "", window.location.pathname);
      }
    }
  }, []);

  const uploadFoto = useCallback(
    async (file) => {
      if (profileRef.current?.role === "visualizador") throw new Error("Seu usuário é somente visualização e não pode enviar arquivos.");
      const token = session?.access_token || SUPABASE_KEY;
      const blob = await compressImage(file);
      const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/fotos-animais/${filename}`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${token}`,
          "Content-Type": "image/jpeg",
        },
        body: blob,
      });
      if (!res.ok) {
        let msg = "Erro ao enviar foto";
        try {
          const j = await res.json();
          msg = j.message || j.error || msg;
        } catch (e) {}
        throw new Error(msg);
      }
      return `${SUPABASE_URL}/storage/v1/object/public/fotos-animais/${filename}`;
    },
    [session]
  );

  const uploadMidiaConfinamento = useCallback(
    async (file) => {
      if (profileRef.current?.role === "visualizador") throw new Error("Seu usuário é somente visualização e não pode enviar arquivos.");
      const token = session?.access_token || SUPABASE_KEY;
      const isImage = file.type.startsWith("image/");
      const isVideo = file.type.startsWith("video/");
      const isAudio = file.type.startsWith("audio/");
      const blob = isImage ? await compressImage(file, 1280, 0.8) : file;
      const midiaTipo = isImage ? "foto" : isVideo ? "video" : isAudio ? "audio" : "outro";
      const ext = isImage ? "jpg" : (file.name.split(".").pop() || "bin");
      const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/midias-confinamento/${filename}`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${token}`,
          "Content-Type": isImage ? "image/jpeg" : file.type || "application/octet-stream",
        },
        body: blob,
      });
      if (!res.ok) {
        let msg = "Erro ao enviar arquivo";
        try {
          const j = await res.json();
          msg = j.message || j.error || msg;
        } catch (e) {}
        throw new Error(msg);
      }
      return { url: `${SUPABASE_URL}/storage/v1/object/public/midias-confinamento/${filename}`, tipo: midiaTipo };
    },
    [session]
  );

  const uploadDocumento = useCallback(
    async (file) => {
      if (profileRef.current?.role === "visualizador") throw new Error("Seu usuário é somente visualização e não pode enviar arquivos.");
      const token = session?.access_token || SUPABASE_KEY;
      const isImage = file.type.startsWith("image/");
      const blob = isImage ? await compressImage(file, 1200, 0.8) : file;
      const ext = isImage ? "jpg" : file.name.split(".").pop() || "pdf";
      const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/documentos-animais/${filename}`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${token}`,
          "Content-Type": isImage ? "image/jpeg" : file.type || "application/pdf",
        },
        body: blob,
      });
      if (!res.ok) {
        let msg = "Erro ao enviar documento";
        try {
          const j = await res.json();
          msg = j.message || j.error || msg;
        } catch (e) {}
        throw new Error(msg);
      }
      return `${SUPABASE_URL}/storage/v1/object/public/documentos-animais/${filename}`;
    },
    [session]
  );

  const apiFetch = useCallback(
    async (path, options = {}) => {
      const method = (options.method || "GET").toUpperCase();
      if (profileRef.current?.role === "visualizador" && method !== "GET") {
        throw new Error("Seu usuário é somente visualização. Peça a um administrador para fazer essa alteração.");
      }
      const token = session?.access_token || SUPABASE_KEY;
      const res = await fetch(`${SUPABASE_URL}${path}`, {
        ...options,
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!res.ok) {
        let msg = `Erro ${res.status}`;
        try {
          const j = await res.json();
          msg = j.msg || j.message || j.error_description || msg;
        } catch (e) {}
        throw new Error(msg);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    },
    [session]
  );

  const loadAll = useCallback(async () => {
    setDataLoading(true);
    try {
      const [a, p, h] = await Promise.all([
        apiFetch(`/rest/v1/animals?select=*&order=created_at.desc`),
        apiFetch(`/rest/v1/milk_production?select=*&order=data.desc&limit=200`),
        apiFetch(`/rest/v1/health_records?select=*&order=data.desc&limit=200`),
      ]);
      setAnimals(a || []);
      setProduction(p || []);
      setHealthRecords(h || []);
      try {
        const e = await apiFetch(`/rest/v1/entregas_leite?select=*&order=data.desc&limit=200`);
        setEntregas(e || []);
      } catch (e) {}
      try {
        const pw = await apiFetch(`/rest/v1/pesagens?select=*&order=data.desc&limit=500`);
        setPesagens(pw || []);
      } catch (e) {}
      try {
        const doc = await apiFetch(`/rest/v1/documentos_animais?select=*&order=data_validade.asc.nullslast`);
        setDocumentos(doc || []);
      } catch (e) {}
      try {
        const fz = await apiFetch(`/rest/v1/fazendas?select=*&order=nome.asc`);
        setFazendas(fz || []);
      } catch (e) {}
      try {
        const pr = await apiFetch(`/rest/v1/protocolos_sanitarios?select=*&order=nome.asc`);
        setProtocolos(pr || []);
      } catch (e) {}
      try {
        const pq = await apiFetch(`/rest/v1/piquetes?select=*&order=nome.asc`);
        setPiquetes(pq || []);
      } catch (e) {}
      try {
        const ba = await apiFetch(`/rest/v1/baias?select=*&order=nome.asc`);
        setBaias(ba || []);
      } catch (e) {}
      try {
        const lc = await apiFetch(`/rest/v1/lotes_confinamento?select=*&order=data_entrada.desc&limit=300`);
        setLotesConfinamento(lc || []);
      } catch (e) {}
      try {
        const tc = await apiFetch(`/rest/v1/tratos_confinamento?select=*&order=data.desc&limit=1000`);

      try {

        setInteracoes(it || []);
      } catch (e) {}
      try {
        const rm = await apiFetch(`/rest/v1/romaneios?select=*&order=data.desc&limit=300`);
        setRomaneios(rm || []);
      } catch (e) {}
      try {
        const ra = await apiFetch(`/rest/v1/romaneio_animais?select=*&limit=2000`);
        setRomaneioAnimais(ra || []);
      } catch (e) {}
      try {
        const pm = await apiFetch(`/rest/v1/programas_melhoramento?select=*&order=nome.asc`);
        setProgramasMelhoramento(pm || []);
      } catch (e) {}
      try {
        const cm = await apiFetch(`/rest/v1/comunicados_melhoramento?select=*&order=data_evento.desc&limit=500`);
        setComunicadosMelhoramento(cm || []);
      } catch (e) {}
      try {
        const al = await apiFetch(`/rest/v1/aves_lotes?select=*&order=data_alojamento.desc`);
        setAvesLotes(al || []);
      } catch (e) {}
      try {
        const ap = await apiFetch(`/rest/v1/aves_producao?select=*&order=data.desc&limit=1000`);
        setAvesProducao(ap || []);
      } catch (e) {}
      try {
        const am = await apiFetch(`/rest/v1/aves_mortalidade?select=*&order=data.desc&limit=500`);
        setAvesMortalidade(am || []);
      } catch (e) {}
      try {
        const ar = await apiFetch(`/rest/v1/aves_racao?select=*&order=data.desc&limit=1000`);
        setAvesRacao(ar || []);
      } catch (e) {}
      try {
        const av = await apiFetch(`/rest/v1/aves_vendas?select=*&order=data.desc&limit=500`);
        setAvesVendas(av || []);
      } catch (e) {}
      try {
        const vva = await apiFetch(`/rest/v1/aves_vendas_animais?select=*&order=data.desc&limit=500`);
        setAvesVendasAnimais(vva || []);
      } catch (e) {}
      try {
        const ins = await apiFetch(`/rest/v1/insumos?select=*&order=nome.asc`);
        setInsumos(ins || []);
      } catch (e) {}
      try {
        const ci = await apiFetch(`/rest/v1/insumos_compras?select=*&order=data.desc&limit=1000`);
        setComprasInsumos(ci || []);
      } catch (e) {}
      try {
        const fn = await apiFetch(`/rest/v1/funcionarios?select=*&order=nome.asc`);
        setFuncionarios(fn || []);
      } catch (e) {}
      try {
        const pg = await apiFetch(`/rest/v1/pagamentos_mao_obra?select=*&order=data.desc&limit=1000`);
        setPagamentosMaoObra(pg || []);
      } catch (e) {}
      try {
        const mq = await apiFetch(`/rest/v1/maquinas?select=*&order=nome.asc`);
        setMaquinas(mq || []);
      } catch (e) {}
      try {
        const mc = await apiFetch(`/rest/v1/maquina_clientes?select=*&order=nome.asc`);
        setMaquinaClientes(mc || []);
      } catch (e) {}
      try {
        const ma = await apiFetch(`/rest/v1/maquina_apontamentos?select=*&order=data.desc&limit=1000`);
        setMaquinaApontamentos(ma || []);
      } catch (e) {}
      try {
        const mab = await apiFetch(`/rest/v1/maquina_abastecimentos?select=*&order=data.desc&limit=1000`);
        setMaquinaAbastecimentos(mab || []);
      } catch (e) {}
      try {
        const mman = await apiFetch(`/rest/v1/maquina_manutencoes?select=*&order=data.desc&limit=500`);
        setMaquinaManutencoes(mman || []);
      } catch (e) {}
      try {
        const u = await apiFetch(`/rest/v1/profiles?select=*&order=nome.asc`);
        setUsers(u || []);
      } catch (e) {}
      try {
        const f = await apiFetch(`/rest/v1/financeiro?select=*&order=data.desc&limit=500`);
        setFinanceiro(f || []);
      } catch (e) {}
    } catch (e) {
      if (e.message && e.message.toLowerCase().includes("issued at future")) {
        setBanner({
          type: "error",
          text: "O relógio do seu computador/celular está dessincronizado com a hora certa. Ative 'Definir data e hora automaticamente' nas configurações do aparelho e recarregue a página.",
        });
      } else {
        setBanner({ type: "error", text: "Não foi possível carregar os dados: " + e.message });
      }
    } finally {
      setDataLoading(false);
    }
  }, [apiFetch]);

  useEffect(() => {
    if (session && !recoverySession) loadAll();
  }, [session, recoverySession, loadAll]);

  const handleAuth = async (e) => {
    e.preventDefault();
    setAuthError("");
    setAuthNotice("");
    setAuthLoading(true);
    try {
      if (authMode === "recover") {
        const redirectTo = typeof window !== "undefined" ? window.location.origin + window.location.pathname : "";
        const res = await fetch(`${SUPABASE_URL}/auth/v1/recover?redirect_to=${encodeURIComponent(redirectTo)}`, {
          method: "POST",
          headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email: authForm.email }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.msg || j.error_description || "Erro ao enviar o link.");
        }
        setAuthNotice("Link de recuperação enviado! Confira seu e-mail (e a caixa de spam).");
        setAuthLoading(false);
        return;
      }
      if (authMode === "signup") {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: "POST",
          headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({
            email: authForm.email,
            password: authForm.password,
            data: { nome: authForm.nome || authForm.email },
          }),
        });
        const j = await res.json();
        if (!res.ok) throw new Error(j.msg || j.error_description || "Erro ao criar conta");
        if (!j.access_token) {
          setAuthMode("login");
          setAuthError("Conta criada! Verifique seu e-mail se for solicitado, depois faça login.");
          setAuthLoading(false);
          return;
        }
        setSession({ access_token: j.access_token, user: j.user });
      } else {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email: authForm.email, password: authForm.password }),
        });
        const j = await res.json();
        if (!res.ok) throw new Error(j.msg || j.error_description || "E-mail ou senha inválidos");
        setSession({ access_token: j.access_token, user: j.user });
      }
    } catch (err) {
      setAuthError(err.message);
    } finally {
      setAuthLoading(false);
    }
  };

  useEffect(() => {
    async function fetchProfile() {
      if (!session || !session.user || !session.user.id) return;
      try {
        const rows = await apiFetch(
          `/rest/v1/profiles?select=nome,role,ativo,acesso_rebanhos&id=eq.${session.user.id}`
        );
        if (rows && rows[0]) setProfile(rows[0]);
      } catch (e) {}
    }
    fetchProfile();
  }, [session, apiFetch]);

  const logout = () => {
    setSession(null);
    setProfile(null);
    setAnimals([]);
    setProduction([]);
    setHealthRecords([]);
    setTab("overview");
  };

  if (!session) {
    return (
      <AuthScreen
        authMode={authMode}
        setAuthMode={setAuthMode}
        authForm={authForm}
        setAuthForm={setAuthForm}
        authLoading={authLoading}
        authError={authError}
        setAuthError={setAuthError}
        authNotice={authNotice}
        setAuthNotice={setAuthNotice}
        handleAuth={handleAuth}
      />
    );
  }

  if (recoverySession) {
    return (
      <RecoverPasswordScreen
        apiFetch={apiFetch}
        onDone={() => {
          setSession(null);
          setRecoverySession(false);
          setAuthMode("login");
        }}
      />
    );
  }

  if (profile && (profile.role === "pendente" || profile.ativo === false)) {
    return <PendingScreen onLogout={logout} excluido={profile.ativo === false} />;
  }

  if (!profile) {
    return (
      <div
        style={{
          minHeight: "100vh",
          background: "#F5F2E9",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          color: "#6E7A61",
          fontFamily: "'Inter', sans-serif",
        }}
      >
        <Loader2 size={20} className="animate-spin" />
      </div>
    );
  }

  return (
    <ReadOnlyContext.Provider value={profile?.role === "visualizador"}>
    <div style={{ background: "#F5F2E9", minHeight: "100vh", fontFamily: "'Inter', sans-serif", color: "#1F3324" }}>
      <style>{FONTS}</style>
      <TopBar profile={profile} onLogout={logout} onSettings={() => setShowSettings(true)} onMenu={() => setShowMenu(true)} />
      {showSettings && (
        <SettingsModal
          apiFetch={apiFetch}
          onClose={() => setShowSettings(false)}
          setBanner={setBanner}
        />
      )}
      {banner && (
        <div
          style={{
            background: banner.type === "error" ? "rgba(196,100,75,0.15)" : "rgba(124,154,92,0.15)",
            borderBottom: `1px solid ${banner.type === "error" ? "#B5453A" : "#5BAA47"}`,
            color: banner.type === "error" ? "#A83B2E" : "#6FA050",
          }}
          className="px-4 py-2 text-sm flex items-center justify-between"
        >
          <span>{banner.text}</span>
          <button onClick={() => setBanner(null)}>
            <X size={14} />
          </button>
        </div>
      )}
      <div style={{ maxWidth: 768, margin: "0 auto", paddingBottom: 32, paddingLeft: 16, paddingRight: 16, paddingTop: 20 }}>
        {tab === "overview" && (
          <Overview
            animals={animals}
            production={production}
            documentos={documentos}
            healthRecords={healthRecords}
            protocolos={protocolos}
            piquetes={piquetes}
            ocupacoes={ocupacoes}
            interacoes={interacoes}
            compradores={compradores}
            avesLotes={avesLotes}
            avesProducao={avesProducao}
            avesMortalidade={avesMortalidade}
            profile={profile}
            loading={dataLoading}
          />
        )}
        {tab === "animais" && (
          <AnimaisTab
            animals={animals}
            production={production}
            healthRecords={healthRecords}
            pesagens={pesagens}
            documentos={documentos}
            fazendas={fazendas}
            financeiro={financeiro}
            avesLotes={avesLotes}
            avesProducao={avesProducao}
            avesMortalidade={avesMortalidade}
            avesRacao={avesRacao}
            avesVendas={avesVendas}
            avesVendasAnimais={avesVendasAnimais}
            compradores={compradores}
            apiFetch={apiFetch}
            uploadFoto={uploadFoto}
            uploadDocumento={uploadDocumento}
            reload={loadAll}
            setBanner={setBanner}
            profile={profile}
          />
        )}
        {tab === "producao" && (
          <ProducaoTab
            animals={animals}
            production={production}
            avesLotes={avesLotes}
            avesProducao={avesProducao}
            profile={profile}
            apiFetch={apiFetch}
            reload={loadAll}
            setBanner={setBanner}
          />
        )}
        {tab === "saude" && (

        open={showMenu}

// ---------------- DEFINIR NOVA SENHA (via link de recuperação) ----------------
function RecoverPasswordScreen({ apiFetch, onDone }) {
  const [novaSenha, setNovaSenha] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (novaSenha.length < 6) {
      setError("A senha precisa ter pelo menos 6 caracteres.");
      return;
    }
    if (novaSenha !== confirmar) {
      setError("As senhas não coincidem.");
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/auth/v1/user`, {
        method: "PUT",
        body: JSON.stringify({ password: novaSenha }),
      });
      setSuccess(true);
    } catch (e) {
      setError(e.message || "Erro ao definir a senha. Tente solicitar um novo link.");
    } finally {
      setSaving(false);
    }
  };

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#F5F2E9",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontFamily: "'Inter', sans-serif",
        padding: "24px",
        position: "relative",
        overflow: "hidden",
      }}
    >
      <CampoDecor />
      <style>{FONTS}</style>
      <div style={{ width: "100%", maxWidth: 380, position: "relative", zIndex: 1 }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div
            style={{
              display: "inline-block",
              background: "#FFFFFF",
              borderRadius: 20,
              padding: "16px 26px",
              boxShadow: "0 4px 16px rgba(0,0,0,0.25)",
            }}
          >
            <img src={CAMPO_LOGO_COLOR} alt="Campo na Mão" style={{ height: "64px", verticalAlign: "middle", display: "inline-block" }} />
          </div>
          <div style={{ color: "#6E7A61", fontSize: 14, marginTop: 12, letterSpacing: "0.03em" }}>
            DEFINIR NOVA SENHA
          </div>
        </div>

        <div
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 16,
            padding: 28,
          }}
        >
          {success ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center", textAlign: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#6FA050", fontSize: 15 }}>
                <Check size={20} /> Senha atualizada!
              </div>
              <button
                onClick={onDone}
                style={{
                  background: "#B8862E",
                  color: "#F5F2E9",
                  border: "none",
                  borderRadius: 10,
                  padding: "10px 20px",
                  fontWeight: 700,
                  fontSize: 14,
                  cursor: "pointer",
                }}
              >
                Ir para o login
              </button>
            </div>
          ) : (
            <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <Field
                label="Nova senha"
                type="password"
                value={novaSenha}
                onChange={setNovaSenha}
                placeholder="Mínimo 6 caracteres"
                required
              />
              <Field
                label="Confirmar nova senha"
                type="password"
                value={confirmar}
                onChange={setConfirmar}
                placeholder="Repita a nova senha"
                required
              />
              {error && (
                <div style={{ display: "flex", gap: 8, alignItems: "flex-start", color: "#A83B2E", fontSize: 13 }}>
                  <AlertCircle size={16} style={{ flexShrink: 0, marginTop: 1 }} />
                  <span>{error}</span>
                </div>
              )}
              <SaveButton saving={saving} />
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------------- OVERVIEW ----------------
function animalNome(a) {
  return a.nome || `Brinco ${a.brinco}`;
}

function computeAlerts(animals, production, documentos, healthRecords, protocolos, piquetes, ocupacoes, interacoes, compradores) {
  const today = todayISO();
  const em15dias = addDias(today, 15);
  const alerts = [];

  animals.forEach((a) => {
    if (a.status === "lactacao" && a.data_secagem) {
      if (a.data_secagem <= today) {
        alerts.push({ level: "urgente", text: `${animalNome(a)}: secagem estava prevista para ${formatDataBR(a.data_secagem)}` });
      } else if (a.data_secagem <= em15dias) {
        alerts.push({ level: "atencao", text: `${animalNome(a)}: secagem prevista para ${formatDataBR(a.data_secagem)}` });
      }
    }
    if (a.status === "prenhe" && a.previsao_parto) {
      if (a.previsao_parto <= today) {
        alerts.push({ level: "urgente", text: `${animalNome(a)}: parto previsto para ${formatDataBR(a.previsao_parto)} (fique atento)` });
      } else if (a.previsao_parto <= em15dias) {
        alerts.push({ level: "atencao", text: `${animalNome(a)}: parto previsto para ${formatDataBR(a.previsao_parto)}` });
      }
    }
  });

  const produziramHoje = new Set(production.filter((p) => p.data === today).map((p) => p.animal_id));
  animals.forEach((a) => {
    if (a.status === "lactacao" && !produziramHoje.has(a.id)) {
      alerts.push({ level: "atencao", text: `${animalNome(a)}: sem produção lançada hoje` });
    }
  });

  if (documentos) {
    animals
      .filter((a) => a.proposito === "reprodutor")
      .forEach((a) => {
        const exames = documentos
          .filter((d) => d.animal_id === a.id && d.tipo === "exame_andrologico")
          .sort((x, y) => (x.data_validade || "") < (y.data_validade || "") ? 1 : -1);
        const ultimo = exames[0];
        if (!ultimo) {
          alerts.push({ level: "atencao", text: `${animalNome(a)}: reprodutor sem exame andrológico registrado` });
        } else if (ultimo.data_validade && ultimo.data_validade < today) {
          alerts.push({ level: "urgente", text: `${animalNome(a)}: exame andrológico vencido em ${formatDataBR(ultimo.data_validade)}` });
        }
      });
  }

  if (healthRecords && protocolos) {
    const hojeVac = today;
    animals.forEach((a) => {
      protocolos
        .filter((p) => p.ativo && (!p.finalidade_aplicavel || p.finalidade_aplicavel === (a.finalidade || "leite")))
        .forEach((p) => {
          const aplicacoes = healthRecords
            .filter((h) => h.animal_id === a.id && h.tipo.toLowerCase() === p.nome.toLowerCase())
            .sort((x, y) => (x.data < y.data ? 1 : -1));
          const ultima = aplicacoes[0];
          if (ultima) {
            const proxima = addDias(ultima.data, p.intervalo_dias);
            if (proxima < hojeVac) {
              alerts.push({ level: "atencao", text: `${animalNome(a)}: ${p.nome} atrasada desde ${formatDataBR(proxima)}` });
            }
          }
        });
    });
  }

  if (piquetes && ocupacoes) {
    ocupacoes
      .filter((o) => !o.data_saida && o.data_prevista_saida && o.data_prevista_saida < today)
      .forEach((o) => {
        const piquete = piquetes.find((p) => p.id === o.piquete_id);
        alerts.push({
          level: "urgente",
          text: `${piquete ? piquete.nome : "Piquete"}: retirada de "${o.descricao_lote}" prevista para ${formatDataBR(o.data_prevista_saida)} (vencida)`,
        });
      });
  }

  if (interacoes && compradores) {
    compradores.forEach((c) => {
      const doComprador = interacoes.filter((i) => i.comprador_id === c.id).sort((x, y) => (x.data < y.data ? 1 : -1));
      const ultima = doComprador[0];
      if (ultima && ultima.proximo_contato && ultima.proximo_contato < today) {
        alerts.push({ level: "atencao", text: `${c.nome}: follow-up atrasado desde ${formatDataBR(ultima.proximo_contato)}` });
      }
    });
  }

  const ordem = { urgente: 0, atencao: 1 };
  return alerts.sort((x, y) => ordem[x.level] - ordem[y.level]);
}

function computeEvolucao(production, dias) {
  const hoje = todayISO();
  const labels = [];
  const valores = [];
  for (let i = dias - 1; i >= 0; i--) {
    const dia = addDias(hoje, -i);
    labels.push(dia.slice(8, 10) + "/" + dia.slice(5, 7));
    const total = production.filter((p) => p.data === dia).reduce((s, p) => s + Number(p.litros), 0);
    valores.push(Number(total.toFixed(1)));
  }
  return { labels, valores };
}

function computeRanking(animals, production, monthPrefix, top) {
  const totals = {};
  production.forEach((p) => {
    if (!p.data.startsWith(monthPrefix)) return;
    totals[p.animal_id] = (totals[p.animal_id] || 0) + Number(p.litros);
  });
  const rows = Object.entries(totals)
    .map(([animalId, total]) => {
      const a = animals.find((x) => x.id === animalId);
      return { nome: a ? animalNome(a) : "Animal removido", total };
    })
    .sort((a, b) => b.total - a.total)
    .slice(0, top);
  return {
    labels: rows.map((r) => r.nome),
    valores: rows.map((r) => Number(r.total.toFixed(1))),
  };
}

function computeEvolucaoOvos(producao, dias) {
  const hoje = todayISO();
  const labels = [];
  const valores = [];
  for (let i = dias - 1; i >= 0; i--) {
    const dia = addDias(hoje, -i);
    labels.push(dia.slice(8, 10) + "/" + dia.slice(5, 7));
    const total = producao.filter((p) => p.data === dia).reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
    valores.push(total);
  }
  return { labels, valores };
}

function computeRankingLotesOvos(lotes, producao, monthPrefix, top) {
  const totals = {};
  producao.forEach((p) => {
    if (!p.data.startsWith(monthPrefix)) return;
    totals[p.lote_id] = (totals[p.lote_id] || 0) + Number(p.quantidade_ovos || 0);
  });
  const rows = Object.entries(totals)
    .map(([loteId, total]) => {
      const l = lotes.find((x) => x.id === loteId);
      return { nome: l ? l.nome : "Lote removido", total };
    })
    .sort((a, b) => b.total - a.total)
    .slice(0, top);
  return {
    labels: rows.map((r) => r.nome),
    valores: rows.map((r) => r.total),
  };
}

function computeRankingDetalhado(animals, production, monthPrefix) {
  const totals = {};
  const dias = {};
  production.forEach((p) => {
    if (!p.data.startsWith(monthPrefix)) return;
    totals[p.animal_id] = (totals[p.animal_id] || 0) + Number(p.litros);
    dias[p.animal_id] = dias[p.animal_id] || new Set();
    dias[p.animal_id].add(p.data);
  });
  return Object.entries(totals)
    .map(([animalId, total]) => {
      const a = animals.find((x) => x.id === animalId);
      const numDias = dias[animalId] ? dias[animalId].size : 0;
      return {
        nome: a ? animalNome(a) : "Animal removido",
        status: a ? a.status : null,
        total,
        media: numDias > 0 ? total / numDias : 0,
      };
    })
    .sort((a, b) => b.total - a.total);
}

function loadDismissedAlerts() {
  try {
    const raw = localStorage.getItem("rebanho_alertas_fechados");
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (parsed.data !== todayISO()) return [];
    return parsed.textos || [];
  } catch (e) {
    return [];
  }
}

function saveDismissedAlerts(textos) {
  try {
    localStorage.setItem("rebanho_alertas_fechados", JSON.stringify({ data: todayISO(), textos }));
  } catch (e) {}
}

function computeRelatorioPorHorario(animals, production, data) {
  return animals
    .filter((a) => (a.finalidade || "leite") === "leite")
    .map((a) => {
      const registrosDia = production.filter((p) => p.animal_id === a.id && p.data === data);
      const manha = registrosDia.filter((p) => p.periodo === "manha").reduce((s, p) => s + Number(p.litros), 0);
      const tarde = registrosDia.filter((p) => p.periodo === "tarde").reduce((s, p) => s + Number(p.litros), 0);
      return { nome: animalNome(a), manha, tarde, total: manha + tarde };
    })
    .sort((a, b) => b.total - a.total);
}

function baixarRelatorioDiarioPDF(dataRelatorio, linhas) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  try {
    doc.addImage(CAMPO_LOGO_COLOR, "PNG", 14, 10, 28, 28 * (297 / 1211));
  } catch (e) {}

  doc.setFontSize(14);
  doc.setFont(undefined, "bold");
  doc.text("Campo na Mão", 48, 18);
  doc.setFont(undefined, "normal");
  doc.setFontSize(10);
  doc.text("Relatorio de Producao - " + formatDataBR(dataRelatorio), 48, 25);

  let y = 40;
  doc.setDrawColor(220);
  doc.line(14, y - 8, 196, y - 8);
  doc.setFontSize(10);
  doc.setFont(undefined, "bold");
  doc.text("Animal", 14, y);
  doc.text("Manha (L)", 100, y);
  doc.text("Tarde (L)", 140, y);
  doc.text("Total (L)", 178, y);
  doc.setFont(undefined, "normal");
  y += 4;
  doc.line(14, y, 196, y);
  y += 8;

  let totalManha = 0;
  let totalTarde = 0;
  linhas.forEach((l) => {
    if (y > 275) {
      doc.addPage();
      y = 20;
    }
    doc.text(l.nome, 14, y);
    doc.text(l.manha.toFixed(1), 100, y);
    doc.text(l.tarde.toFixed(1), 140, y);
    doc.text(l.total.toFixed(1), 178, y);
    totalManha += l.manha;
    totalTarde += l.tarde;
    y += 7;
  });

  y += 4;
  doc.line(14, y, 196, y);
  y += 8;
  doc.setFont(undefined, "bold");
  doc.text("Total geral", 14, y);
  doc.text(totalManha.toFixed(1), 100, y);
  doc.text(totalTarde.toFixed(1), 140, y);
  doc.text((totalManha + totalTarde).toFixed(1), 178, y);

  doc.save(`producao_${dataRelatorio}.pdf`);
}

function Overview({ animals, production, documentos, healthRecords, protocolos, piquetes, ocupacoes, interacoes, compradores, avesLotes, avesProducao, avesMortalidade, profile, loading }) {
  const today = todayISO();
  const monthPrefix = today.slice(0, 7);
  const [dismissed, setDismissed] = useState([]);

  useEffect(() => {
    setDismissed(loadDismissedAlerts());
  }, []);

  const acessos = profile?.role === "administrador" ? ["leite", "corte", "bezerro", "aves"] : profile?.acesso_rebanhos || [];
  const temLeite = profile?.role === "administrador" || acessos.includes("leite");
  const temAves = profile?.role === "administrador" || acessos.includes("aves");

  const emLactacao = animals.filter((a) => a.status === "lactacao").length;
  const secas = animals.filter((a) => a.status === "seca").length;
  const prenhes = animals.filter((a) => a.status === "prenhe").length;
  const hojeLitros = production.filter((p) => p.data === today).reduce((s, p) => s + Number(p.litros), 0);
  const mesLitros = production.filter((p) => p.data.startsWith(monthPrefix)).reduce((s, p) => s + Number(p.litros), 0);
  const media = emLactacao > 0 ? (hojeLitros / emLactacao).toFixed(1) : "0";

  const stats = [
    { label: "Produção hoje", value: `${hojeLitros.toFixed(1)} L`, color: "#B8862E" },
    { label: "Produção no mês", value: `${mesLitros.toFixed(1)} L`, color: "#5BAA47" },
    { label: "Média por vaca", value: `${media} L`, color: "#3E7C99" },
    { label: "Em lactação", value: emLactacao, color: "#5BAA47" },
    { label: "Secas", value: secas, color: "#B8862E" },
    { label: "Prenhes", value: prenhes, color: "#3E7C99" },
  ];

  const avesLotesAtivos = (avesLotes || []).filter((l) => l.status !== "encerrado");
  const ovosHoje = (avesProducao || []).filter((p) => p.data === today).reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
  const producaoOvosMes = (avesProducao || []).filter((p) => p.data.startsWith(monthPrefix));
  const ovosMes = producaoOvosMes.reduce((s, p) => s + Number(p.quantidade_ovos || 0), 0);
  const totalAlojadoAtivo = avesLotesAtivos.reduce((s, l) => s + Number(l.quantidade_alojada || 0), 0);
  const taxasPosturaMes = producaoOvosMes
    .map((p) => {
      const lote = (avesLotes || []).find((l) => l.id === p.lote_id);
      if (!lote || !lote.quantidade_alojada) return null;

function addDias(dataStr, dias) {
  if (!dataStr) return "";

function computeGanhoPesoRanking(animaisFiltrados, pesagens) {
  return animaisFiltrados
    .map((a) => {
      const registros = pesagens.filter((p) => p.animal_id === a.id).sort((x, y) => (x.data < y.data ? -1 : 1));
      if (registros.length < 2) return null;
      const primeira = registros[0];
      const ultima = registros[registros.length - 1];
      const dias = (new Date(ultima.data) - new Date(primeira.data)) / (1000 * 60 * 60 * 24);
      if (dias <= 0) return null;
      const gpd = (Number(ultima.peso) - Number(primeira.peso)) / dias;
      return { nome: animalNome(a), gpd, pesoAtual: Number(ultima.peso) };
    })
    .filter(Boolean)
    .sort((a, b) => b.gpd - a.gpd);
}

function parseBrincosLote(texto) {
  const tokens = texto
    .split(/[\n,;]+/)
    .map((t) => t.trim())
    .filter(Boolean);
  const resultado = [];
  const vistos = new Set();
  tokens.forEach((tok) => {
    const rangeMatch = tok.match(/^(\d+)\s*[-–]\s*(\d+)$/);
    if (rangeMatch) {
      let ini = parseInt(rangeMatch[1], 10);
      let fim = parseInt(rangeMatch[2], 10);
      const largura = rangeMatch[1].length;
      if (ini <= fim && fim - ini < 2000) {
        for (let n = ini; n <= fim; n++) {
          const brinco = String(n).padStart(largura, "0");
          if (!vistos.has(brinco)) {
            vistos.add(brinco);
            resultado.push(brinco);
          }
        }
      }
    } else if (!vistos.has(tok)) {
      vistos.add(tok);
      resultado.push(tok);
    }
  });
  return resultado;
}

function LoteBrincosModal({ animals, fazendas, apiFetch, reload, setBanner, onClose }) {
  const [finalidade, setFinalidade] = useState("leite");
  const [fazendaId, setFazendaId] = useState("");
  const [sexo, setSexo] = useState("");
  const [brincosTexto, setBrincosTexto] = useState("");
  const [saving, setSaving] = useState(false);

  const existentes = new Set(animals.map((a) => String(a.brinco)));
  const parsed = parseBrincosLote(brincosTexto);
  const novos = parsed.filter((b) => !existentes.has(b));
  const duplicados = parsed.filter((b) => existentes.has(b));

  const submit = async (e) => {
    e.preventDefault();
    if (novos.length === 0) {
      setBanner({ type: "error", text: "Nenhum brinco novo para cadastrar. Verifique a lista." });
      return;
    }
    setSaving(true);
    try {
      const statusDefault = STATUS_POR_FINALIDADE[finalidade][0];
      const payload = novos.map((brinco) => ({
        brinco,
        finalidade,
        status: statusDefault,
        sexo: sexo || null,
        fazenda_id: fazendaId || null,
      }));
      await apiFetch(`/rest/v1/animals`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify(payload),
      });
      setBanner({
        type: "success",
        text: `${novos.length} animal(is) cadastrado(s) com brinco.${duplicados.length ? ` ${duplicados.length} ignorado(s) por já existir.` : ""} Agora ajuste os detalhes de cada um.`,
      });
      reload();
      onClose();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao cadastrar em lote: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <div

        <div style={{ fontSize: 12, color: "#6E7A61", marginBottom: 14 }}>
          Cadastre vários animais de uma vez, só com o brinco. Depois é só abrir cada um na lista e completar raça, peso, datas etc.
        </div>

        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>

    setForm((f) => ({ ...f, finalidade, status: STATUS_INICIAL_POR_FINALIDADE[finalidade] }));
  };

  const handleFotoChange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploadingFoto(true);
    try {
      const url = await uploadFoto(file);
      setForm((f) => ({ ...f, foto_url: url }));
      setBanner({ type: "success", text: "Foto enviada." });
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao enviar foto: " + err.message });
    } finally {
      setUploadingFoto(false);
    }
  };

  const setCobertura = (v) => {
    setForm((f) => ({
      ...f,
      data_cobertura: v,
      previsao_parto: f.previsao_parto ? f.previsao_parto : addDias(v, 283),
    }));
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.brinco) return;
    setSaving(true);
    try {
      const payload = {
        brinco: form.brinco,
        nome: form.nome || null,
        raca: form.raca || null,
        finalidade: form.finalidade,
        sexo: form.sexo || null,
        proposito: form.proposito || null,
        status: form.status,
        foto_url: form.foto_url || null,
        fazenda_id: form.fazenda_id || null,
        data_nascimento: form.data_nascimento || null,
        data_cobertura: form.data_cobertura || null,
        previsao_parto: form.previsao_parto || null,
        data_ultimo_parto: form.data_ultimo_parto || null,
        numero_partos: form.numero_partos !== "" ? Number(form.numero_partos) : null,
        data_inicio_lactacao: form.data_inicio_lactacao || null,
        data_secagem: form.data_secagem || null,
        mae_id: form.mae_id || null,
        peso_nascimento: form.peso_nascimento !== "" ? Number(form.peso_nascimento) : null,
        data_desmame: form.data_desmame || null,
        data_compra: form.data_compra || null,
        peso_compra: form.peso_compra !== "" ? Number(form.peso_compra) : null,
        valor_compra: form.valor_compra !== "" ? Number(form.valor_compra) : null,
        destino: form.destino || null,
        data_venda: form.data_venda || null,
        peso_venda: form.peso_venda !== "" ? Number(form.peso_venda) : null,
        valor_venda: form.valor_venda !== "" ? Number(form.valor_venda) : null,
      };
      if (editingId) {
        await apiFetch(`/rest/v1/animals?id=eq.${editingId}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Animal atualizado com sucesso." });
      } else {
        await apiFetch(`/rest/v1/animals`, {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Animal cadastrado com sucesso." });
      }
      setForm(EMPTY_ANIMAL_FORM);
      setShowForm(false);
      setEditingId(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removeAnimal = async (a) => {
    const confirmar = window.confirm(
      `Excluir ${a.nome || `brinco ${a.brinco}`}? Isso também apaga o histórico de produção e saúde ligado a ele. Essa ação não pode ser desfeita.`
    );
    if (!confirmar) return;
    setDeletingId(a.id);
    try {
      await apiFetch(`/rest/v1/animals?id=eq.${a.id}`, {
        method: "DELETE",
        headers: { Prefer: "return=minimal" },
      });
      setBanner({ type: "success", text: "Animal excluído." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    } finally {
      setDeletingId(null);
    }
  };

  const animaisFiltrados = animals
    .filter((a) => filtroFinalidade === "todos" || (a.finalidade || "leite") === filtroFinalidade)
    .filter((a) => filtroFazenda === "todas" || a.fazenda_id === filtroFazenda);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Animais ({animals.length})</SectionTitle>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={() => setShowLoteModal(true)}
            style={{
              background: "#F5F2E9",
              border: "1px solid rgba(11,61,46,0.18)",
              borderRadius: 10,
              padding: "0 12px",
              height: 38,
              color: "#1F3324",
              fontSize: 12,
              fontWeight: 700,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            Brincos em lote
          </button>
          <IconButton onClick={startAdd} active={showForm} />
        </div>
      </div>

      {showLoteModal && (
        <LoteBrincosModal animals={animals} fazendas={fazendas} apiFetch={apiFetch} reload={reload} setBanner={setBanner} onClose={() => setShowLoteModal(false)} />
      )}

      {showForm && (
        <form
          onSubmit={submit}
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 14,
            padding: 18,
            marginTop: 14,
            display: "flex",
            flexDirection: "column",
            gap: 12,
          }}
        >
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
            {editingId ? "Editando animal" : "Novo animal"}
          </div>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Foto (opcional)</span>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {form.foto_url ? (
                <img
                  src={form.foto_url}
                  alt="Foto do animal"
                  style={{ width: 56, height: 56, borderRadius: 10, objectFit: "cover", flexShrink: 0 }}
                />
              ) : (
                <div
                  style={{
                    width: 56,
                    height: 56,
                    borderRadius: 10,
                    background: "#F5F2E9",
                    border: "1px dashed rgba(11,61,46,0.22)",
                    flexShrink: 0,
                  }}
                />
              )}
              <label
                style={{
                  flex: 1,
                  textAlign: "center",
                  background: "rgba(11,61,46,0.10)",
                  border: "1px solid rgba(11,61,46,0.18)",
                  borderRadius: 8,
                  padding: "10px 0",
                  color: "#1F3324",
                  fontSize: 13,
                  fontWeight: 600,
                  cursor: uploadingFoto ? "default" : "pointer",
                  opacity: uploadingFoto ? 0.6 : 1,
                }}
              >
                {uploadingFoto ? "Enviando..." : form.foto_url ? "Trocar foto" : "Escolher foto"}
                <input type="file" accept="image/*" onChange={handleFotoChange} disabled={uploadingFoto} style={{ display: "none" }} />
              </label>
            </div>
          </label>

          <Field label="Brinco (nº de identificação)" value={form.brinco} onChange={(v) => setForm({ ...form, brinco: v })} required />
          <Field label="Nome (opcional)" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} />
          <Field label="Raça" value={form.raca} onChange={(v) => setForm({ ...form, raca: v })} />

          {fazendas.length > 0 && (
            <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Fazenda</span>
              <select
                value={form.fazenda_id}
                onChange={(e) => setForm({ ...form, fazenda_id: e.target.value })}
                style={{
                  background: "#F5F2E9",
                  border: "1px solid rgba(11,61,46,0.14)",
                  borderRadius: 8,
                  padding: "10px 12px",
                  color: "#1F3324",
                  fontSize: 14,
                }}
              >
                <option value="">Não informada</option>
                {fazendas.map((f) => (
                  <option key={f.id} value={f.id}>
                    {f.nome}
                  </option>
                ))}
              </select>
            </label>
          )}

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Finalidade</span>
            <div style={{ display: "flex", gap: 8 }}>
              {Object.entries(FINALIDADE_LABELS).map(([k, label]) => (
                <button
                  type="button"
                  key={k}
                  onClick={() => setFinalidade(k)}
                  style={{
                    flex: 1,
                    padding: "10px 0",
                    borderRadius: 8,
                    border: "1px solid rgba(11,61,46,0.14)",
                    background: form.finalidade === k ? FINALIDADE_COLORS[k] : "#F5F2E9",
                    color: form.finalidade === k ? "#F5F2E9" : "#1F3324",
                    fontWeight: 600,
                    fontSize: 13,
                    cursor: "pointer",
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
          </label>

          <Field label="Data de nascimento (opcional)" type="date" value={form.data_nascimento} onChange={(v) => setForm({ ...form, data_nascimento: v })} />

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Sexo</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[
                { k: "femea", label: "Fêmea" },
                { k: "macho", label: "Macho" },
              ].map(({ k, label }) => (
                <button
                  type="button"
                  key={k}
                  onClick={() => setForm({ ...form, sexo: k })}
                  style={{
                    flex: 1,
                    padding: "10px 0",
                    borderRadius: 8,
                    border: "1px solid rgba(11,61,46,0.14)",
                    background: form.sexo === k ? "#5BAA47" : "#F5F2E9",
                    color: form.sexo === k ? "#F5F2E9" : "#1F3324",
                    fontWeight: 600,
                    fontSize: 13,
                    cursor: "pointer",
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
          </label>

          {(form.finalidade === "corte" || form.finalidade === "bezerro") && (
            <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Propósito</span>
              <select
                value={form.proposito}
                onChange={(e) => setForm({ ...form, proposito: e.target.value })}
                style={{
                  background: "#F5F2E9",
                  border: "1px solid rgba(11,61,46,0.14)",
                  borderRadius: 8,
                  padding: "10px 12px",
                  color: "#1F3324",
                  fontSize: 14,
                }}
              >
                <option value="">Não definido</option>
                {Object.entries(PROPOSITO_LABELS).map(([k, label]) => (
                  <option key={k} value={k}>
                    {label}
                  </option>
                ))}
              </select>
            </label>
          )}

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Status</span>
            <select
              value={form.status}
              onChange={(e) => setForm({ ...form, status: e.target.value })}
              style={{
                background: "#F5F2E9",
                border: "1px solid rgba(11,61,46,0.14)",
                borderRadius: 8,
                padding: "10px 12px",
                color: "#1F3324",
                fontSize: 14,
              }}
            >
              {STATUS_POR_FINALIDADE[form.finalidade].map((k) => (
                <option key={k} value={k}>
                  {STATUS_LABELS[k]}
                </option>
              ))}
            </select>
          </label>

          {form.finalidade === "leite" && (
            <>
              <div style={{ height: 1, background: "rgba(11,61,46,0.12)", margin: "4px 0" }} />
              <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
                Informações reprodutivas (opcional)
              </div>
              <Field
                label="Data de inseminação / cobertura"
                type="date"
                value={form.data_cobertura}
                onChange={setCobertura}
              />
              <Field
                label="Previsão de parto"
                type="date"
                value={form.previsao_parto}
                onChange={(v) => setForm({ ...form, previsao_parto: v })}
              />
              <Field
                label="Data do último parto"
                type="date"
                value={form.data_ultimo_parto}
                onChange={(v) => setForm({ ...form, data_ultimo_parto: v })}
              />
              <Field
                label="Número de partos"
                type="number"
                value={form.numero_partos}
                onChange={(v) => setForm({ ...form, numero_partos: v })}
              />
              <Field
                label="Data de início da lactação"
                type="date"
                value={form.data_inicio_lactacao}
                onChange={(v) => setForm({ ...form, data_inicio_lactacao: v })}
              />
              <Field
                label="Data de secagem"
                type="date"
                value={form.data_secagem}
                onChange={(v) => setForm({ ...form, data_secagem: v })}
              />
            </>
          )}

          {form.finalidade === "bezerro" && (
            <>
              <div style={{ height: 1, background: "rgba(11,61,46,0.12)", margin: "4px 0" }} />
              <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
                Informações do bezerro (opcional)
              </div>
              <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Mãe</span>
                <select
                  value={form.mae_id}
                  onChange={(e) => setForm({ ...form, mae_id: e.target.value })}
                  style={{
                    background: "#F5F2E9",
                    border: "1px solid rgba(11,61,46,0.14)",
                    borderRadius: 8,
                    padding: "10px 12px",
                    color: "#1F3324",
                    fontSize: 14,
                  }}
                >
                  <option value="">Não informada</option>
                  {animals
                    .filter((a) => a.id !== editingId)
                    .map((a) => (
                      <option key={a.id} value={a.id}>
                        {animalNome(a)}
                      </option>
                    ))}
                </select>
              </label>
              <Field
                label="Peso ao nascer (kg)"
                type="number"
                value={form.peso_nascimento}
                onChange={(v) => setForm({ ...form, peso_nascimento: v })}
                placeholder="0.0"
              />
              <Field
                label="Data de desmame"
                type="date"
                value={form.data_desmame}
                onChange={(v) => setForm({ ...form, data_desmame: v })}
              />
            </>
          )}

          {(form.finalidade === "corte" || form.finalidade === "leite") && (
            <>
              <div style={{ height: 1, background: "rgba(11,61,46,0.12)", margin: "4px 0" }} />
              <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
                Aquisição do animal (opcional)
              </div>
              <Field label="Data da compra" type="date" value={form.data_compra} onChange={(v) => setForm({ ...form, data_compra: v })} />
              <Field
                label="Peso na compra (kg)"
                type="number"
                value={form.peso_compra}
                onChange={(v) => setForm({ ...form, peso_compra: v })}
                placeholder="0.0"
              />
              <Field
                label="Valor da compra (R$)"
                type="number"
                value={form.valor_compra}
                onChange={(v) => setForm({ ...form, valor_compra: v })}
                placeholder="0.00"
              />
            </>
          )}

          {form.finalidade === "corte" && (
            <>
              <div style={{ height: 1, background: "rgba(11,61,46,0.12)", margin: "4px 0" }} />
              <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
                Informações de corte (opcional)
              </div>
              <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Destino</span>
                <select
                  value={form.destino}
                  onChange={(e) => setForm({ ...form, destino: e.target.value })}
                  style={{
                    background: "#F5F2E9",
                    border: "1px solid rgba(11,61,46,0.14)",
                    borderRadius: 8,
                    padding: "10px 12px",
                    color: "#1F3324",
                    fontSize: 14,
                  }}
                >
                  <option value="">Não definido</option>
                  <option value="plantel">Permanece no plantel</option>
                  <option value="venda">Venda</option>
                  <option value="abate">Abate</option>
                </select>
              </label>
              {form.destino === "venda" && (
                <>
                  <Field label="Data da venda" type="date" value={form.data_venda} onChange={(v) => setForm({ ...form, data_venda: v })} />
                  <Field
                    label="Peso na venda (kg)"
                    type="number"
                    value={form.peso_venda}
                    onChange={(v) => setForm({ ...form, peso_venda: v })}
                    placeholder="0.0"
                  />
                  <Field
                    label="Valor da venda (R$)"
                    type="number"
                    value={form.valor_venda}
                    onChange={(v) => setForm({ ...form, valor_venda: v })}
                    placeholder="0.00"
                  />
                </>
              )}
            </>
          )}

          <div style={{ display: "flex", gap: 8 }}>
            <SaveButton saving={saving} />
            <button
              type="button"
              onClick={cancelForm}
              style={{
                background: "rgba(11,61,46,0.10)",
                border: "1px solid rgba(11,61,46,0.18)",
                borderRadius: 10,
                padding: "11px 18px",
                color: "#1F3324",
                fontSize: 14,
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              Cancelar
            </button>
          </div>
        </form>
      )}

      <div style={{ display: "flex", gap: 6, marginTop: 16, overflowX: "auto" }}>
        {["todos", "leite", "corte", "bezerro"].map((f) => (
          <button
            key={f}
            onClick={() => setFiltroFinalidade(f)}
            style={{
              flexShrink: 0,
              padding: "7px 14px",
              borderRadius: 20,
              border: "1px solid " + (filtroFinalidade === f ? (FINALIDADE_COLORS[f] || "#B8862E") : "rgba(11,61,46,0.18)"),
              background: filtroFinalidade === f ? (FINALIDADE_COLORS[f] || "#B8862E") + "22" : "transparent",
              color: filtroFinalidade === f ? (FINALIDADE_COLORS[f] || "#B8862E") : "#6E7A61",
              fontSize: 12,
              fontWeight: 600,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            {f === "todos" ? `Todos (${animals.length})` : `${FINALIDADE_LABELS[f]} (${animals.filter((a) => (a.finalidade || "leite") === f).length})`}
          </button>
        ))}
        {temAcessoAves && (
          <button
            onClick={() => setFiltroFinalidade("aves")}
            style={{
              flexShrink: 0,
              padding: "7px 14px",
              borderRadius: 20,
              border: "1px solid " + (filtroFinalidade === "aves" ? "#8C6A3F" : "rgba(11,61,46,0.18)"),
              background: filtroFinalidade === "aves" ? "#8C6A3F22" : "transparent",
              color: filtroFinalidade === "aves" ? "#8C6A3F" : "#6E7A61",
              fontSize: 12,
              fontWeight: 600,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            Aves ({avesLotes.filter((l) => l.status !== "encerrado").length} lote{avesLotes.filter((l) => l.status !== "encerrado").length === 1 ? "" : "s"})
          </button>
        )}
      </div>

      {filtroFinalidade === "aves" ? (
        <div style={{ marginTop: 16 }}>
          <AvesTab
            lotes={avesLotes}
            producao={avesProducao}
            mortalidade={avesMortalidade}
            racao={avesRacao}
            vendasAnimais={avesVendasAnimais}
            compradores={compradores}
            fazendas={fazendas}
            apiFetch={apiFetch}
            reload={reload}
            setBanner={setBanner}
          />
        </div>
      ) : (
        <>

      {fazendas.length > 1 && (
        <div style={{ display: "flex", gap: 6, marginTop: 8, overflowX: "auto" }}>
          <button
            onClick={() => setFiltroFazenda("todas")}
            style={{
              flexShrink: 0,
              padding: "6px 12px",
              borderRadius: 20,
              border: "1px solid " + (filtroFazenda === "todas" ? "#3E7C99" : "rgba(11,61,46,0.18)"),
              background: filtroFazenda === "todas" ? "#3E7C9922" : "transparent",
              color: filtroFazenda === "todas" ? "#3E7C99" : "#6E7A61",
              fontSize: 11,
              fontWeight: 600,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            Todas as fazendas
          </button>
          {fazendas.map((f) => (
            <button
              key={f.id}
              onClick={() => setFiltroFazenda(f.id)}
              style={{
                flexShrink: 0,
                padding: "6px 12px",
                borderRadius: 20,
                border: "1px solid " + (filtroFazenda === f.id ? "#3E7C99" : "rgba(11,61,46,0.18)"),
                background: filtroFazenda === f.id ? "#3E7C9922" : "transparent",
                color: filtroFazenda === f.id ? "#3E7C99" : "#6E7A61",
                fontSize: 11,
                fontWeight: 600,
                cursor: "pointer",
                whiteSpace: "nowrap",
              }}
            >
              {f.nome}
            </button>
          ))}
        </div>
      )}

      {(filtroFinalidade === "corte" || filtroFinalidade === "bezerro") && animaisFiltrados.length > 0 && (
        <>
          <BarChartCard
            title="Ganho de peso geral (kg/dia)"
            labels={computeGanhoPesoRanking(animaisFiltrados, pesagens).map((r) => r.nome)}
            valores={computeGanhoPesoRanking(animaisFiltrados, pesagens).map((r) => Number(r.gpd.toFixed(2)))}
            color="#5BAA47"
            emptyText="Registre pelo menos 2 pesagens por animal para ver o gráfico de ganho de peso."
          />
          <RankingGanhoPeso animaisFiltrados={animaisFiltrados} pesagens={pesagens} />
        </>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {animaisFiltrados.length === 0 && <EmptyState text="Nenhum animal cadastrado nessa categoria ainda." />}
        {animaisFiltrados.map((a) => (
          <div
            key={a.id}
            style={{
              background: "#FFFFFF",
              border: "1px solid rgba(11,61,46,0.12)",
              borderRadius: 12,
              padding: "12px 16px",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                {a.foto_url ? (
                  <img
                    src={a.foto_url}

                  {a.status === "prenhe" && a.previsao_parto && (
                    <div style={{ fontSize: 12, color: "#3E7C99", marginTop: 2 }}>Previsão de parto: {formatDataBR(a.previsao_parto)}</div>
                  )}
                  {a.status === "lactacao" && a.data_secagem && (
                    <div style={{ fontSize: 12, color: "#B8862E", marginTop: 2 }}>Secagem prevista: {formatDataBR(a.data_secagem)}</div>

                  {a.finalidade === "corte" && a.valor_venda != null && a.valor_compra != null && (
                    <div style={{ fontSize: 12, color: Number(a.valor_venda) - Number(a.valor_compra) >= 0 ? "#5BAA47" : "#B5453A", marginTop: 2, fontWeight: 600 }}>
                      Lucro: R$ {(Number(a.valor_venda) - Number(a.valor_compra)).toFixed(2)}
                    </div>
                  )}
