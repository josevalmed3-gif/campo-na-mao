          {form.midia_url && !uploading && (
            <div style={{ fontSize: 12, color: "#5BAA47" }}>
              [OK] {form.midia_tipo === "foto" ? "Foto" : form.midia_tipo === "video" ? "Vídeo" : "Áudio"} anexado
            </div>
          )}

          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
        {ordenadas.length === 0 && <EmptyState text="Nenhuma ocorrência registrada ainda." />}
        {ordenadas.map((o) => {
          const lote = lotes.find((l) => l.id === o.lote_id);
          const baia = baias.find((b) => b.id === o.baia_id);
          return (
            <div key={o.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 12, color: "#6E7A61" }}>
                  {formatDataBR(o.data)} {lote ? `• ${lote.descricao}` : baia ? `• ${baia.nome}` : ""}
                </div>
                <Badge color="#3E7C99">{TIPO_OCORRENCIA_CONF_LABELS[o.tipo] || o.tipo}</Badge>
              </div>
              <div style={{ fontSize: 14, marginTop: 6 }}>{o.descricao}</div>
              {o.midia_url && o.midia_tipo === "foto" && (
                <img src={o.midia_url} alt="Ocorrência" style={{ width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 8, marginTop: 8 }} />
              )}
              {o.midia_url && o.midia_tipo === "video" && <video src={o.midia_url} controls style={{ width: "100%", borderRadius: 8, marginTop: 8 }} />}
              {o.midia_url && o.midia_tipo === "audio" && <audio src={o.midia_url} controls style={{ width: "100%", marginTop: 8 }} />}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------- PASTAGEM (piquetes e rodízio) ----------------
function PastagemSubTab({ piquetes, ocupacoes, fazendas, isAdmin, apiFetch, reload, setBanner }) {
  const [showFormPiquete, setShowFormPiquete] = useState(false);
  const [formPiquete, setFormPiquete] = useState({ nome: "", fazenda_id: "", area_hectares: "" });
  const [showFormOcupacao, setShowFormOcupacao] = useState(null);
  const [formOcupacao, setFormOcupacao] = useState({ descricao_lote: "", quantidade_animais: "", data_entrada: todayISO(), data_prevista_saida: "" });
  const [saving, setSaving] = useState(false);

  const ocupacaoAtual = (piqueteId) => ocupacoes.find((o) => o.piquete_id === piqueteId && !o.data_saida);

  const submitPiquete = async (e) => {
    e.preventDefault();
    if (!formPiquete.nome) return;
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/piquetes`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          nome: formPiquete.nome,
          fazenda_id: formPiquete.fazenda_id || null,
          area_hectares: formPiquete.area_hectares !== "" ? Number(formPiquete.area_hectares) : null,
        }),
      });
      setBanner({ type: "success", text: "Piquete cadastrado." });
      setFormPiquete({ nome: "", fazenda_id: "", area_hectares: "" });
      setShowFormPiquete(false);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removerPiquete = async (p) => {
    if (!window.confirm(`Excluir o piquete "${p.nome}"?`)) return;
    try {
      await apiFetch(`/rest/v1/piquetes?id=eq.${p.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Piquete excluído." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    }
  };

  const submitOcupacao = async (e, piqueteId) => {
    e.preventDefault();
    setSaving(true);
    try {
      const aberta = ocupacaoAtual(piqueteId);
      if (aberta) {
        await apiFetch(`/rest/v1/ocupacoes_piquete?id=eq.${aberta.id}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({ data_saida: formOcupacao.data_entrada }),
        });
      }
      await apiFetch(`/rest/v1/ocupacoes_piquete`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          piquete_id: piqueteId,
          descricao_lote: formOcupacao.descricao_lote,
          quantidade_animais: formOcupacao.quantidade_animais !== "" ? Number(formOcupacao.quantidade_animais) : null,
          data_entrada: formOcupacao.data_entrada,
          data_prevista_saida: formOcupacao.data_prevista_saida || null,
        }),
      });
      setBanner({ type: "success", text: "Ocupação registrada." });
      setFormOcupacao({ descricao_lote: "", quantidade_animais: "", data_entrada: todayISO(), data_prevista_saida: "" });
      setShowFormOcupacao(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const finalizarOcupacao = async (ocupacao) => {
    if (!window.confirm("Marcar essa ocupação como encerrada hoje?")) return;
    try {
      await apiFetch(`/rest/v1/ocupacoes_piquete?id=eq.${ocupacao.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ data_saida: todayISO() }),
      });
      setBanner({ type: "success", text: "Piquete liberado." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar: " + e.message });
    }
  };

  return (
    <div>
      <SectionTitle>Manejo — Pastagem</SectionTitle>
      {isAdmin && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 14, marginBottom: 8 }}>
          <IconButton onClick={() => setShowFormPiquete((v) => !v)} active={showFormPiquete} />
        </div>
      )}

      {showFormPiquete && (
        <form onSubmit={submitPiquete} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 16, marginBottom: 14, display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>Novo piquete</div>
          <Field label="Nome do piquete" value={formPiquete.nome} onChange={(v) => setFormPiquete({ ...formPiquete, nome: v })} placeholder="Ex: Piquete 3" required />
          {fazendas.length > 0 && (
            <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Fazenda</span>
              <select
                value={formPiquete.fazenda_id}
                onChange={(e) => setFormPiquete({ ...formPiquete, fazenda_id: e.target.value })}
                style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
              >
                <option value="">Não informada</option>
                {fazendas.map((f) => (
                  <option key={f.id} value={f.id}>
                    {f.nome}
                  </option>
                ))}
              </select>
            </label>
          )}
          <Field label="Área (hectares)" type="number" value={formPiquete.area_hectares} onChange={(v) => setFormPiquete({ ...formPiquete, area_hectares: v })} placeholder="0.0" />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {piquetes.length === 0 && <EmptyState text="Nenhum piquete cadastrado ainda." />}
        {piquetes.map((p) => {
          const atual = ocupacaoAtual(p.id);
          return (
            <div key={p.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{p.nome}</div>
                  {p.area_hectares && <div style={{ fontSize: 11, color: "#6E7A61" }}>{p.area_hectares} ha</div>}
                </div>
                {isAdmin && (
                  <button
                    onClick={() => removerPiquete(p)}
                    style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "5px 8px", color: "#A83B2E", fontSize: 10, fontWeight: 600, cursor: "pointer" }}
                  >
                    Excluir
                  </button>
                )}
              </div>

              {atual ? (
                <div style={{ marginTop: 8, background: "#F5F2E9", borderRadius: 8, padding: "8px 10px" }}>
                  <Badge color="#5BAA47">Ocupado</Badge>
                  <div style={{ fontSize: 13, fontWeight: 600, marginTop: 6 }}>{atual.descricao_lote}</div>
                  <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 2 }}>
                    {atual.quantidade_animais ? `${atual.quantidade_animais} animais · ` : ""}desde {formatDataBR(atual.data_entrada)}
                  </div>
                  {atual.data_prevista_saida && (
                    <div
                      style={{
                        fontSize: 11,
                        marginTop: 2,
                        fontWeight: atual.data_prevista_saida < todayISO() ? 700 : 400,
                        color: atual.data_prevista_saida < todayISO() ? "#A83B2E" : "#B8862E",
                      }}
                    >
                      {atual.data_prevista_saida < todayISO() ? "Retirada prevista vencida em " : "Previsão de retirada: "}
                      {formatDataBR(atual.data_prevista_saida)}
                    </div>
                  )}
                  <button
                    onClick={() => finalizarOcupacao(atual)}
                    style={{ marginTop: 8, width: "100%", background: "rgba(216,180,78,0.15)", border: "1px solid #B8862E", borderRadius: 8, padding: "7px 0", color: "#B8862E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    Liberar piquete
                  </button>
                </div>
              ) : (
                <Badge color="#8A8578">Livre</Badge>
              )}

              {showFormOcupacao === p.id ? (
                <form onSubmit={(e) => submitOcupacao(e, p.id)} style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
                  <Field label="Descrição do lote" value={formOcupacao.descricao_lote} onChange={(v) => setFormOcupacao({ ...formOcupacao, descricao_lote: v })} placeholder="Ex: Bezerros machos" required />
                  <Field label="Quantidade de animais" type="number" value={formOcupacao.quantidade_animais} onChange={(v) => setFormOcupacao({ ...formOcupacao, quantidade_animais: v })} />
                  <Field label="Data de entrada" type="date" value={formOcupacao.data_entrada} onChange={(v) => setFormOcupacao({ ...formOcupacao, data_entrada: v })} required />
                  <Field label="Previsão de retirada (opcional)" type="date" value={formOcupacao.data_prevista_saida} onChange={(v) => setFormOcupacao({ ...formOcupacao, data_prevista_saida: v })} />
                  <div style={{ display: "flex", gap: 8 }}>
                    <SaveButton saving={saving} />
                    <button
                      type="button"
                      onClick={() => setShowFormOcupacao(null)}
                      style={{ background: "rgba(11,61,46,0.10)", border: "1px solid rgba(11,61,46,0.18)", borderRadius: 10, padding: "11px 18px", color: "#1F3324", fontSize: 14, fontWeight: 600, cursor: "pointer" }}
                    >
                      Cancelar
                    </button>
                  </div>
                </form>
              ) : (
                <button
                  onClick={() => {
                    setFormOcupacao({ descricao_lote: "", quantidade_animais: "", data_entrada: todayISO(), data_prevista_saida: "" });
                    setShowFormOcupacao(p.id);
                  }}
                  style={{ marginTop: 8, width: "100%", background: "rgba(11,61,46,0.10)", border: "1px solid rgba(11,61,46,0.18)", borderRadius: 8, padding: "8px 0", color: "#1F3324", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  {atual ? "Trocar lote / Mover novo grupo aqui" : "Colocar lote nesse piquete"}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------- CONFIGURAÇÕES (TROCAR SENHA) ----------------
function SettingsModal({ apiFetch, onClose, setBanner }) {
  const [novaSenha, setNovaSenha] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (novaSenha.length < 6) {
      setError("A senha precisa ter pelo menos 6 caracteres.");
      return;
    }
    if (novaSenha !== confirmar) {
      setError("As senhas não coincidem.");
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/auth/v1/user`, {
        method: "PUT",
        body: JSON.stringify({ password: novaSenha }),
      });
      setSuccess(true);
      setBanner({ type: "success", text: "Senha alterada com sucesso." });
      setTimeout(onClose, 1200);
    } catch (e) {
      setError(e.message || "Erro ao alterar a senha.");
    } finally {
      setSaving(false);
    }
  };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.55)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 50,
        padding: 20,
      }}
      onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: "#FFFFFF",
          border: "1px solid rgba(11,61,46,0.12)",
          borderRadius: 16,
          padding: 24,
          width: "100%",
          maxWidth: 360,
        }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <SectionTitle>Alterar senha</SectionTitle>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#6E7A61", cursor: "pointer" }}>
            <X size={18} />
          </button>
        </div>

        {success ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#6FA050", fontSize: 14 }}>
            <Check size={18} /> Senha atualizada!
          </div>
        ) : (
          <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Field
              label="Nova senha"
              type="password"
              value={novaSenha}
              onChange={setNovaSenha}
              placeholder="Mínimo 6 caracteres"
              required
            />
            <Field
              label="Confirmar nova senha"
              type="password"
              value={confirmar}
              onChange={setConfirmar}
              placeholder="Repita a nova senha"
              required
            />
            {error && (
              <div style={{ display: "flex", gap: 8, alignItems: "flex-start", color: "#A83B2E", fontSize: 13 }}>
                <AlertCircle size={16} style={{ flexShrink: 0, marginTop: 1 }} />
                <span>{error}</span>
              </div>
            )}
            <SaveButton saving={saving} />
          </form>
        )}
      </div>
    </div>
  );
}

// ---------------- USUÁRIOS (apenas administradores) ----------------
function UsuariosTab({ users, currentUserId, apiFetch, reload, setBanner }) {
  const [savingId, setSavingId] = useState(null);

  const setRole = async (user, novoRole) => {
    if (user.id === currentUserId && novoRole !== "administrador") {
      const confirmar = window.confirm(
        "Você está prestes a remover seu próprio acesso de administrador. Tem certeza?"
      );
      if (!confirmar) return;
    }
    setSavingId(user.id);
    try {
      await apiFetch(`/rest/v1/profiles?id=eq.${user.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ role: novoRole }),
      });
      setBanner({ type: "success", text: `${user.nome} agora é ${novoRole}.` });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar usuário: " + e.message });
    } finally {
      setSavingId(null);
    }
  };

  const setAtivo = async (user, ativo) => {
    if (user.id === currentUserId && !ativo) {
      const confirmar = window.confirm("Você está prestes a excluir seu próprio acesso. Tem certeza?");
      if (!confirmar) return;
    } else if (!ativo) {
      const confirmar = window.confirm(`Excluir o acesso de ${user.nome}? Ele(a) pode ser restaurado(a) depois se precisar.`);
      if (!confirmar) return;
    }
    setSavingId(user.id);
    try {
      await apiFetch(`/rest/v1/profiles?id=eq.${user.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ ativo }),
      });
      setBanner({ type: "success", text: ativo ? `${user.nome} restaurado.` : `${user.nome} excluído.` });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar usuário: " + e.message });
    } finally {
      setSavingId(null);
    }
  };

  const excluirPermanente = async (user) => {
    const confirmar = window.confirm(
      `Excluir PERMANENTEMENTE o perfil de ${user.nome}? Essa ação não pode ser desfeita — não vai dar pra restaurar depois.`
    );
    if (!confirmar) return;
    setSavingId(user.id);
    try {
      await apiFetch(`/rest/v1/profiles?id=eq.${user.id}`, {
        method: "DELETE",
        headers: { Prefer: "return=minimal" },
      });
      setBanner({ type: "success", text: `${user.nome} excluído permanentemente.` });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    } finally {
      setSavingId(null);
    }
  };

  const setNome = async (user, novoNome) => {
    if (!novoNome || novoNome === user.nome) return;
    setSavingId(user.id);
    try {
      await apiFetch(`/rest/v1/profiles?id=eq.${user.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ nome: novoNome }),
      });
      setBanner({ type: "success", text: "Nome atualizado." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar nome: " + e.message });
    } finally {
      setSavingId(null);
    }
  };

  const setAcesso = async (user, novoAcesso) => {
    setSavingId(user.id);
    try {
      await apiFetch(`/rest/v1/profiles?id=eq.${user.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ acesso_rebanhos: novoAcesso }),
      });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar acesso: " + e.message });
    } finally {
      setSavingId(null);
    }
  };

  const roleLabel = { pendente: "Pendente", operador: "Operador", administrador: "Administrador", visualizador: "Visualização" };
  const roleColor = { pendente: "#B5453A", operador: "#5BAA47", administrador: "#B8862E", visualizador: "#3E7C99" };

  const pendentes = users.filter((u) => u.role === "pendente" && u.ativo !== false);
  const aprovados = users.filter((u) => u.role !== "pendente" && u.ativo !== false);
  const excluidos = users.filter((u) => u.ativo === false);

  return (
    <div>
      <SectionTitle>Usuários ({users.length})</SectionTitle>

      {pendentes.length > 0 && (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 12, color: "#A83B2E", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>
            Aguardando aprovação ({pendentes.length})
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {pendentes.map((u) => (
              <div
                key={u.id}
                style={{
                  background: "#FFFFFF",
                  border: "1px solid #B5453A",
                  borderRadius: 12,
                  padding: "12px 16px",
                }}
              >
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 8 }}>{u.nome}</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={() => setRole(u, "operador")}
                    disabled={savingId === u.id}
                    style={{
                      flex: 1,
                      background: "#5BAA47",
                      border: "none",
                      borderRadius: 8,
                      padding: "9px 0",
                      color: "#F5F2E9",
                      fontSize: 12,
                      fontWeight: 700,
                      cursor: savingId === u.id ? "default" : "pointer",
                      opacity: savingId === u.id ? 0.6 : 1,
                    }}
                  >
                    {savingId === u.id ? "Aprovando..." : "Aprovar como operador"}
                  </button>
                  <button
                    onClick={() => setRole(u, "administrador")}
                    disabled={savingId === u.id}
                    style={{
                      background: "rgba(11,61,46,0.10)",
                      border: "1px solid rgba(11,61,46,0.18)",
                      borderRadius: 8,
                      padding: "9px 12px",
                      color: "#1F3324",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: savingId === u.id ? "default" : "pointer",
                      opacity: savingId === u.id ? 0.6 : 1,
                      whiteSpace: "nowrap",
                    }}
                  >
                    Como admin
                  </button>
                  <button
                    onClick={() => setRole(u, "visualizador")}
                    disabled={savingId === u.id}
                    style={{
                      background: "rgba(62,124,153,0.12)",
                      border: "1px solid #3E7C99",
                      borderRadius: 8,
                      padding: "9px 12px",
                      color: "#3E7C99",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: savingId === u.id ? "default" : "pointer",
                      opacity: savingId === u.id ? 0.6 : 1,
                      whiteSpace: "nowrap",
                    }}
                  >
                    Só visualizar
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 8 }}>
        {aprovados.length === 0 && pendentes.length === 0 && <EmptyState text="Nenhum usuário cadastrado ainda." />}
        {aprovados.map((u) => (
          <UsuarioRow
            key={u.id}
            user={u}
            isSelf={u.id === currentUserId}
            saving={savingId === u.id}
            roleLabel={roleLabel}
            roleColor={roleColor}
            onSetRole={setRole}
            onSetNome={setNome}
            onSetAcesso={setAcesso}
            onExcluir={() => setAtivo(u, false)}
          />
        ))}
      </div>

      {excluidos.length > 0 && (

function UsuarioRow({ user, isSelf, saving, roleLabel, roleColor, onSetRole, onSetNome, onSetAcesso, onExcluir }) {

  const [nomeTemp, setNomeTemp] = useState(user.nome);

    onSetNome(user, nomeTemp.trim());

    onSetAcesso(user, novo);
  };

  return (
    <div
      style={{
        background: "#FFFFFF",
        border: "1px solid rgba(11,61,46,0.12)",
        borderRadius: 12,
        padding: "12px 16px",

    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {editandoNome ? (
            <div style={{ display: "flex", gap: 6 }}>
              <input
                value={nomeTemp}
                onChange={(e) => setNomeTemp(e.target.value)}
                autoFocus
                style={{
                  flex: 1,
                  background: "#F5F2E9",
                  border: "1px solid rgba(11,61,46,0.18)",
                  borderRadius: 6,
                  padding: "6px 8px",
                  color: "#1F3324",

              <button
                onClick={salvarNome}

            <div style={{ fontWeight: 600, fontSize: 14, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.nome}</span>

function EntregasTab({ entregas, avesLotes, avesVendas, compradores, profile, apiFetch, reload, setBanner }) {
  const isAdmin = profile?.role === "administrador";
  const acessos = isAdmin ? ["leite", "corte", "bezerro", "aves"] : profile?.acesso_rebanhos || [];
  const temLeite = isAdmin || acessos.includes("leite");
  const temAvesVendas = isAdmin;
  const [subTab, setSubTab] = useState(temLeite ? "leite" : "ovos");

  const btnStyle = (active) => ({
    flex: 1,
    background: active ? "#D8B44E" : "#FFFFFF",
    color: active ? "#16241C" : "#1F3324",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 8,
    padding: "10px 0",
    fontSize: 13,
    fontWeight: 700,
    cursor: "pointer",
  });

  if (temLeite && temAvesVendas) {
    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          <button onClick={() => setSubTab("leite")} style={btnStyle(subTab === "leite")}>
            Leite
          </button>
          <button onClick={() => setSubTab("ovos")} style={btnStyle(subTab === "ovos")}>
            Ovos
          </button>
        </div>
        {subTab === "leite" && <EntregaLeiteSecao entregas={entregas} profile={profile} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
        {subTab === "ovos" && <AvesVendasSecao lotes={avesLotes} vendas={avesVendas} compradores={compradores} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
      </div>
    );
  }
  if (temAvesVendas) {
    return <AvesVendasSecao lotes={avesLotes} vendas={avesVendas} compradores={compradores} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />;
  }
  return <EntregaLeiteSecao entregas={entregas} profile={profile} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />;
}

function EntregaLeiteSecao({ entregas, profile, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ data: todayISO(), litros_entregues: "", observacoes: "" });
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const isAdmin = profile?.role === "administrador";

  const hoje = todayISO();
  const mesAtual = hoje.slice(0, 7);
  const totalMes = entregas.filter((e) => e.data.startsWith(mesAtual)).reduce((s, e) => s + Number(e.litros_entregues), 0);

  const startAdd = () => {
    setEditingId(null);
    setForm({ data: todayISO(), litros_entregues: "", observacoes: "" });
    setShowForm((v) => !v);
  };

  const startEdit = (e) => {
    setEditingId(e.id);
    setForm({ data: e.data, litros_entregues: String(e.litros_entregues), observacoes: e.observacoes || "" });
    setShowForm(true);
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.data || !form.litros_entregues) return;
    setSaving(true);
    try {
      const payload = {
        data: form.data,
        litros_entregues: Number(form.litros_entregues),
        observacoes: form.observacoes || null,
      };
      if (editingId) {
        await apiFetch(`/rest/v1/entregas_leite?id=eq.${editingId}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Entrega atualizada." });
      } else {
        await apiFetch(`/rest/v1/entregas_leite`, {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Entrega registrada." });
      }
      setForm({ data: todayISO(), litros_entregues: "", observacoes: "" });
      setShowForm(false);
      setEditingId(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removeEntrega = async (e) => {
    const confirmar = window.confirm(`Excluir a entrega de ${formatDataBR(e.data)}?`);
    if (!confirmar) return;
    setDeletingId(e.id);
    try {
      await apiFetch(`/rest/v1/entregas_leite?id=eq.${e.id}`, {
        method: "DELETE",
        headers: { Prefer: "return=minimal" },
      });
      setBanner({ type: "success", text: "Entrega excluída." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    } finally {
      setDeletingId(null);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Entrega ao comprador</SectionTitle>
        <IconButton onClick={startAdd} active={showForm} />
      </div>

      <div
        style={{
          background: "#FFFFFF",
          border: "1px solid rgba(11,61,46,0.12)",
          borderRadius: 14,
          padding: "14px 16px",
          marginTop: 16,
        }}
      >
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 600, color: "#3E7C99" }}>
          {totalMes.toFixed(1)} L
        </div>
        <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 2 }}>Entregue este mês</div>
      </div>

      {showForm && (
        <form
          onSubmit={submit}
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 14,
            padding: 18,
            marginTop: 14,
            display: "flex",
            flexDirection: "column",
            gap: 12,
          }}
        >
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <Field
            label="Litros entregues"
            type="number"
            value={form.litros_entregues}
            onChange={(v) => setForm({ ...form, litros_entregues: v })}
            placeholder="0.0"
            required
          />
          <Field label="Observações (opcional)" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {entregas.length === 0 && <EmptyState text="Nenhuma entrega registrada ainda." />}
        {entregas.map((e) => (
          <div
            key={e.id}
            style={{
              background: "#FFFFFF",
              border: "1px solid rgba(11,61,46,0.12)",
              borderRadius: 12,
              padding: "12px 16px",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{formatDataBR(e.data)}</div>
                {e.observacoes && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{e.observacoes}</div>}
              </div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, color: "#3E7C99" }}>
                {Number(e.litros_entregues).toFixed(1)} L
              </div>
            </div>
            {isAdmin && (
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button
                  onClick={() => startEdit(e)}
                  style={{
                    flex: 1,
                    background: "rgba(11,61,46,0.10)",
                    border: "1px solid rgba(11,61,46,0.18)",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#1F3324",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  Editar
                </button>
                <button
                  onClick={() => removeEntrega(e)}
                  disabled={deletingId === e.id}
                  style={{
                    flex: 1,
                    background: "rgba(196,100,75,0.15)",
                    border: "1px solid #B5453A",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#A83B2E",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: deletingId === e.id ? "default" : "pointer",
                    opacity: deletingId === e.id ? 0.6 : 1,
                  }}
                >
                  {deletingId === e.id ? "Excluindo..." : "Excluir"}
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------- MAPA INTERATIVO (pino arrastável) ----------------
function MiniMapPicker({ latitude, longitude, onChange }) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markerRef = useRef(null);
  const camadaRuasRef = useRef(null);
  const camadaSateliteRef = useRef(null);
  const [busca, setBusca] = useState("");
  const [buscando, setBuscando] = useState(false);
  const [resultados, setResultados] = useState([]);
  const [modoSatelite, setModoSatelite] = useState(false);

  useEffect(() => {
    if (!mapRef.current || typeof L === "undefined" || mapInstance.current) return;

    const startLat = latitude ? Number(latitude) : -12.97;
    const startLng = longitude ? Number(longitude) : -38.5;

    const map = L.map(mapRef.current).setView([startLat, startLng], latitude ? 15 : 6);

    const camadaRuas = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19,
    });
    const camadaSatelite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { attribution: "Tiles &copy; Esri", maxZoom: 19 }
    );
    camadaRuas.addTo(map);
    camadaRuasRef.current = camadaRuas;
    camadaSateliteRef.current = camadaSatelite;

    const marker = L.marker([startLat, startLng], { draggable: true }).addTo(map);
    marker.on("dragend", () => {
      const pos = marker.getLatLng();
      onChange(pos.lat.toFixed(6), pos.lng.toFixed(6));
    });
    map.on("click", (e) => {
      marker.setLatLng(e.latlng);
      onChange(e.latlng.lat.toFixed(6), e.latlng.lng.toFixed(6));
    });

    mapInstance.current = map;
    markerRef.current = marker;

    return () => {
      map.remove();
      mapInstance.current = null;
    };
    // eslint-disable-next-line
  }, []);

  const alternarCamada = (satelite) => {
    if (!mapInstance.current) return;
    if (satelite) {
      mapInstance.current.removeLayer(camadaRuasRef.current);
      camadaSateliteRef.current.addTo(mapInstance.current);
    } else {
      mapInstance.current.removeLayer(camadaSateliteRef.current);
      camadaRuasRef.current.addTo(mapInstance.current);
    }
    setModoSatelite(satelite);
  };

  useEffect(() => {
    if (mapInstance.current && markerRef.current && latitude && longitude) {
      const novaPos = [Number(latitude), Number(longitude)];
      const posAtual = markerRef.current.getLatLng();
      if (Math.abs(posAtual.lat - novaPos[0]) > 0.0001 || Math.abs(posAtual.lng - novaPos[1]) > 0.0001) {
        markerRef.current.setLatLng(novaPos);
        mapInstance.current.setView(novaPos, 15);
      }
    }
  }, [latitude, longitude]);

  const buscarEndereco = async () => {
    if (!busca.trim()) return;
    setBuscando(true);
    setResultados([]);
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=br&q=${encodeURIComponent(busca)}`
      );
      const dados = await res.json();
      if (!dados || dados.length === 0) {
        setResultados([]);
      } else {
        setResultados(dados);
      }
    } catch (e) {
      setResultados([]);
    } finally {
      setBuscando(false);
    }
  };

  const escolherResultado = (r) => {
    const lat = Number(r.lat);
    const lng = Number(r.lon);
    if (mapInstance.current && markerRef.current) {
      markerRef.current.setLatLng([lat, lng]);
      mapInstance.current.setView([lat, lng], 15);
    }
    onChange(lat.toFixed(6), lng.toFixed(6));
    setResultados([]);
    setBusca(r.display_name);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
        <input
          value={busca}
          onChange={(e) => setBusca(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              buscarEndereco();
            }
          }}
          placeholder="Buscar cidade, endereço ou município..."
          style={{
            flex: 1,
            background: "#F5F2E9",
            border: "1px solid rgba(11,61,46,0.18)",
            borderRadius: 8,
            padding: "9px 10px",
            color: "#1F3324",
            fontSize: 13,
          }}
        />
        <button
          type="button"
          onClick={buscarEndereco}
          disabled={buscando}
          style={{
            background: "#3E7C99",
            border: "none",
            borderRadius: 8,
            padding: "0 14px",
            color: "#F5F2E9",
            fontWeight: 700,
            fontSize: 13,
            cursor: buscando ? "default" : "pointer",
            opacity: buscando ? 0.6 : 1,
          }}
        >
          {buscando ? "..." : "Buscar"}
        </button>
      </div>

      {resultados.length > 0 && (
        <div
          style={{
            background: "#F5F2E9",
            border: "1px solid rgba(11,61,46,0.18)",
            borderRadius: 8,
            marginBottom: 8,
            overflow: "hidden",
          }}
        >
          {resultados.map((r, i) => (
            <button
              key={i}
              type="button"
              onClick={() => escolherResultado(r)}
              style={{
                display: "block",
                width: "100%",
                textAlign: "left",
                background: "none",
                border: "none",
                borderBottom: i < resultados.length - 1 ? "1px solid rgba(11,61,46,0.12)" : "none",
                padding: "9px 10px",
                color: "#1F3324",
                fontSize: 12,
                cursor: "pointer",
              }}
            >
              {r.display_name}
            </button>
          ))}
        </div>
      )}

      <div style={{ position: "relative" }}>
        <div ref={mapRef} style={{ height: 220, borderRadius: 10, overflow: "hidden" }} />
        <div style={{ position: "absolute", top: 8, right: 8, zIndex: 500, display: "flex", borderRadius: 8, overflow: "hidden" }}>
          <button
            type="button"
            onClick={() => alternarCamada(false)}
            style={{
              padding: "5px 10px",
              border: "none",
              fontSize: 11,
              fontWeight: 700,
              cursor: "pointer",
              background: !modoSatelite ? "#B8862E" : "rgba(30,51,39,0.9)",
              color: !modoSatelite ? "#F5F2E9" : "#1F3324",
            }}
          >
            Mapa
          </button>
          <button
            type="button"
            onClick={() => alternarCamada(true)}
            style={{
              padding: "5px 10px",
              border: "none",
              fontSize: 11,
              fontWeight: 700,
              cursor: "pointer",
              background: modoSatelite ? "#B8862E" : "rgba(30,51,39,0.9)",
              color: modoSatelite ? "#F5F2E9" : "#1F3324",
            }}
          >
            Satélite
          </button>
        </div>
      </div>
      <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 6, textAlign: "center" }}>
        Busque o local, depois arraste o pino ou toque no mapa para ajustar
      </div>
    </div>
  );
}

// ---------------- CRM DE COMPRADORES ----------------
const CATEGORIA_COMPRADOR_LABELS = { leite: "Leite", corte: "Corte", bezerro: "Bezerros", aves: "Aves/Ovos", outro: "Outro" };
const CATEGORIA_COMPRADOR_COLORS = { leite: "#B8862E", corte: "#B5453A", bezerro: "#3E7C99", aves: "#8C6A3F", outro: "#6E7A61" };
const TIPO_INTERACAO_LABELS = { ligacao: "Ligação", visita: "Visita", whatsapp: "WhatsApp", negociacao: "Negociação", venda: "Venda", outro: "Outro" };

function CompradoresTab({ compradores, interacoes, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ nome: "", categorias: ["outro"], telefone: "", whatsapp: "", email: "", endereco: "", observacoes: "" });
  const [saving, setSaving] = useState(false);
  const [compradorAberto, setCompradorAberto] = useState(null);

  const hoje = todayISO();

  const startAdd = () => {
    setEditingId(null);
    setForm({ nome: "", categorias: ["outro"], telefone: "", whatsapp: "", email: "", endereco: "", observacoes: "" });
    setShowForm((v) => !v);
  };

  const startEdit = (c) => {
    setEditingId(c.id);
    setForm({
      nome: c.nome,
      categorias: c.categorias && c.categorias.length > 0 ? c.categorias : ["outro"],
      telefone: c.telefone || "",
      whatsapp: c.whatsapp || "",
      email: c.email || "",
      endereco: c.endereco || "",
      observacoes: c.observacoes || "",
    });
    setShowForm(true);
  };

  const toggleCategoria = (k) => {
    setForm((f) => {
      const atual = f.categorias.includes(k) ? f.categorias.filter((x) => x !== k) : [...f.categorias, k];
      return { ...f, categorias: atual.length > 0 ? atual : ["outro"] };
    });
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome) return;
    setSaving(true);
    try {
      const payload = {
        nome: form.nome,
        categorias: form.categorias,
        telefone: form.telefone || null,
        whatsapp: form.whatsapp || null,
        email: form.email || null,
        endereco: form.endereco || null,
        observacoes: form.observacoes || null,
      };
      if (editingId) {
        await apiFetch(`/rest/v1/compradores?id=eq.${editingId}`, { method: "PATCH", headers: { Prefer: "return=minimal" }, body: JSON.stringify(payload) });
        setBanner({ type: "success", text: "Comprador atualizado." });
      } else {
        await apiFetch(`/rest/v1/compradores`, { method: "POST", headers: { Prefer: "return=minimal" }, body: JSON.stringify(payload) });
        setBanner({ type: "success", text: "Comprador cadastrado." });
      }
      setShowForm(false);
      setEditingId(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removerComprador = async (c) => {
    if (!window.confirm(`Excluir "${c.nome}"? Isso apaga também o histórico de contatos com ele.`)) return;
    try {
      await apiFetch(`/rest/v1/compradores?id=eq.${c.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Comprador excluído." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Compradores ({compradores.length})</SectionTitle>
        <IconButton onClick={startAdd} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>{editingId ? "Editando comprador" : "Novo comprador"}</div>
          <Field label="Nome (empresa ou pessoa)" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: Laticínios Bahia" required />
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>O que ele compra (marque um ou mais)</span>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {Object.entries(CATEGORIA_COMPRADOR_LABELS).map(([k, label]) => {
                const marcado = form.categorias.includes(k);
                return (
                  <button
                    key={k}
                    type="button"
                    onClick={() => toggleCategoria(k)}
                    style={{
                      padding: "7px 12px",
                      borderRadius: 20,
                      border: "1px solid " + (marcado ? CATEGORIA_COMPRADOR_COLORS[k] : "rgba(11,61,46,0.18)"),
                      background: marcado ? CATEGORIA_COMPRADOR_COLORS[k] + "22" : "transparent",
                      color: marcado ? CATEGORIA_COMPRADOR_COLORS[k] : "#6E7A61",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: "pointer",
                    }}
                  >
                    {label}
                  </button>
                );
              })}
            </div>
          </label>
          <Field label="Telefone" value={form.telefone} onChange={(v) => setForm({ ...form, telefone: v })} placeholder="(00) 00000-0000" />
          <Field label="WhatsApp" value={form.whatsapp} onChange={(v) => setForm({ ...form, whatsapp: v })} placeholder="(00) 00000-0000" />
          <Field label="E-mail" value={form.email} onChange={(v) => setForm({ ...form, email: v })} />
          <Field label="Endereço" value={form.endereco} onChange={(v) => setForm({ ...form, endereco: v })} />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {compradores.length === 0 && <EmptyState text="Nenhum comprador cadastrado ainda." />}
        {compradores.map((c) => {
          const historico = interacoes.filter((i) => i.comprador_id === c.id).sort((x, y) => (x.data < y.data ? 1 : -1));
          const ultima = historico[0];
          const atrasado = ultima && ultima.proximo_contato && ultima.proximo_contato < hoje;
          const aberto = compradorAberto === c.id;
          const categorias = c.categorias && c.categorias.length > 0 ? c.categorias : ["outro"];
          return (
            <div key={c.id} style={{ background: "#FFFFFF", border: `1px solid ${atrasado ? "#B5453A" : "rgba(11,61,46,0.12)"}`, borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{c.nome}</div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {c.telefone || c.whatsapp || "Sem contato cadastrado"}
                  </div>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "flex-end", maxWidth: 160 }}>
                  {categorias.map((cat) => (
                    <Badge key={cat} color={CATEGORIA_COMPRADOR_COLORS[cat] || "#6E7A61"}>
                      {CATEGORIA_COMPRADOR_LABELS[cat] || cat}
                    </Badge>
                  ))}
                </div>
              </div>


              {atrasado && (
                <div style={{ marginTop: 8, fontSize: 11, color: "#A83B2E", fontWeight: 700 }}>
                  Follow-up atrasado desde {formatDataBR(ultima.proximo_contato)}
                </div>
              )}

              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button
                  onClick={() => setCompradorAberto(aberto ? null : c.id)}
                  style={{ flex: 1, background: "rgba(216,180,78,0.15)", border: "1px solid #B8862E", borderRadius: 8, padding: "8px 0", color: "#B8862E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  {aberto ? "Fechar histórico" : `Histórico (${historico.length})`}
                </button>
                <button
                  onClick={() => startEdit(c)}
                  style={{ flex: 1, background: "rgba(11,61,46,0.10)", border: "1px solid rgba(11,61,46,0.18)", borderRadius: 8, padding: "8px 0", color: "#1F3324", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  Editar
                </button>
                <button
                  onClick={() => removerComprador(c)}
                  style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "8px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                >
                  Excluir
                </button>
              </div>

              {aberto && (
                <HistoricoComprador comprador={c} historico={historico} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HistoricoComprador({ comprador, historico, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ data: todayISO(), tipo: "ligacao", descricao: "", proximo_contato: "" });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/interacoes_compradores`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          comprador_id: comprador.id,
          data: form.data,
          tipo: form.tipo,
          descricao: form.descricao || null,
          proximo_contato: form.proximo_contato || null,
        }),
      });
      setBanner({ type: "success", text: "Registrado." });
      setForm({ data: todayISO(), tipo: "ligacao", descricao: "", proximo_contato: "" });
      setShowForm(false);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao registrar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ marginTop: 12, borderTop: "1px solid rgba(11,61,46,0.12)", paddingTop: 12 }}>
      <button
        onClick={() => setShowForm((v) => !v)}
        style={{ width: "100%", background: showForm ? "rgba(11,61,46,0.10)" : "#5BAA47", border: "none", borderRadius: 8, padding: "9px 0", color: showForm ? "#1F3324" : "#F5F2E9", fontSize: 12, fontWeight: 700, cursor: "pointer", marginBottom: 10 }}
      >
        {showForm ? "Cancelar" : "+ Registrar contato"}
      </button>

      {showForm && (
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 11, color: "#6E7A61", fontWeight: 600 }}>Tipo</span>
            <select
              value={form.tipo}
              onChange={(e) => setForm({ ...form, tipo: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "9px 10px", color: "#1F3324", fontSize: 13 }}
            >
              {Object.entries(TIPO_INTERACAO_LABELS).map(([k, label]) => (
                <option key={k} value={k}>
                  {label}
                </option>
              ))}
            </select>
          </label>
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <Field label="O que foi conversado" value={form.descricao} onChange={(v) => setForm({ ...form, descricao: v })} placeholder="Ex: Negociou preço do litro para R$2,10" />
          <Field label="Próximo contato (opcional)" type="date" value={form.proximo_contato} onChange={(v) => setForm({ ...form, proximo_contato: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      {historico.length === 0 ? (
        <div style={{ fontSize: 12, color: "#6E7A61" }}>Nenhum contato registrado ainda.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {historico.map((h) => (
            <div key={h.id} style={{ background: "#F5F2E9", borderRadius: 8, padding: "8px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div style={{ fontSize: 12, fontWeight: 600 }}>{TIPO_INTERACAO_LABELS[h.tipo] || h.tipo}</div>
                <div style={{ fontSize: 11, color: "#6E7A61" }}>{formatDataBR(h.data)}</div>
              </div>
              {h.descricao && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{h.descricao}</div>}
              {h.proximo_contato && <div style={{ fontSize: 11, color: "#B8862E", marginTop: 2 }}>Próximo contato: {formatDataBR(h.proximo_contato)}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RomaneioTab({ romaneios, romaneioAnimais, animals, compradores, apiFetch, reload, setBanner }) {
  const compradoresCorte = compradores.filter((c) => (c.categorias || []).includes("corte"));
  const compradoresParaSelecao = compradoresCorte.length > 0 ? compradoresCorte : compradores;
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({
    data: todayISO(),
    comprador_id: "",
    tipo_venda: "arroba",
    rendimento_pct: "50",
    valor_arroba: "",
    preco_kg: "",
    desconto: "0",
    observacoes: "",
  });
  const [selecionados, setSelecionados] = useState({});
  const [saving, setSaving] = useState(false);
  const [gerandoPDF, setGerandoPDF] = useState(null);

  const animaisDisponiveis = animals
    .filter((a) => a.finalidade === "corte" || a.finalidade === "bezerro")
    .filter((a) => a.status !== "vendida" && a.status !== "morta" && a.status !== "abatido")
    .sort((a, b) => animalNome(a).localeCompare(animalNome(b)));

  const toggleAnimal = (id) => {
    setSelecionados((s) => {
      const n = { ...s };
      if (n[id] != null) delete n[id];
      else n[id] = "";
      return n;
    });
  };

  const setPesoAnimal = (id, v) => setSelecionados((s) => ({ ...s, [id]: v }));

  const pesoTotalVivo = Object.values(selecionados).reduce((s, v) => s + (Number(v) || 0), 0);
  const rendimento = Number(form.rendimento_pct) || 0;
  const pesoCarcacaTotal = form.tipo_venda === "arroba" ? pesoTotalVivo * (rendimento / 100) : 0;
  const arrobasTotal = form.tipo_venda === "arroba" ? pesoCarcacaTotal / 15 : 0;
  const valorBruto =
    form.tipo_venda === "arroba"
      ? arrobasTotal * (Number(form.valor_arroba) || 0)
      : pesoTotalVivo * (Number(form.preco_kg) || 0);
  const desconto = Number(form.desconto) || 0;
  const valorLiquido = Math.max(0, valorBruto - desconto);

  const startAdd = () => {
    setForm({
      data: todayISO(),
      comprador_id: "",
      tipo_venda: "arroba",
      rendimento_pct: "50",
      valor_arroba: "",
      preco_kg: "",
      desconto: "0",
      observacoes: "",
    });
    setSelecionados({});
    setShowForm((v) => !v);
  };

  const submit = async (e) => {
    e.preventDefault();
    const ids = Object.keys(selecionados).filter((id) => Number(selecionados[id]) > 0);
    if (!form.comprador_id) {
      setBanner({ type: "error", text: "Selecione o comprador." });
      return;
    }
    if (ids.length === 0) {
      setBanner({ type: "error", text: "Selecione ao menos um animal e informe o peso vivo." });
      return;
    }
    if (form.tipo_venda === "arroba" && !form.valor_arroba) {
      setBanner({ type: "error", text: "Informe o valor da arroba." });
      return;
    }
    if (form.tipo_venda === "kg_vivo" && !form.preco_kg) {
      setBanner({ type: "error", text: "Informe o preço por kg vivo." });
      return;
    }

    setSaving(true);
    try {
      const payload = {
        data: form.data,
        comprador_id: form.comprador_id,
        tipo_venda: form.tipo_venda,
        rendimento_pct: form.tipo_venda === "arroba" ? rendimento : null,
        valor_arroba: form.tipo_venda === "arroba" ? Number(form.valor_arroba) : null,
        preco_kg: form.tipo_venda === "kg_vivo" ? Number(form.preco_kg) : null,
        desconto,
        peso_total_vivo: pesoTotalVivo,
        peso_total_carcaca: form.tipo_venda === "arroba" ? pesoCarcacaTotal : null,
        arrobas_total: form.tipo_venda === "arroba" ? arrobasTotal : null,
        valor_bruto: valorBruto,
        valor_liquido: valorLiquido,
        observacoes: form.observacoes || null,
      };
      const criado = await apiFetch(`/rest/v1/romaneios`, {
        method: "POST",
        headers: { Prefer: "return=representation" },
        body: JSON.stringify(payload),
      });
      const romaneioId = criado[0].id;

      const linhas = ids.map((animalId) => {
        const pesoInd = Number(selecionados[animalId]);
        const valorInd = pesoTotalVivo > 0 ? valorLiquido * (pesoInd / pesoTotalVivo) : 0;
        return { romaneio_id: romaneioId, animal_id: animalId, peso_individual: pesoInd, valor_individual: valorInd };
      });
      await apiFetch(`/rest/v1/romaneio_animais`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify(linhas),
      });

      await Promise.all(
        linhas.map((l) =>
          apiFetch(`/rest/v1/animals?id=eq.${l.animal_id}`, {
            method: "PATCH",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              destino: "venda",
              data_venda: form.data,
              peso_venda: l.peso_individual,
              valor_venda: l.valor_individual,
              comprador_id: form.comprador_id,
              status: "vendida",
            }),
          })
        )
      );

      setBanner({ type: "success", text: `Romaneio registrado: ${ids.length} animal(is), R$ ${valorLiquido.toFixed(2)}.` });
      setShowForm(false);
      setSelecionados({});
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao registrar romaneio: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const excluirRomaneio = async (r) => {
    if (!window.confirm("Excluir este romaneio? Os animais envolvidos voltarão ao status anterior (não vendidos).")) return;
    try {
      const linhas = romaneioAnimais.filter((ra) => ra.romaneio_id === r.id);
      await Promise.all(
        linhas.map((l) => {
          const animal = animals.find((a) => a.id === l.animal_id);
          const statusRevertido = animal && animal.finalidade === "bezerro" ? "desmamado" : "ativo";
          return apiFetch(`/rest/v1/animals?id=eq.${l.animal_id}`, {
            method: "PATCH",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              destino: null,
              data_venda: null,
              peso_venda: null,
              valor_venda: null,
              comprador_id: null,
              status: statusRevertido,
            }),
          });
        })
      );
      await apiFetch(`/rest/v1/romaneios?id=eq.${r.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Romaneio excluído e animais restaurados." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    }
  };

  const exportarPDF = async (r) => {
    setGerandoPDF(r.id);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 15;
      try {
        doc.addImage(CAMPO_LOGO_COLOR, "PNG", 14, y, 32, 32 * (297 / 1211));
      } catch (e) {}

      doc.setFontSize(14);
      doc.setFont(undefined, "bold");
      doc.text("Romaneio de Venda", 50, y + 8);
      doc.setFont(undefined, "normal");
      doc.setFontSize(9);
      doc.setTextColor(120);
      doc.text("Campo na Mão - gerado em " + formatDataBR(todayISO()), 50, y + 14);
      doc.setTextColor(0);
      y += 26;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 10;

      const comprador = compradores.find((c) => c.id === r.comprador_id);
      doc.setFontSize(11);
      doc.setFont(undefined, "bold");
      doc.text("Data da venda: " + formatDataBR(r.data), 14, y);
      y += 7;
      doc.setFont(undefined, "normal");
      doc.text("Comprador: " + (comprador ? comprador.nome : "-"), 14, y);
      y += 7;
      doc.text("Tipo: " + (r.tipo_venda === "arroba" ? "Por arroba (carcaça)" : "Por kg vivo"), 14, y);
      y += 7;
      if (r.tipo_venda === "arroba") {
        doc.text(`Rendimento: ${Number(r.rendimento_pct).toFixed(1)}%   Valor da arroba: R$ ${Number(r.valor_arroba).toFixed(2)}`, 14, y);
      } else {
        doc.text(`Preço por kg vivo: R$ ${Number(r.preco_kg).toFixed(2)}`, 14, y);
      }
      y += 10;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 8;

      const linhas = romaneioAnimais.filter((ra) => ra.romaneio_id === r.id);
      doc.setFont(undefined, "bold");
      doc.setFontSize(10);
      doc.text("Brinco", 14, y);
      doc.text("Animal", 44, y);
      doc.text("Peso vivo (kg)", 120, y);
      doc.text("Valor (R$)", 168, y);
      y += 5;
      doc.setDrawColor(230);
      doc.line(14, y, 196, y);
      y += 6;
      doc.setFont(undefined, "normal");
      linhas.forEach((l) => {
        const animal = animals.find((a) => a.id === l.animal_id);
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(animal ? String(animal.brinco) : "-", 14, y);
        doc.text(animal ? animalNome(animal) : "-", 44, y);
        doc.text(Number(l.peso_individual).toFixed(1), 120, y);
        doc.text(Number(l.valor_individual).toFixed(2), 168, y);
        y += 6;
      });

      y += 4;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 10;

      doc.setFont(undefined, "bold");
      doc.text(`Total de animais: ${linhas.length}`, 14, y);
      y += 7;
      doc.text(`Peso vivo total: ${Number(r.peso_total_vivo).toFixed(1)} kg`, 14, y);

      if (r.tipo_venda === "arroba") {

      }
      doc.text(`Valor bruto: R$ ${Number(r.valor_bruto).toFixed(2)}`, 14, y);
      y += 7;
      if (Number(r.desconto) > 0) {
        doc.text(`Desconto: R$ ${Number(r.desconto).toFixed(2)}`, 14, y);
        y += 7;
      }
      doc.setFontSize(12);
      doc.text(`Valor líquido: R$ ${Number(r.valor_liquido).toFixed(2)}`, 14, y);

      doc.save(`romaneio-${r.data}.pdf`);
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao gerar PDF: " + e.message });
