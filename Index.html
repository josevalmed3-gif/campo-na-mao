              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-end" }}>
                <Badge color={FINALIDADE_COLORS[a.finalidade || "leite"]}>{FINALIDADE_LABELS[a.finalidade || "leite"]}</Badge>
                <Badge color={STATUS_COLORS[a.status]}>{STATUS_LABELS[a.status] || a.status}</Badge>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button
                onClick={() => setChartAnimal(a)}
                style={{
                  flex: 1,
                  background: "rgba(216,180,78,0.15)",
                  border: "1px solid #B8862E",
                  borderRadius: 8,
                  padding: "8px 0",
                  color: "#B8862E",
                  fontSize: 12,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                Histórico
              </button>
              <button
                onClick={() => startEdit(a)}
                style={{
                  flex: 1,
                  background: "rgba(11,61,46,0.10)",
                  border: "1px solid rgba(11,61,46,0.18)",
                  borderRadius: 8,
                  padding: "8px 0",
                  color: "#1F3324",
                  fontSize: 12,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                Editar
              </button>
              <button
                onClick={() => removeAnimal(a)}
                disabled={deletingId === a.id}
                style={{
                  flex: 1,
                  background: "rgba(196,100,75,0.15)",
                  border: "1px solid #B5453A",
                  borderRadius: 8,
                  padding: "8px 0",
                  color: "#A83B2E",
                  fontSize: 12,
                  fontWeight: 600,
                  cursor: deletingId === a.id ? "default" : "pointer",
                  opacity: deletingId === a.id ? 0.6 : 1,
                }}
              >
                {deletingId === a.id ? "Excluindo..." : "Excluir"}
              </button>
            </div>
          </div>
        ))}
      </div>

      {chartAnimal && (
        <AnimalChartModal
          animal={chartAnimal}
          production={production}
          healthRecords={healthRecords}
          pesagens={pesagens}
          documentos={documentos}
          financeiro={financeiro}
          apiFetch={apiFetch}
          uploadDocumento={uploadDocumento}
          reload={reload}
          setBanner={setBanner}
          onClose={() => setChartAnimal(null)}
        />
      )}
        </>
      )}
    </div>
  );
}

// ---------------- GRÁFICO DE LACTAÇÃO POR ANIMAL ----------------
function computeROILeite(animal, production, financeiro) {
  if (animal.finalidade !== "leite" || animal.valor_compra == null) return null;
  const registros = production.filter((p) => p.animal_id === animal.id);
  if (registros.length === 0) {
    return { litros: 0, valorLeite: 0, valorCompra: Number(animal.valor_compra), saldo: -Number(animal.valor_compra), pct: 0, precoMedio: null };
  }
  const ciclos = (financeiro || []).filter((f) => f.preco_litro != null);
  const precoMedio =
    ciclos.length > 0 ? ciclos.reduce((s, f) => s + Number(f.preco_litro), 0) / ciclos.length : null;
  let litros = 0;
  let valorLeite = 0;
  registros.forEach((p) => {
    const l = Number(p.litros) || 0;
    litros += l;
    const ciclo = ciclos.find((f) => f.data <= p.data && (f.data_fim || f.data) >= p.data);
    const preco = ciclo ? Number(ciclo.preco_litro) : precoMedio;
    if (preco != null) valorLeite += l * preco;
  });
  const valorCompra = Number(animal.valor_compra);
  const saldo = valorLeite - valorCompra;
  const pct = valorCompra > 0 ? Math.min(999, (valorLeite / valorCompra) * 100) : 0;
  return { litros, valorLeite, valorCompra, saldo, pct, precoMedio };
}

function AnimalChartModal({ animal, production, healthRecords, pesagens, documentos, financeiro, apiFetch, uploadDocumento, reload, setBanner, onClose }) {
  const isLeite = (animal.finalidade || "leite") === "leite";
  const [subTab, setSubTab] = useState(isLeite ? "producao" : "peso");
  const hoje = todayISO();
  const anoAtual = hoje.slice(0, 4);
  const mesAtual = hoje.slice(0, 7);

  const registros = production
    .filter((p) => p.animal_id === animal.id)
    .sort((a, b) => (a.data < b.data ? -1 : 1));

  const totalVida = registros.reduce((s, p) => s + Number(p.litros), 0);
  const totalAno = registros.filter((p) => p.data.startsWith(anoAtual)).reduce((s, p) => s + Number(p.litros), 0);
  const totalMes = registros.filter((p) => p.data.startsWith(mesAtual)).reduce((s, p) => s + Number(p.litros), 0);

  const inicio = animal.data_inicio_lactacao || (registros[0] && registros[0].data) || hoje;

  const porDia = {};
  registros.forEach((p) => {
    porDia[p.data] = (porDia[p.data] || 0) + Number(p.litros);
  });

  const labels = [];
  const valores = [];
  let cursor = inicio;
  let totalLactacao = 0;
  let diasComProducao = 0;
  while (cursor <= hoje) {
    labels.push(cursor.slice(8, 10) + "/" + cursor.slice(5, 7));
    const v = Number((porDia[cursor] || 0).toFixed(1));
    valores.push(v);
    totalLactacao += v;
    if (v > 0) diasComProducao++;
    cursor = addDias(cursor, 1);
  }
  const mediaLactacao = diasComProducao > 0 ? (totalLactacao / diasComProducao).toFixed(1) : "0";

  const historicoAnimal = healthRecords
    .filter((h) => h.animal_id === animal.id)
    .sort((a, b) => (a.data > b.data ? -1 : 1));

  const pesagensAnimal = pesagens.filter((p) => p.animal_id === animal.id).sort((a, b) => (a.data < b.data ? -1 : 1));
  const pesoLabels = pesagensAnimal.map((p) => formatDataBR(p.data).slice(0, 5));
  const pesoValores = pesagensAnimal.map((p) => Number(p.peso));
  const pesoAtual = pesagensAnimal.length > 0 ? pesagensAnimal[pesagensAnimal.length - 1].peso : null;
  let gpd = null;
  if (pesagensAnimal.length >= 2) {
    const primeira = pesagensAnimal[0];
    const ultima = pesagensAnimal[pesagensAnimal.length - 1];
    const dias = (new Date(ultima.data) - new Date(primeira.data)) / (1000 * 60 * 60 * 24);
    if (dias > 0) gpd = (Number(ultima.peso) - Number(primeira.peso)) / dias;
  }

  const tabs = isLeite
    ? [
        { id: "producao", label: "Produção" },
        { id: "peso", label: "Peso" },
        { id: "saude", label: "Saúde e reprodução" },
        { id: "documentos", label: "Documentos" },
      ]
    : [
        { id: "peso", label: "Peso" },
        { id: "saude", label: "Saúde e reprodução" },
        { id: "documentos", label: "Documentos" },
      ];

  const documentosAnimal = documentos
    .filter((d) => d.animal_id === animal.id)
    .sort((a, b) => (a.data_validade || "9999-99-99").localeCompare(b.data_validade || "9999-99-99"));

  const [gerandoPDF, setGerandoPDF] = useState(false);

  const exportarPDF = async () => {
    setGerandoPDF(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 15;

      // Logomarca da fazenda (fundo transparente)
      try {
        doc.addImage(CAMPO_LOGO_COLOR, "PNG", 14, y, 32, 32 * (297 / 1211));
      } catch (e) {}

      doc.setFontSize(14);
      doc.setFont(undefined, "bold");
      doc.text("Campo na Mão", 50, y + 8);
      doc.setFont(undefined, "normal");
      doc.setFontSize(9);
      doc.setTextColor(120);
      doc.text("Historico do animal - gerado em " + formatDataBR(todayISO()), 50, y + 14);
      doc.setTextColor(0);
      y += 26;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 10;

      // Foto do animal (se houver)
      let textoX = 14;
      if (animal.foto_url) {
        try {
          const fotoDataUrl = await fetchImageAsDataURL(animal.foto_url);
          doc.addImage(fotoDataUrl, "JPEG", 14, y, 48, 48);
          textoX = 68;
        } catch (e) {}
      }

      const yFotoTopo = y;
      doc.setFontSize(14);
      doc.setFont(undefined, "bold");
      doc.text(animalNome(animal) + " (brinco " + animal.brinco + ")", textoX, y + 6);
      doc.setFont(undefined, "normal");
      doc.setFontSize(10);
      let yInfo = y + 14;
      doc.text("Finalidade: " + FINALIDADE_LABELS[animal.finalidade || "leite"], textoX, yInfo);
      yInfo += 6;
      if (animal.raca) {
        doc.text("Raca: " + animal.raca, textoX, yInfo);
        yInfo += 6;
      }
      if (animal.data_nascimento) {
        doc.text("Nascimento: " + formatDataBR(animal.data_nascimento), textoX, yInfo);
        yInfo += 6;
      }
      doc.text("Status: " + (STATUS_LABELS[animal.status] || animal.status), textoX, yInfo);
      yInfo += 6;

      y = Math.max(yInfo, yFotoTopo + 48) + 8;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 10;

      if (isLeite) {
        const hoje = todayISO();
        const umAnoAtras = addDias(hoje, -365);
        const registros12m = registros.filter((p) => p.data >= umAnoAtras);
        const total12m = registros12m.reduce((s, p) => s + Number(p.litros), 0);
        const mediaMensal12m = total12m / 12;

        doc.setFont(undefined, "bold");
        doc.text("Producao de leite", 14, y);
        doc.setFont(undefined, "normal");
        y += 7;
        doc.text(`Total no mes atual: ${totalMes.toFixed(1)} L`, 14, y);
        y += 6;
        doc.text(`Total no ano atual: ${totalAno.toFixed(1)} L`, 14, y);
        y += 6;
        doc.text(`Total nos ultimos 12 meses: ${total12m.toFixed(1)} L (media mensal: ${mediaMensal12m.toFixed(1)} L)`, 14, y);
        y += 6;
        doc.text(`Total vida toda: ${totalVida.toFixed(1)} L`, 14, y);
        y += 6;
        doc.text(`Media diaria (lactacao atual): ${mediaLactacao} L`, 14, y);
        y += 10;
      }

      if (pesagensAnimal.length > 0) {
        doc.setFont(undefined, "bold");
        doc.text("Peso", 14, y);
        doc.setFont(undefined, "normal");
        y += 7;
        doc.text(`Peso atual: ${pesoAtual != null ? Number(pesoAtual).toFixed(1) + " kg" : "-"}`, 14, y);
        y += 6;
        doc.text(`Ganho medio diario: ${gpd != null ? gpd.toFixed(2) + " kg/dia" : "-"}`, 14, y);
        y += 8;

        if (pesagensAnimal.length >= 2) {
          doc.setFontSize(9);
          doc.setTextColor(120);
          doc.text("Evolucao do peso (kg)", 14, y);
          doc.setTextColor(0);
          y += 4;
          desenharGraficoLinhaPDF(doc, 14, y, 182, 40, pesoValores, [216, 180, 78]);
          y += 48;
        }
      }

      if (y > 260) {
        doc.addPage();
        y = 20;
      }

      doc.setFont(undefined, "bold");
      doc.text("Historico de saude (" + historicoAnimal.length + ")", 14, y);
      doc.setFont(undefined, "normal");
      y += 8;
      if (historicoAnimal.length === 0) {
        doc.text("Nenhuma ocorrencia registrada.", 14, y);
        y += 6;
      } else {
        historicoAnimal.forEach((h) => {
          if (y > 275) {
            doc.addPage();
            y = 20;
          }
          doc.setFont(undefined, "bold");
          doc.text(formatDataBR(h.data) + " - " + h.tipo, 14, y);
          doc.setFont(undefined, "normal");
          y += 6;
          if (h.descricao) {
            const linhas = doc.splitTextToSize(h.descricao, 180);
            doc.text(linhas, 14, y);
            y += linhas.length * 5 + 2;
          }
        });
      }

      if (y > 250) {
        doc.addPage();
        y = 20;
      } else {
        y += 6;
      }

      doc.setFont(undefined, "bold");
      doc.text("Documentacao (" + documentosAnimal.length + ")", 14, y);
      doc.setFont(undefined, "normal");
      y += 8;
      if (documentosAnimal.length === 0) {
        doc.text("Nenhum documento registrado.", 14, y);
        y += 6;
      } else {
        const hojeStr = todayISO();
        documentosAnimal.forEach((d) => {
          if (y > 275) {
            doc.addPage();
            y = 20;
          }
          const vencido = d.data_validade && d.data_validade < hojeStr;
          doc.setFont(undefined, "bold");
          doc.text(DOCUMENTO_TIPO_LABELS[d.tipo] || d.tipo, 14, y);
          doc.setFont(undefined, "normal");
          y += 6;
          if (d.numero) {
            doc.text("Numero: " + d.numero, 18, y);
            y += 5;
          }
          if (d.data_emissao) {
            doc.text("Emitido em: " + formatDataBR(d.data_emissao), 18, y);
            y += 5;
          }
          if (d.data_validade) {
            if (vencido) doc.setTextColor(196, 100, 75);
            doc.text((vencido ? "VENCIDO em: " : "Valido ate: ") + formatDataBR(d.data_validade), 18, y);
            doc.setTextColor(0);
            y += 5;
          }
          y += 3;
        });
      }

      doc.save(`historico_${(animal.nome || animal.brinco).replace(/\s+/g, "_")}.pdf`);
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao gerar PDF: " + err.message });
    } finally {
      setGerandoPDF(false);
    }
  };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.6)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 60,
        padding: 16,
      }}
      onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: "#FFFFFF",
          border: "1px solid rgba(11,61,46,0.12)",
          borderRadius: 16,
          padding: 20,
          width: "100%",
          maxWidth: 480,
          maxHeight: "85vh",
          overflowY: "auto",
        }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {animal.foto_url && (
              <img
                src={animal.foto_url}
                alt={animalNome(animal)}
                style={{ width: 48, height: 48, borderRadius: 10, objectFit: "cover", flexShrink: 0 }}
              />
            )}
            <div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>
                {animalNome(animal)}
              </div>
              <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                Brinco {animal.brinco} · {FINALIDADE_LABELS[animal.finalidade || "leite"]}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
            <button
              onClick={exportarPDF}
              disabled={gerandoPDF}
              title="Exportar histórico em PDF"
              style={{
                background: "rgba(216,180,78,0.15)",
                border: "1px solid #B8862E",
                borderRadius: 8,
                padding: "6px 10px",
                color: "#B8862E",
                fontSize: 11,
                fontWeight: 600,
                cursor: gerandoPDF ? "default" : "pointer",
                opacity: gerandoPDF ? 0.6 : 1,
              }}
            >
              {gerandoPDF ? "Gerando..." : "PDF"}
            </button>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#6E7A61", cursor: "pointer" }}>
              <X size={18} />
            </button>
          </div>
        </div>

        <div style={{ display: "flex", marginBottom: 16, borderRadius: 10, background: "#F5F2E9", padding: 4 }}>
          {tabs.map((t) => (
            <button
              key={t.id}
              onClick={() => setSubTab(t.id)}
              style={{
                flex: 1,
                padding: "8px 0",
                borderRadius: 8,
                border: "none",
                fontSize: 12,
                fontWeight: 600,
                cursor: "pointer",
                background: subTab === t.id ? "#5BAA47" : "transparent",
                color: subTab === t.id ? "#F5F2E9" : "#6E7A61",
              }}
            >
              {t.label}
            </button>
          ))}
        </div>

        {subTab === "producao" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
              <div style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, fontWeight: 600, color: "#B8862E" }}>
                  {totalMes.toFixed(1)} L
                </div>
                <div style={{ fontSize: 9, color: "#6E7A61", marginTop: 2 }}>Este mês</div>
              </div>
              <div style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, fontWeight: 600, color: "#5BAA47" }}>
                  {totalAno.toFixed(1)} L
                </div>
                <div style={{ fontSize: 9, color: "#6E7A61", marginTop: 2 }}>Este ano</div>
              </div>
              <div style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, fontWeight: 600, color: "#3E7C99" }}>
                  {totalVida.toFixed(1)} L
                </div>
                <div style={{ fontSize: 9, color: "#6E7A61", marginTop: 2 }}>Vida toda</div>
              </div>
            </div>

            {(() => {
              const roi = computeROILeite(animal, production, financeiro);
              if (!roi) return null;
              const pagou = roi.saldo >= 0;
              const pctBarra = Math.min(100, roi.pct);
              return (
                <div style={{ background: "#F5F2E9", borderRadius: 10, padding: 12, marginBottom: 12, display: "flex", flexDirection: "column", gap: 6, fontSize: 13 }}>
                  <div style={{ fontSize: 11, color: "#6E7A61", fontWeight: 700, textTransform: "uppercase" }}>
                    Retorno sobre o investimento (leite)
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#6E7A61" }}>Valor da compra</span>
                    <span>R$ {roi.valorCompra.toFixed(2)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#6E7A61" }}>Leite produzido (vida toda)</span>
                    <span>{roi.litros.toFixed(1)} L</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#6E7A61" }}>Valor do leite produzido</span>
                    <span>R$ {roi.valorLeite.toFixed(2)}</span>
                  </div>
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      fontWeight: 700,
                      fontSize: 15,
                      color: pagou ? "#5BAA47" : "#B8862E",
                    }}
                  >
                    <span>{pagou ? "Lucro acumulado" : "Falta para se pagar"}</span>
                    <span>R$ {Math.abs(roi.saldo).toFixed(2)}</span>
                  </div>
                  <div style={{ marginTop: 4 }}>
                    <div style={{ height: 8, background: "#E3DCC8", borderRadius: 4, overflow: "hidden" }}>
                      <div
                        style={{
                          height: "100%",
                          width: pctBarra + "%",
                          background: pagou ? "#5BAA47" : "#B8862E",
                          borderRadius: 4,
                          transition: "width 0.4s",
                        }}
                      ></div>
                    </div>
                    <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 4, textAlign: "right" }}>
                      {roi.pct.toFixed(0)}% do investimento recuperado
                      {pagou ? " — essa vaca já se pagou!" : ""}
                    </div>
                  </div>
                  {roi.precoMedio == null && (
                    <div style={{ fontSize: 11, color: "#B5453A" }}>
                      Cadastre ao menos um ciclo no Financeiro (com preço do litro) para calcular o valor do leite.
                    </div>
                  )}
                </div>
              );
            })()}

function DocumentosTab({ animal, documentosAnimal, apiFetch, uploadDocumento, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ tipo: "registro_genealogico", numero: "", data_emissao: "", data_validade: "", observacoes: "", arquivo_url: "" });
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);

  const hoje = todayISO();

  const handleArquivo = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadDocumento(file);
      setForm((f) => ({ ...f, arquivo_url: url }));
      setBanner({ type: "success", text: "Arquivo enviado." });
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao enviar arquivo: " + err.message });
    } finally {
      setUploading(false);
    }
  };

  const submit = async (e) => {
    e.preventDefault();
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/documentos_animais`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          animal_id: animal.id,
          tipo: form.tipo,
          numero: form.numero || null,
          data_emissao: form.data_emissao || null,
          data_validade: form.data_validade || null,
          observacoes: form.observacoes || null,
          arquivo_url: form.arquivo_url || null,
        }),
      });
      setBanner({ type: "success", text: "Documento registrado." });
      setForm({ tipo: "registro_genealogico", numero: "", data_emissao: "", data_validade: "", observacoes: "", arquivo_url: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <>
      <button
        onClick={() => setShowForm((v) => !v)}
        style={{
          width: "100%",
          background: showForm ? "rgba(11,61,46,0.10)" : "#B8862E",
          border: showForm ? "1px solid rgba(11,61,46,0.18)" : "none",
          borderRadius: 8,
          padding: "10px 0",
          color: showForm ? "#1F3324" : "#F5F2E9",
          fontSize: 13,
          fontWeight: 700,
          cursor: "pointer",
          marginBottom: 12,
        }}
      >
        {showForm ? "Cancelar" : "+ Adicionar documento"}
      </button>

      {showForm && (
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Tipo de documento</span>
            <select
              value={form.tipo}
              onChange={(e) => setForm({ ...form, tipo: e.target.value })}
              style={{
                background: "#F5F2E9",
                border: "1px solid rgba(11,61,46,0.14)",
                borderRadius: 8,
                padding: "10px 12px",
                color: "#1F3324",
                fontSize: 14,
              }}
            >
              {Object.entries(DOCUMENTO_TIPO_LABELS).map(([k, label]) => (
                <option key={k} value={k}>
                  {label}
                </option>
              ))}
            </select>
          </label>
          <Field label="Número (opcional)" value={form.numero} onChange={(v) => setForm({ ...form, numero: v })} />
          <Field label="Data de emissão" type="date" value={form.data_emissao} onChange={(v) => setForm({ ...form, data_emissao: v })} />
          <Field label="Validade (se houver)" type="date" value={form.data_validade} onChange={(v) => setForm({ ...form, data_validade: v })} />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Arquivo (PDF ou foto, opcional)</span>
            <label
              style={{
                textAlign: "center",
                background: "rgba(11,61,46,0.10)",
                border: "1px solid rgba(11,61,46,0.18)",
                borderRadius: 8,
                padding: "10px 0",
                color: "#1F3324",
                fontSize: 13,
                fontWeight: 600,
                cursor: uploading ? "default" : "pointer",
                opacity: uploading ? 0.6 : 1,
              }}
            >
              {uploading ? "Enviando..." : form.arquivo_url ? "Arquivo anexado ✓" : "Escolher arquivo"}

            </label>
          </label>

          <SaveButton saving={saving} />

      )}

        <EmptyState text="Nenhum documento registrado para esse animal ainda." />

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>

                {d.observacoes && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{d.observacoes}</div>}
                {d.arquivo_url && (

                    rel="noreferrer"

          })}
        </div>
      )}
    </>
  );
}

function LineChartCanvasOnly({ labels, valores, color }) {
  const canvasRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || typeof Chart === "undefined") return;
    if (chartInstance.current) chartInstance.current.destroy();
    chartInstance.current = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            data: valores,
            borderColor: color,
            backgroundColor: color + "33",
            fill: true,
            tension: 0.3,
            pointRadius: labels.length > 30 ? 0 : 2,
            pointBackgroundColor: color,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#6E7A61", font: { size: 9 }, maxTicksLimit: 8 }, grid: { display: false } },
          y: { ticks: { color: "#6E7A61", font: { size: 10 } }, grid: { color: "rgba(11,61,46,0.10)" }, beginAtZero: true },
        },
      },
    });
    return () => {
      if (chartInstance.current) chartInstance.current.destroy();
    };
  }, [JSON.stringify(labels), JSON.stringify(valores), color]);

  return <canvas ref={canvasRef}></canvas>;
}
function ProducaoTab({ animals, production, avesLotes, avesProducao, profile, apiFetch, reload, setBanner }) {

  const temLeite = isAdmin || acessos.includes("leite");
  const temAves = isAdmin || acessos.includes("aves");
  const [subTab, setSubTab] = useState(temLeite ? "leite" : "ovos");

  const btnStyle = (active) => ({
    flex: 1,
    background: active ? "#D8B44E" : "#FFFFFF",
    color: active ? "#16241C" : "#1F3324",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 8,
    padding: "10px 0",
    fontSize: 13,
    fontWeight: 700,
    cursor: "pointer",
  });

  if (temLeite && temAves) {
    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          <button onClick={() => setSubTab("leite")} style={btnStyle(subTab === "leite")}>

  if (temAves) {

  }
  return <ProducaoLeiteSecao animals={animals} production={production} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />;
}

              background: "#FFFFFF",

function OcorrenciasSubTab({ animals, healthRecords, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ animal_id: "", data: todayISO(), tipo: "", descricao: "", medicamentos: "", veterinario: "" });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.animal_id || !form.tipo) return;
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/health_records`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify(form),
      });
      setBanner({ type: "success", text: "Ocorrência registrada." });
      setForm({ animal_id: "", data: todayISO(), tipo: "", descricao: "", medicamentos: "", veterinario: "" });
      setShowForm(false);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao registrar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const animalName = (id) => {
    const a = animals.find((x) => x.id === id);
    return a ? a.nome || `Brinco ${a.brinco}` : "Animal removido";
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form
          onSubmit={submit}
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 14,
            padding: 18,
            marginTop: 14,
            display: "flex",
            flexDirection: "column",
            gap: 12,
          }}
        >
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Animal</span>
            <select
              value={form.animal_id}
              onChange={(e) => setForm({ ...form, animal_id: e.target.value })}
              required
              style={{
                background: "#F5F2E9",
                border: "1px solid rgba(11,61,46,0.14)",
                borderRadius: 8,
                padding: "10px 12px",
                color: "#1F3324",
                fontSize: 14,
              }}
            >
              <option value="">Selecione...</option>
              {animals.map((a) => (
                <option key={a.id} value={a.id}>
                  {a.nome || `Brinco ${a.brinco}`}
                </option>
              ))}
            </select>
          </label>
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <Field label="Tipo de ocorrência" value={form.tipo} onChange={(v) => setForm({ ...form, tipo: v })} placeholder="Ex: Mastite" required />
          <Field label="Descrição" value={form.descricao} onChange={(v) => setForm({ ...form, descricao: v })} placeholder="Detalhes da ocorrência" />
          <Field label="Medicamentos" value={form.medicamentos} onChange={(v) => setForm({ ...form, medicamentos: v })} />
          <Field label="Veterinário (opcional)" value={form.veterinario} onChange={(v) => setForm({ ...form, veterinario: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {healthRecords.length === 0 && <EmptyState text="Nenhuma ocorrência registrada ainda." />}
        {healthRecords.map((h) => (
          <div
            key={h.id}
            style={{
              background: "#FFFFFF",
              border: "1px solid rgba(11,61,46,0.12)",
              borderRadius: 12,
              padding: "12px 16px",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{h.tipo}</div>
              <div style={{ fontSize: 12, color: "#6E7A61" }}>{h.data}</div>
            </div>
            <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{animalName(h.animal_id)}</div>
            {h.descricao && <div style={{ fontSize: 13, marginTop: 6 }}>{h.descricao}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}
// ---------------- VACINAÇÃO (protocolos com alerta de atraso) ----------------
function VacinacaoSubTab({ animals, healthRecords, protocolos, isAdmin, apiFetch, reload, setBanner }) {
  const [showFormProtocolo, setShowFormProtocolo] = useState(false);
  const [formProtocolo, setFormProtocolo] = useState({ nome: "", intervalo_dias: "", finalidade_aplicavel: "" });
  const [showFormAplicacao, setShowFormAplicacao] = useState(false);
  const [formAplicacao, setFormAplicacao] = useState({ animal_id: "", protocolo: "", data: todayISO() });
  const [saving, setSaving] = useState(false);

  const hoje = todayISO();
  const protocolosAtivos = protocolos.filter((p) => p.ativo);

  const pendencias = [];
  animals.forEach((a) => {
    protocolosAtivos.forEach((p) => {
      if (p.finalidade_aplicavel && p.finalidade_aplicavel !== (a.finalidade || "leite")) return;
      const aplicacoes = healthRecords
        .filter((h) => h.animal_id === a.id && h.tipo.toLowerCase() === p.nome.toLowerCase())
        .sort((x, y) => (x.data < y.data ? 1 : -1));
      const ultima = aplicacoes[0];
      if (!ultima) {
        pendencias.push({ animal: a, protocolo: p, status: "nunca", proximaData: null });
      } else {
        const proxima = addDias(ultima.data, p.intervalo_dias);
        if (proxima < hoje) {
          pendencias.push({ animal: a, protocolo: p, status: "atrasado", proximaData: proxima });
        }
      }
    });
  });
  pendencias.sort((x, y) => (x.status === "nunca" ? -1 : 1));

  const submitProtocolo = async (e) => {
    e.preventDefault();
    if (!formProtocolo.nome || !formProtocolo.intervalo_dias) return;
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/protocolos_sanitarios`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          nome: formProtocolo.nome,
          intervalo_dias: Number(formProtocolo.intervalo_dias),
          finalidade_aplicavel: formProtocolo.finalidade_aplicavel || null,
        }),
      });
      setBanner({ type: "success", text: "Protocolo criado." });
      setFormProtocolo({ nome: "", intervalo_dias: "", finalidade_aplicavel: "" });
      setShowFormProtocolo(false);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removerProtocolo = async (p) => {
    if (!window.confirm(`Excluir o protocolo "${p.nome}"?`)) return;
    try {
      await apiFetch(`/rest/v1/protocolos_sanitarios?id=eq.${p.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Protocolo excluído." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    }
  };

  const registrarAplicacao = (animalId, protocoloNome) => {
    setFormAplicacao({ animal_id: animalId, protocolo: protocoloNome, data: todayISO() });
    setShowFormAplicacao(true);
  };

  const novaAplicacaoLivre = () => {
    setFormAplicacao({ animal_id: "", protocolo: protocolosAtivos[0] ? protocolosAtivos[0].nome : "", data: todayISO() });
    setShowFormAplicacao(true);
  };

  const submitAplicacao = async (e) => {
    e.preventDefault();
    if (!formAplicacao.animal_id || !formAplicacao.protocolo) return;
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/health_records`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          animal_id: formAplicacao.animal_id,
          data: formAplicacao.data,
          tipo: formAplicacao.protocolo,
          descricao: "Aplicação de protocolo de vacinação",
        }),
      });
      setBanner({ type: "success", text: "Aplicação registrada." });
      setShowFormAplicacao(false);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao registrar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button
          onClick={novaAplicacaoLivre}
          style={{
            background: "#B8862E",
            border: "none",
            borderRadius: 8,
            padding: "8px 14px",
            color: "#F5F2E9",
            fontSize: 12,
            fontWeight: 700,
            cursor: "pointer",
          }}
        >
          + Nova aplicação
        </button>
      </div>

      {showFormAplicacao && (
        <form
          onSubmit={submitAplicacao}
          style={{ background: "#FFFFFF", border: "1px solid #B8862E", borderRadius: 14, padding: 16, marginBottom: 14, display: "flex", flexDirection: "column", gap: 10 }}
        >
          <div style={{ fontSize: 12, color: "#B8862E", fontWeight: 700, textTransform: "uppercase" }}>Registrar aplicação</div>

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Animal</span>
            <select
              value={formAplicacao.animal_id}
              onChange={(e) => setFormAplicacao({ ...formAplicacao, animal_id: e.target.value })}
              required
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Selecione...</option>
              {animals.map((a) => (
                <option key={a.id} value={a.id}>
                  {animalNome(a)}
                </option>
              ))}
            </select>
          </label>

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Protocolo / vacina</span>
            {protocolosAtivos.length > 0 ? (
              <select
                value={formAplicacao.protocolo}
                onChange={(e) => setFormAplicacao({ ...formAplicacao, protocolo: e.target.value })}
                required
                style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
              >
                <option value="">Selecione...</option>
                {protocolosAtivos.map((p) => (
                  <option key={p.id} value={p.nome}>
                    {p.nome}
                  </option>
                ))}
                <option value="__outro__">Outro (digitar)</option>
              </select>
            ) : null}
            {(protocolosAtivos.length === 0 || formAplicacao.protocolo === "__outro__") && (
              <input
                value={formAplicacao.protocolo === "__outro__" ? "" : formAplicacao.protocolo}
                onChange={(e) => setFormAplicacao({ ...formAplicacao, protocolo: e.target.value })}
                placeholder="Nome da vacina/protocolo"
                style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
              />
            )}
          </label>

          <Field label="Data da aplicação" type="date" value={formAplicacao.data} onChange={(v) => setFormAplicacao({ ...formAplicacao, data: v })} required />
          <div style={{ display: "flex", gap: 8 }}>
            <SaveButton saving={saving} />
            <button
              type="button"
              onClick={() => setShowFormAplicacao(false)}
              style={{ background: "rgba(11,61,46,0.10)", border: "1px solid rgba(11,61,46,0.18)", borderRadius: 10, padding: "11px 18px", color: "#1F3324", fontSize: 14, fontWeight: 600, cursor: "pointer" }}
            >
              Cancelar
            </button>
          </div>
        </form>
      )}

      <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>
        Pendentes ({pendencias.length})
      </div>
      {pendencias.length === 0 ? (
        <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px", fontSize: 13, color: "#6FA050", marginBottom: 16 }}>
          Tudo em dia — nenhuma vacinação pendente.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
          {pendencias.map((pd, i) => (
            <div key={i} style={{ background: "#FFFFFF", border: "1px solid #B5453A", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{animalNome(pd.animal)}</div>
                <div style={{ fontSize: 11, color: "#A83B2E", fontWeight: 700 }}>
                  {pd.status === "nunca" ? "Nunca aplicado" : "Atrasado desde " + formatDataBR(pd.proximaData)}
                </div>
              </div>
              <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{pd.protocolo.nome}</div>
              <button
                onClick={() => registrarAplicacao(pd.animal.id, pd.protocolo.nome)}
                style={{ marginTop: 8, width: "100%", background: "#5BAA47", border: "none", borderRadius: 8, padding: "8px 0", color: "#F5F2E9", fontSize: 12, fontWeight: 700, cursor: "pointer" }}
              >
                Registrar aplicação
              </button>
            </div>
          ))}
        </div>
      )}

      {isAdmin && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 700, textTransform: "uppercase" }}>Protocolos cadastrados</div>
            <IconButton onClick={() => setShowFormProtocolo((v) => !v)} active={showFormProtocolo} />
          </div>

          {showFormProtocolo && (
            <form onSubmit={submitProtocolo} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 16, marginBottom: 12, display: "flex", flexDirection: "column", gap: 10 }}>
              <Field label="Nome (ex: Febre Aftosa)" value={formProtocolo.nome} onChange={(v) => setFormProtocolo({ ...formProtocolo, nome: v })} required />
              <Field label="Repetir a cada quantos dias" type="number" value={formProtocolo.intervalo_dias} onChange={(v) => setFormProtocolo({ ...formProtocolo, intervalo_dias: v })} placeholder="Ex: 180" required />
              <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Aplicável a</span>
                <select
                  value={formProtocolo.finalidade_aplicavel}
                  onChange={(e) => setFormProtocolo({ ...formProtocolo, finalidade_aplicavel: e.target.value })}
                  style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
                >
                  <option value="">Todos os animais</option>
                  {Object.entries(FINALIDADE_LABELS).map(([k, label]) => (
                    <option key={k} value={k}>
                      Só {label}
                    </option>
                  ))}
                </select>
              </label>
              <SaveButton saving={saving} />
            </form>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {protocolos.length === 0 && <EmptyState text="Nenhum protocolo cadastrado ainda." />}
            {protocolos.map((p) => (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 10, padding: "10px 14px" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{p.nome}</div>
                  <div style={{ fontSize: 11, color: "#6E7A61" }}>
                    A cada {p.intervalo_dias} dias · {p.finalidade_aplicavel ? FINALIDADE_LABELS[p.finalidade_aplicavel] : "Todos"}
                  </div>
                </div>
                <button
                  onClick={() => removerProtocolo(p)}
                  style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                >
                  Excluir
                </button>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

        <PastagemSubTab piquetes={piquetes} ocupacoes={ocupacoes} fazendas={fazendas} isAdmin={isAdmin} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />

function ConfinamentoSubTab({ baias, lotes, tratos, ocorrencias, fazendas, isAdmin, uploadMidia, apiFetch, reload, setBanner }) {
  const [secao, setSecao] = useState("lotes");

  const pillStyle = (active) => ({
    background: active ? "#5BAA47" : "#F5F2E9",
    color: active ? "#F5F2E9" : "#6E7A61",
    border: "1px solid rgba(11,61,46,0.14)",
    borderRadius: 20,
    padding: "6px 14px",
    fontSize: 12,
    fontWeight: 700,
    cursor: "pointer",
    whiteSpace: "nowrap",
  });

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto" }}>
        {[
          ["lotes", "Lotes"],
          ["baias", "Baias"],
          ["tratos", "Tratos"],
          ["ocorrencias", "Ocorrências"],
        ].map(([id, label]) => (
          <button key={id} onClick={() => setSecao(id)} style={pillStyle(secao === id)}>
            {label}
          </button>
        ))}
      </div>

      {secao === "baias" && <BaiasSecao baias={baias} fazendas={fazendas} isAdmin={isAdmin} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
      {secao === "lotes" && <LotesSecao baias={baias} lotes={lotes} tratos={tratos} isAdmin={isAdmin} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
      {secao === "tratos" && <TratosSecao baias={baias} lotes={lotes} tratos={tratos} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
      {secao === "ocorrencias" && (
        <OcorrenciasConfinamentoSecao baias={baias} lotes={lotes} ocorrencias={ocorrencias} uploadMidia={uploadMidia} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />
      )}
    </div>
  );
}

function BaiasSecao({ baias, fazendas, isAdmin, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome: "", rua: "", linha: "", capacidade: "", fazenda_id: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

      setBanner({ type: "error", text: "Informe o nome/código da baia." });
      return;
    }
    setSaving(true);
    try {

          nome: form.nome.trim(),
          rua: form.rua || null,
          linha: form.linha || null,

        }),
      });
      setBanner({ type: "success", text: "Baia cadastrada." });
      setForm({ nome: "", rua: "", linha: "", capacidade: "", fazenda_id: "", observacoes: "" });
      setShowForm(false);
      reload();

    }
  };

  const excluir = async (b) => {

    try {
      await apiFetch(`/rest/v1/baias?id=eq.${b.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });

      reload();

      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });

          <div style={{ display: "flex", gap: 10 }}>

            <div style={{ flex: 1 }}>

          </div>
          <Field label="Capacidade (nº de animais)" type="number" value={form.capacidade} onChange={(v) => setForm({ ...form, capacidade: v })} placeholder="0" />

          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />

            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{b.nome}</div>
              <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>

            )}

        ))}
      </div>
    </div>
  );
}

function LotesSecao({ baias, lotes, tratos, isAdmin, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ baia_id: "", descricao: "", quantidade_animais: "", peso_entrada_medio: "", dieta: "", data_entrada: todayISO(), observacoes: "" });
  const [saving, setSaving] = useState(false);
  const [encerrandoId, setEncerrandoId] = useState(null);

  const lotesAbertos = lotes.filter((l) => !l.data_saida).sort((a, b) => (a.data_entrada < b.data_entrada ? 1 : -1));
  const lotesEncerrados = lotes.filter((l) => l.data_saida).sort((a, b) => (a.data_saida < b.data_saida ? 1 : -1));

  const submit = async (e) => {
    e.preventDefault();
    if (!form.baia_id) {
      setBanner({ type: "error", text: "Selecione a baia." });
      return;
    }
    if (!form.descricao.trim()) {
      setBanner({ type: "error", text: "Descreva o lote (ex: Lote 45 - Nelore)." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/lotes_confinamento`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          baia_id: form.baia_id,
          descricao: form.descricao.trim(),
          quantidade_animais: form.quantidade_animais !== "" ? Number(form.quantidade_animais) : null,
          peso_entrada_medio: form.peso_entrada_medio !== "" ? Number(form.peso_entrada_medio) : null,
          dieta: form.dieta || null,
          data_entrada: form.data_entrada,
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Lote aberto na baia." });
      setForm({ baia_id: "", descricao: "", quantidade_animais: "", peso_entrada_medio: "", dieta: "", data_entrada: todayISO(), observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const encerrar = async (lote) => {
    if (!window.confirm(`Encerrar o lote "${lote.descricao}"? A baia ficará disponível para um novo lote.`)) return;
    setEncerrandoId(lote.id);
    try {
      await apiFetch(`/rest/v1/lotes_confinamento?id=eq.${lote.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ data_saida: todayISO() }),
      });
      setBanner({ type: "success", text: "Lote encerrado." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao encerrar: " + err.message });
    } finally {
      setEncerrandoId(null);
    }
  };

  const totalTratoLote = (loteId) => tratos.filter((t) => t.lote_id === loteId).reduce((s, t) => s + Number(t.quantidade_kg || 0), 0);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Lotes em confinamento ({lotesAbertos.length} aberto(s))</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>Abrir novo lote</div>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Baia</span>
            <select
              value={form.baia_id}
              onChange={(e) => setForm({ ...form, baia_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Selecione...</option>
              {baias.map((b) => (
                <option key={b.id} value={b.id}>
                  {b.nome}
                </option>
              ))}
            </select>
          </label>
          {baias.length === 0 && <div style={{ fontSize: 12, color: "#B8862E" }}>Cadastre uma baia primeiro, na aba "Baias".</div>}
          <Field label="Descrição do lote" value={form.descricao} onChange={(v) => setForm({ ...form, descricao: v })} placeholder="Ex: Lote 45 - Nelore" required />
          <Field label="Data de entrada" type="date" value={form.data_entrada} onChange={(v) => setForm({ ...form, data_entrada: v })} required />
          <Field label="Quantidade de animais" type="number" value={form.quantidade_animais} onChange={(v) => setForm({ ...form, quantidade_animais: v })} placeholder="0" />
          <Field label="Peso médio de entrada (kg)" type="number" value={form.peso_entrada_medio} onChange={(v) => setForm({ ...form, peso_entrada_medio: v })} placeholder="0.0" />
          <Field label="Dieta" value={form.dieta} onChange={(v) => setForm({ ...form, dieta: v })} placeholder="Ex: Terminação - silagem + concentrado" />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {lotesAbertos.length === 0 && <EmptyState text="Nenhum lote aberto no momento." />}
        {lotesAbertos.map((l) => {
          const baia = baias.find((b) => b.id === l.baia_id);
          return (
            <div key={l.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{l.descricao}</div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {baia ? baia.nome : "Baia removida"} • Entrada em {formatDataBR(l.data_entrada)}
                    {l.quantidade_animais ? ` • ${l.quantidade_animais} animais` : ""}
                  </div>
                  {l.dieta && <div style={{ fontSize: 12, color: "#5BAA47", marginTop: 2 }}>Dieta: {l.dieta}</div>}
                </div>
                <Badge color="#B8862E">{totalTratoLote(l.id).toFixed(0)} kg tratados</Badge>
              </div>
              <button
                onClick={() => encerrar(l)}
                disabled={encerrandoId === l.id}
                style={{ marginTop: 10, width: "100%", background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "8px 0", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              >
                {encerrandoId === l.id ? "Encerrando..." : "Encerrar lote"}
              </button>
            </div>
          );
        })}

        {lotesEncerrados.length > 0 && (
          <>
            <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginTop: 12 }}>Encerrados recentemente</div>
            {lotesEncerrados.slice(0, 10).map((l) => {
              const baia = baias.find((b) => b.id === l.baia_id);
              return (
                <div key={l.id} style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#6E7A61" }}>
                  {l.descricao} — {baia ? baia.nome : "-"} • {formatDataBR(l.data_entrada)} a {formatDataBR(l.data_saida)}
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

function TratosSecao({ baias, lotes, tratos, apiFetch, reload, setBanner }) {
  const [form, setForm] = useState({ lote_id: "", data: todayISO(), tipo_trato: "", quantidade_kg: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const lotesAbertos = lotes.filter((l) => !l.data_saida);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.lote_id) {
      setBanner({ type: "error", text: "Selecione o lote." });
      return;
    }
    if (!form.quantidade_kg) {
      setBanner({ type: "error", text: "Informe a quantidade em kg." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/tratos_confinamento`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          lote_id: form.lote_id,
          data: form.data,
          tipo_trato: form.tipo_trato || null,
          quantidade_kg: Number(form.quantidade_kg),
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Trato lançado." });
      setForm({ lote_id: form.lote_id, data: todayISO(), tipo_trato: form.tipo_trato, quantidade_kg: "", observacoes: "" });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao lançar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const tratosDoLote = tratos.filter((t) => t.lote_id === form.lote_id).sort((a, b) => (a.data < b.data ? 1 : -1));

  return (
    <div>
      <SectionTitle>Lançar trato</SectionTitle>
      <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
        <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Lote</span>
          <select
            value={form.lote_id}
            onChange={(e) => setForm({ ...form, lote_id: e.target.value })}
            style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
          >
            <option value="">Selecione o lote...</option>
            {lotesAbertos.map((l) => {
              const baia = baias.find((b) => b.id === l.baia_id);
              return (
                <option key={l.id} value={l.id}>
                  {l.descricao} ({baia ? baia.nome : "-"})
                </option>
              );
            })}
          </select>
        </label>
        {lotesAbertos.length === 0 && <div style={{ fontSize: 12, color: "#B8862E" }}>Nenhum lote aberto. Abra um lote na aba "Lotes" primeiro.</div>}
        <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
        <Field label="Tipo de trato" value={form.tipo_trato} onChange={(v) => setForm({ ...form, tipo_trato: v })} placeholder="Ex: Silagem + concentrado" />
        <Field label="Quantidade (kg)" type="number" value={form.quantidade_kg} onChange={(v) => setForm({ ...form, quantidade_kg: v })} placeholder="0.0" required />
        <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
        <SaveButton saving={saving} />
      </form>

      {form.lote_id && (
        <div style={{ marginTop: 20 }}>
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginBottom: 8 }}>Histórico deste lote</div>
          {tratosDoLote.length === 0 && <EmptyState text="Nenhum trato lançado para este lote ainda." />}
          {tratosDoLote.map((t) => (
            <div key={t.id} style={{ display: "flex", justifyContent: "space-between", background: "#F5F2E9", borderRadius: 8, padding: "8px 12px", marginBottom: 6, fontSize: 13 }}>
              <span style={{ color: "#6E7A61" }}>
                {formatDataBR(t.data)} {t.tipo_trato ? `• ${t.tipo_trato}` : ""}
              </span>
              <span style={{ fontWeight: 600 }}>{Number(t.quantidade_kg).toFixed(1)} kg</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const TIPO_OCORRENCIA_CONF_LABELS = { sanidade: "Sanidade", comportamento: "Comportamento", estrutural: "Estrutural", outro: "Outro" };

function OcorrenciasConfinamentoSecao({ baias, lotes, ocorrencias, uploadMidia, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ lote_id: "", baia_id: "", data: todayISO(), tipo: "outro", descricao: "", midia_url: "", midia_tipo: "" });
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);

  const handleArquivo = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const { url, tipo } = await uploadMidia(file);
      setForm((f) => ({ ...f, midia_url: url, midia_tipo: tipo }));
      setBanner({ type: "success", text: "Arquivo enviado." });
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao enviar arquivo: " + err.message });
    } finally {
      setUploading(false);
    }
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.descricao.trim()) {
      setBanner({ type: "error", text: "Descreva a ocorrência." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/ocorrencias_confinamento`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          lote_id: form.lote_id || null,
          baia_id: form.baia_id || null,
          data: form.data,
          tipo: form.tipo,
          descricao: form.descricao.trim(),
          midia_url: form.midia_url || null,
          midia_tipo: form.midia_tipo || null,

      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const lotesAbertos = lotes.filter((l) => !l.data_saida);
  const ordenadas = [...ocorrencias].sort((a, b) => (a.data < b.data ? 1 : -1));

  return (

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Lote (opcional)</span>

              value={form.lote_id}

              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
