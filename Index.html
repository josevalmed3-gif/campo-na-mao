function AvesVendaAnimaisSecao({ lotes, mortalidade, vendas, compradores, apiFetch, reload, setBanner }) {
  const compradoresAves = compradores.filter((c) => (c.categorias || []).includes("aves"));
  const compradoresParaSelecao = compradoresAves.length > 0 ? compradoresAves : compradores;
  const lotesDisponiveis = lotes.filter((l) => l.status !== "encerrado");

  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({
    data: todayISO(),
    lote_id: "",
    comprador_id: "",
    quantidade: "",
    unidade_preco: "unidade",
    peso_total_kg: "",
    preco_unitario: "",
    observacoes: "",
  });
  const [saving, setSaving] = useState(false);

  const mortesLote = (loteId) => mortalidade.filter((m) => m.lote_id === loteId).reduce((s, m) => s + Number(m.quantidade || 0), 0);
  const vendidasLote = (loteId) => vendas.filter((v) => v.lote_id === loteId).reduce((s, v) => s + Number(v.quantidade || 0), 0);
  const avesDisponiveis = (lote) => Number(lote.quantidade_alojada) - mortesLote(lote.id) - vendidasLote(lote.id);

  const loteSelecionado = lotes.find((l) => l.id === form.lote_id);
  const baseCalculo = form.unidade_preco === "kg" ? Number(form.peso_total_kg) || 0 : Number(form.quantidade) || 0;
  const valorTotal = baseCalculo * (Number(form.preco_unitario) || 0);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.quantidade) {
      setBanner({ type: "error", text: "Informe a quantidade de aves vendidas." });
      return;
    }
    if (!form.preco_unitario) {
      setBanner({ type: "error", text: "Informe o preço." });
      return;
    }
    if (form.unidade_preco === "kg" && !form.peso_total_kg) {
      setBanner({ type: "error", text: "Informe o peso total vendido em kg." });
      return;
    }
    if (loteSelecionado && Number(form.quantidade) > avesDisponiveis(loteSelecionado)) {
      const confirmar = window.confirm(
        `Esse lote tem ${avesDisponiveis(loteSelecionado)} ave(s) disponível(is), mas você está lançando ${form.quantidade}. Continuar mesmo assim?`
      );
      if (!confirmar) return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/aves_vendas_animais`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          data: form.data,
          lote_id: form.lote_id || null,
          comprador_id: form.comprador_id || null,
          quantidade: Number(form.quantidade),
          unidade_preco: form.unidade_preco,
          peso_total_kg: form.peso_total_kg !== "" ? Number(form.peso_total_kg) : null,
          preco_unitario: Number(form.preco_unitario),
          valor_total: valorTotal,
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Venda de aves registrada." });
      setForm({ data: todayISO(), lote_id: "", comprador_id: "", quantidade: "", unidade_preco: "unidade", peso_total_kg: "", preco_unitario: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const marcarRecebido = async (v) => {
    try {
      await apiFetch(`/rest/v1/aves_vendas_animais?id=eq.${v.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ valor_recebido: v.valor_total, data_recebimento: todayISO() }),
      });
      setBanner({ type: "success", text: "Marcado como recebido." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro: " + err.message });
    }
  };

  const ordenadas = [...vendas].sort((a, b) => (a.data < b.data ? 1 : -1));
  const totalMes = ordenadas.filter((v) => v.data.slice(0, 7) === todayISO().slice(0, 7)).reduce((s, v) => s + Number(v.valor_total || 0), 0);
  const avesVendidasMes = ordenadas.filter((v) => v.data.slice(0, 7) === todayISO().slice(0, 7)).reduce((s, v) => s + Number(v.quantidade || 0), 0);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Venda de aves (aves vivas/abatidas)</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>
      <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 4 }}>
        Este mês: {avesVendidasMes} ave(s) • R$ {totalMes.toFixed(2)}
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Lote</span>
            <select
              value={form.lote_id}
              onChange={(e) => setForm({ ...form, lote_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Não vincular a um lote específico</option>
              {lotesDisponiveis.map((l) => (
                <option key={l.id} value={l.id}>
                  {l.nome} ({avesDisponiveis(l)} disponíveis)
                </option>
              ))}
            </select>
          </label>

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Comprador (opcional)</span>
            <select
              value={form.comprador_id}
              onChange={(e) => setForm({ ...form, comprador_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Não especificar</option>
              {compradoresParaSelecao.map((c) => (
                <option key={c.id} value={c.id}>
                  {c.nome}
                </option>
              ))}
            </select>
          </label>

          <Field label="Quantidade de aves vendidas" type="number" value={form.quantidade} onChange={(v) => setForm({ ...form, quantidade: v })} placeholder="0" required />

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Venda cobrada por</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[
                ["unidade", "Por ave"],
                ["kg", "Por kg (peso vivo/abatido)"],
              ].map(([v, label]) => (
                <button
                  key={v}
                  type="button"
                  onClick={() => setForm({ ...form, unidade_preco: v })}
                  style={{
                    flex: 1,
                    background: form.unidade_preco === v ? "#8C6A3F" : "#F5F2E9",
                    color: form.unidade_preco === v ? "#FFFFFF" : "#6E7A61",
                    border: "1px solid rgba(11,61,46,0.14)",
                    borderRadius: 8,
                    padding: "9px 0",
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: "pointer",
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
          </label>

          {form.unidade_preco === "kg" && (
            <Field label="Peso total vendido (kg)" type="number" value={form.peso_total_kg} onChange={(v) => setForm({ ...form, peso_total_kg: v })} placeholder="0.0" required />
          )}

          <Field
            label={form.unidade_preco === "kg" ? "Preço por kg (R$)" : "Preço por ave (R$)"}
            type="number"
            value={form.preco_unitario}
            onChange={(v) => setForm({ ...form, preco_unitario: v })}
            placeholder="0.00"
            required
          />

          <div style={{ fontSize: 13, color: "#8C6A3F", fontWeight: 700 }}>Valor total: R$ {valorTotal.toFixed(2)}</div>
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {ordenadas.length === 0 && <EmptyState text="Nenhuma venda de aves registrada ainda." />}
        {ordenadas.map((v) => {
          const lote = lotes.find((l) => l.id === v.lote_id);
          const comprador = compradores.find((c) => c.id === v.comprador_id);
          const recebido = Number(v.valor_recebido || 0) >= Number(v.valor_total || 0) && Number(v.valor_total || 0) > 0;
          return (
            <div key={v.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>
                    {v.quantidade} ave(s){lote ? ` • ${lote.nome}` : ""}
                  </div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {formatDataBR(v.data)}
                    {comprador ? ` • ${comprador.nome}` : ""}
                    {v.unidade_preco === "kg" && v.peso_total_kg ? ` • ${Number(v.peso_total_kg).toFixed(1)} kg` : ""}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 700, fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}>R$ {Number(v.valor_total || 0).toFixed(2)}</div>
                  <Badge color={recebido ? "#5BAA47" : "#B8862E"}>{recebido ? "Recebido" : "A receber"}</Badge>

              {!recebido && (
                <button
                  onClick={() => marcarRecebido(v)}
                  style={{ marginTop: 10, width: "100%", background: "rgba(124,154,92,0.15)", border: "1px solid #5BAA47", borderRadius: 8, padding: "8px 0", color: "#6FA050", fontSize: 12, fontWeight: 600, cursor: "pointer" }}

                  Marcar como recebido
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FazendasTab({ fazendas, animals, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ nome: "", localizacao: "", latitude: "", longitude: "" });
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [buscandoGps, setBuscandoGps] = useState(false);
  const [showTransferModal, setShowTransferModal] = useState(false);

  const startAdd = () => {
    setEditingId(null);
    setForm({ nome: "", localizacao: "", latitude: "", longitude: "" });
    setShowForm((v) => !v);
  };

  const startEdit = (f) => {
    setEditingId(f.id);
    setForm({
      nome: f.nome,
      localizacao: f.localizacao || "",
      latitude: f.latitude != null ? String(f.latitude) : "",
      longitude: f.longitude != null ? String(f.longitude) : "",
    });
    setShowForm(true);
  };

  const usarLocalizacaoAtual = () => {
    if (!navigator.geolocation) {
      setBanner({ type: "error", text: "Esse navegador não suporta localização." });
      return;
    }
    setBuscandoGps(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setForm((f) => ({
          ...f,
          latitude: pos.coords.latitude.toFixed(6),
          longitude: pos.coords.longitude.toFixed(6),
        }));
        setBuscandoGps(false);
        setBanner({ type: "success", text: "Localização atual capturada." });
      },
      (err) => {
        setBuscandoGps(false);
        setBanner({ type: "error", text: "Não foi possível obter a localização: " + err.message });
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome) return;
    setSaving(true);
    try {
      const payload = {
        nome: form.nome,
        localizacao: form.localizacao || null,
        latitude: form.latitude !== "" ? Number(form.latitude) : null,
        longitude: form.longitude !== "" ? Number(form.longitude) : null,
      };
      if (editingId) {
        await apiFetch(`/rest/v1/fazendas?id=eq.${editingId}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Fazenda atualizada." });
      } else {
        await apiFetch(`/rest/v1/fazendas`, {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Fazenda cadastrada." });
      }
      setForm({ nome: "", localizacao: "", latitude: "", longitude: "" });
      setShowForm(false);
      setEditingId(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removeFazenda = async (f) => {
    const qtdAnimais = animals.filter((a) => a.fazenda_id === f.id).length;
    const aviso =
      qtdAnimais > 0
        ? `Excluir "${f.nome}"? ${qtdAnimais} animal(is) ficarão sem fazenda vinculada (não serão excluídos).`
        : `Excluir "${f.nome}"?`;
    if (!window.confirm(aviso)) return;
    setDeletingId(f.id);
    try {
      await apiFetch(`/rest/v1/fazendas?id=eq.${f.id}`, {
        method: "DELETE",
        headers: { Prefer: "return=minimal" },
      });
      setBanner({ type: "success", text: "Fazenda excluída." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    } finally {
      setDeletingId(null);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Fazendas ({fazendas.length})</SectionTitle>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={() => setShowTransferModal(true)}
            style={{
              background: "#F5F2E9",
              border: "1px solid rgba(11,61,46,0.18)",
              borderRadius: 10,
              padding: "0 12px",
              height: 38,
              color: "#1F3324",
              fontSize: 12,
              fontWeight: 700,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            Transferir em lote
          </button>
          <IconButton onClick={startAdd} active={showForm} />
        </div>
      </div>

      {showTransferModal && (
        <TransferenciaLoteModal fazendas={fazendas} animals={animals} apiFetch={apiFetch} reload={reload} setBanner={setBanner} onClose={() => setShowTransferModal(false)} />
      )}

      {showForm && (
        <form
          onSubmit={submit}
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 14,
            padding: 18,
            marginTop: 14,
            display: "flex",
            flexDirection: "column",
            gap: 12,
          }}
        >
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
            {editingId ? "Editando fazenda" : "Nova fazenda"}
          </div>
          <Field label="Nome da fazenda" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: Fazenda Boa Vista" required />
          <Field label="Localização (opcional)" value={form.localizacao} onChange={(v) => setForm({ ...form, localizacao: v })} placeholder="Ex: Ipirá, BA" />

          <button
            type="button"
            onClick={usarLocalizacaoAtual}
            disabled={buscandoGps}
            style={{
              background: "rgba(111,168,199,0.15)",
              border: "1px solid #3E7C99",
              borderRadius: 8,
              padding: "10px 0",
              color: "#3E7C99",
              fontSize: 13,
              fontWeight: 600,
              cursor: buscandoGps ? "default" : "pointer",
              opacity: buscandoGps ? 0.6 : 1,
            }}
          >
            {buscandoGps ? "Obtendo localização..." : "📍 Usar minha localização atual"}
          </button>

          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Field label="Latitude" type="number" value={form.latitude} onChange={(v) => setForm({ ...form, latitude: v })} placeholder="-12.345678" />
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Longitude" type="number" value={form.longitude} onChange={(v) => setForm({ ...form, longitude: v })} placeholder="-38.345678" />
            </div>
          </div>

          <MiniMapPicker
            key={editingId || "novo"}
            latitude={form.latitude}
            longitude={form.longitude}
            onChange={(lat, lng) => setForm((f) => ({ ...f, latitude: lat, longitude: lng }))}
          />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {fazendas.length === 0 && <EmptyState text="Nenhuma fazenda cadastrada ainda." />}
        {fazendas.map((f) => {
          const qtd = animals.filter((a) => a.fazenda_id === f.id).length;
          return (
            <div
              key={f.id}
              style={{
                background: "#FFFFFF",
                border: "1px solid rgba(11,61,46,0.12)",
                borderRadius: 12,
                padding: "12px 16px",
              }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{f.nome}</div>
                  {f.localizacao && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{f.localizacao}</div>}
                </div>
                <Badge color="#3E7C99">{qtd} animal(is)</Badge>
              </div>

              {f.latitude != null && f.longitude != null && (
                <div style={{ marginTop: 10, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(11,61,46,0.14)" }}>
                  <iframe
                    title={"mapa-" + f.id}
                    width="100%"
                    height="140"
                    style={{ border: 0, display: "block" }}
                    src={`https://www.openstreetmap.org/export/embed.html?bbox=${Number(f.longitude) - 0.01}%2C${Number(f.latitude) - 0.01}%2C${Number(f.longitude) + 0.01}%2C${Number(f.latitude) + 0.01}&marker=${f.latitude}%2C${f.longitude}`}
                  />
                  <a
                    href={`https://www.google.com/maps?q=${f.latitude},${f.longitude}`}
                    target="_blank"
                    rel="noreferrer"
                    style={{
                      display: "block",
                      textAlign: "center",
                      fontSize: 11,
                      color: "#3E7C99",
                      padding: "6px 0",
                      background: "#F5F2E9",
                      textDecoration: "underline",
                    }}
                  >
                    Abrir no Google Maps
                  </a>
                </div>
              )}

              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button
                  onClick={() => startEdit(f)}
                  style={{
                    flex: 1,
                    background: "rgba(11,61,46,0.10)",
                    border: "1px solid rgba(11,61,46,0.18)",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#1F3324",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  Editar
                </button>
                <button
                  onClick={() => removeFazenda(f)}
                  disabled={deletingId === f.id}
                  style={{
                    flex: 1,
                    background: "rgba(196,100,75,0.15)",
                    border: "1px solid #B5453A",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#A83B2E",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: deletingId === f.id ? "default" : "pointer",
                    opacity: deletingId === f.id ? 0.6 : 1,
                  }}
                >
                  {deletingId === f.id ? "Excluindo..." : "Excluir"}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const CATEGORIA_INSUMO_LABELS = { racao: "Ração", medicamento: "Medicamento", mineral: "Mineral/Suplemento", combustivel: "Combustível", manutencao: "Manutenção", outro: "Outro" };

function InsumosSecao({ insumos, compras, apiFetch, reload, setBanner }) {
  const [secao, setSecao] = useState("compras");

  const pillStyle = (active) => ({
    background: active ? "#8C6A3F" : "#FFFFFF",
    color: active ? "#FFFFFF" : "#6E7A61",
    border: "1px solid " + (active ? "#8C6A3F" : "rgba(11,61,46,0.14)"),
    borderRadius: 20,
    padding: "6px 14px",
    fontSize: 12,
    fontWeight: 700,
    cursor: "pointer",
    whiteSpace: "nowrap",
  });

  const hoje = todayISO();
  const mesAtual = hoje.slice(0, 7);
  const comprasMes = compras.filter((c) => c.data.slice(0, 7) === mesAtual);
  const totalPorCategoria = { leite: 0, corte: 0, bezerro: 0, aves: 0, geral: 0 };
  comprasMes.forEach((c) => {
    totalPorCategoria[c.categoria_animal || "geral"] = (totalPorCategoria[c.categoria_animal || "geral"] || 0) + Number(c.valor_total || 0);
  });

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button onClick={() => setSecao("compras")} style={pillStyle(secao === "compras")}>
          Compras
        </button>
        <button onClick={() => setSecao("catalogo")} style={pillStyle(secao === "catalogo")}>
          Catálogo
        </button>
      </div>

      {secao === "compras" && (
        <>
          <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: 14, marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: "#6E7A61", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Custo de insumos este mês, por categoria</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {Object.entries(CATEGORIA_ANIMAL_LABELS).map(([k, label]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ color: CATEGORIA_ANIMAL_COLORS[k] }}>{label}</span>
                  <span style={{ fontWeight: 600 }}>R$ {totalPorCategoria[k].toFixed(2)}</span>
                </div>
              ))}
            </div>
          </div>
          <ComprasInsumoForm insumos={insumos} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
            {compras.length === 0 && <EmptyState text="Nenhuma compra de insumo registrada ainda." />}
            {compras.map((c) => {
              const insumo = insumos.find((i) => i.id === c.insumo_id);
              return (
                <div key={c.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{insumo ? insumo.nome : "Insumo removido"}</div>
                      <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                        {formatDataBR(c.data)} • {c.quantidade} {insumo?.unidade || ""} {c.fornecedor ? `• ${c.fornecedor}` : ""}
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 700 }}>R$ {Number(c.valor_total).toFixed(2)}</div>
                      <Badge color={CATEGORIA_ANIMAL_COLORS[c.categoria_animal || "geral"]}>{CATEGORIA_ANIMAL_LABELS[c.categoria_animal || "geral"]}</Badge>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {secao === "catalogo" && <CatalogoInsumosSecao insumos={insumos} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}
    </div>
  );
}

function ComprasInsumoForm({ insumos, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ insumo_id: "", data: todayISO(), quantidade: "", valor_unitario: "", fornecedor: "", categoria_animal: "geral", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const valorTotal = (Number(form.quantidade) || 0) * (Number(form.valor_unitario) || 0);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.insumo_id) {
      setBanner({ type: "error", text: "Selecione o insumo." });
      return;
    }
    if (!form.quantidade || !form.valor_unitario) {
      setBanner({ type: "error", text: "Informe quantidade e valor unitário." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/insumos_compras`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          insumo_id: form.insumo_id,
          data: form.data,
          quantidade: Number(form.quantidade),
          valor_unitario: Number(form.valor_unitario),
          fornecedor: form.fornecedor || null,
          categoria_animal: form.categoria_animal,
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Compra registrada." });
      setForm({ insumo_id: "", data: todayISO(), quantidade: "", valor_unitario: "", fornecedor: "", categoria_animal: "geral", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Compras de insumos</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Insumo</span>
            <select
              value={form.insumo_id}
              onChange={(e) => setForm({ ...form, insumo_id: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              <option value="">Selecione...</option>
              {insumos.map((i) => (
                <option key={i.id} value={i.id}>
                  {i.nome}
                </option>
              ))}
            </select>
          </label>
          {insumos.length === 0 && <div style={{ fontSize: 12, color: "#B8862E" }}>Cadastre um insumo no "Catálogo" primeiro.</div>}

          <Field label="Data" type="date" value={form.data} onChange={(v) => setForm({ ...form, data: v })} required />
          <Field label="Quantidade" type="number" value={form.quantidade} onChange={(v) => setForm({ ...form, quantidade: v })} placeholder="0" required />
          <Field label="Valor unitário (R$)" type="number" value={form.valor_unitario} onChange={(v) => setForm({ ...form, valor_unitario: v })} placeholder="0.00" required />
          <div style={{ fontSize: 13, color: "#8C6A3F", fontWeight: 700 }}>Valor total: R$ {valorTotal.toFixed(2)}</div>
          <Field label="Fornecedor (opcional)" value={form.fornecedor} onChange={(v) => setForm({ ...form, fornecedor: v })} />

          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Alocar custo para</span>
            <select
              value={form.categoria_animal}
              onChange={(e) => setForm({ ...form, categoria_animal: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              {Object.entries(CATEGORIA_ANIMAL_LABELS).map(([v, l]) => (
                <option key={v} value={v}>
                  {l}
                </option>
              ))}
            </select>
          </label>
          <div style={{ fontSize: 11, color: "#6E7A61" }}>
            Escolha a espécie/categoria que esse gasto pertence, pra aparecer certo no comparativo de custo x lucro nos Indicadores. Use "Geral" para gastos que não são de um rebanho específico.
          </div>

          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}
    </div>
  );
}

function CatalogoInsumosSecao({ insumos, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome: "", categoria: "racao", unidade: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Informe o nome do insumo." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/insumos`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ nome: form.nome.trim(), categoria: form.categoria, unidade: form.unidade || null, observacoes: form.observacoes || null }),
      });
      setBanner({ type: "success", text: "Insumo cadastrado." });
      setForm({ nome: "", categoria: "racao", unidade: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const excluir = async (i) => {
    if (!window.confirm(`Excluir o insumo "${i.nome}"?`)) return;
    try {
      await apiFetch(`/rest/v1/insumos?id=eq.${i.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Insumo excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Catálogo de insumos ({insumos.length})</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome do insumo" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Ex: Ração inicial, Vermífugo, Diesel" required />
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Categoria</span>
            <select
              value={form.categoria}
              onChange={(e) => setForm({ ...form, categoria: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              {Object.entries(CATEGORIA_INSUMO_LABELS).map(([v, l]) => (
                <option key={v} value={v}>
                  {l}
                </option>
              ))}
            </select>
          </label>
          <Field label="Unidade de medida" value={form.unidade} onChange={(v) => setForm({ ...form, unidade: v })} placeholder="Ex: kg, saco, L, un" />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {insumos.length === 0 && <EmptyState text="Nenhum insumo cadastrado ainda." />}
        {insumos.map((i) => (
          <div key={i.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{i.nome}</div>
              <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                {CATEGORIA_INSUMO_LABELS[i.categoria] || i.categoria} {i.unidade ? `• ${i.unidade}` : ""}
              </div>
            </div>
            <button onClick={() => excluir(i)} style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "6px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              Excluir
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

const TIPO_PAGAMENTO_LABELS = { salario: "Salário", diaria: "Diária", hora_extra: "Hora extra", bonus: "Bônus", vale: "Vale", outro: "Outro" };
const TIPO_FUNCIONARIO_LABELS = { mensalista: "Mensalista", diarista: "Diarista", tarefeiro: "Tarefeiro", outro: "Outro" };

function MaoDeObraSecao({ funcionarios, pagamentos, apiFetch, reload, setBanner }) {
  const [secao, setSecao] = useState("pagamentos");

  const pillStyle = (active) => ({
    background: active ? "#8C6A3F" : "#FFFFFF",
    color: active ? "#FFFFFF" : "#6E7A61",
    border: "1px solid " + (active ? "#8C6A3F" : "rgba(11,61,46,0.14)"),
    borderRadius: 20,
    padding: "6px 14px",
    fontSize: 12,
    fontWeight: 700,
    cursor: "pointer",
    whiteSpace: "nowrap",
  });

  const hoje = todayISO();
  const mesAtual = hoje.slice(0, 7);
  const pagamentosMes = pagamentos.filter((p) => p.data.slice(0, 7) === mesAtual);
  const totalPorCategoria = { leite: 0, corte: 0, bezerro: 0, aves: 0, geral: 0 };
  pagamentosMes.forEach((p) => {
    totalPorCategoria[p.categoria_animal || "geral"] = (totalPorCategoria[p.categoria_animal || "geral"] || 0) + Number(p.valor || 0);

  return (

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {Object.entries(CATEGORIA_ANIMAL_LABELS).map(([k, label]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ color: CATEGORIA_ANIMAL_COLORS[k] }}>{label}</span>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{funcionario ? funcionario.nome : "Funcionário removido"}</div>
                      <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                        {formatDataBR(p.data)} • {TIPO_PAGAMENTO_LABELS[p.tipo_pagamento] || p.tipo_pagamento}

                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 700 }}>R$ {Number(p.valor).toFixed(2)}</div>
                      <Badge color={CATEGORIA_ANIMAL_COLORS[p.categoria_animal || "geral"]}>{CATEGORIA_ANIMAL_LABELS[p.categoria_animal || "geral"]}</Badge>

      {secao === "funcionarios" && <FuncionariosSecao funcionarios={funcionarios} apiFetch={apiFetch} reload={reload} setBanner={setBanner} />}

function FuncionariosSecao({ funcionarios, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome: "", tipo: "diarista", funcao: "", valor_referencia: "", data_admissao: "", observacoes: "" });
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) {
      setBanner({ type: "error", text: "Informe o nome do funcionário." });
      return;
    }
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/funcionarios`, {
        method: "POST",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({
          nome: form.nome.trim(),
          tipo: form.tipo,
          funcao: form.funcao || null,
          valor_referencia: form.valor_referencia !== "" ? Number(form.valor_referencia) : null,
          data_admissao: form.data_admissao || null,
          ativo: true,
          observacoes: form.observacoes || null,
        }),
      });
      setBanner({ type: "success", text: "Funcionário cadastrado." });
      setForm({ nome: "", tipo: "diarista", funcao: "", valor_referencia: "", data_admissao: "", observacoes: "" });
      setShowForm(false);
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao salvar: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const alternarAtivo = async (f) => {
    try {
      await apiFetch(`/rest/v1/funcionarios?id=eq.${f.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ ativo: !f.ativo }),
      });
      setBanner({ type: "success", text: f.ativo ? "Funcionário marcado como inativo." : "Funcionário reativado." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro: " + err.message });
    }
  };

  const excluir = async (f) => {
    if (!window.confirm(`Excluir "${f.nome}"? O histórico de pagamentos dele será mantido.`)) return;
    try {
      await apiFetch(`/rest/v1/funcionarios?id=eq.${f.id}`, { method: "DELETE", headers: { Prefer: "return=minimal" } });
      setBanner({ type: "success", text: "Funcionário excluído." });
      reload();
    } catch (err) {
      setBanner({ type: "error", text: "Erro ao excluir: " + err.message });
    }
  };

  const ativos = funcionarios.filter((f) => f.ativo !== false);
  const inativos = funcionarios.filter((f) => f.ativo === false);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Funcionários ({ativos.length} ativo(s))</SectionTitle>
        <IconButton onClick={() => setShowForm((v) => !v)} active={showForm} />
      </div>

      {showForm && (
        <form onSubmit={submit} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: 18, marginTop: 14, display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Nome" value={form.nome} onChange={(v) => setForm({ ...form, nome: v })} placeholder="Nome completo" required />
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>Tipo</span>
            <select
              value={form.tipo}
              onChange={(e) => setForm({ ...form, tipo: e.target.value })}
              style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
            >
              {Object.entries(TIPO_FUNCIONARIO_LABELS).map(([v, l]) => (
                <option key={v} value={v}>
                  {l}
                </option>
              ))}
            </select>
          </label>
          <Field label="Função" value={form.funcao} onChange={(v) => setForm({ ...form, funcao: v })} placeholder="Ex: Ordenhador, Vaqueiro, Tratador" />
          <Field
            label="Valor de referência (R$) - salário ou diária"
            type="number"
            value={form.valor_referencia}
            onChange={(v) => setForm({ ...form, valor_referencia: v })}
            placeholder="0.00"
          />
          <Field label="Data de admissão" type="date" value={form.data_admissao} onChange={(v) => setForm({ ...form, data_admissao: v })} />
          <Field label="Observações" value={form.observacoes} onChange={(v) => setForm({ ...form, observacoes: v })} />
          <SaveButton saving={saving} />
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {ativos.length === 0 && <EmptyState text="Nenhum funcionário cadastrado ainda." />}
        {ativos.map((f) => (
          <div key={f.id} style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 12, padding: "12px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{f.nome}</div>
                <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                  {TIPO_FUNCIONARIO_LABELS[f.tipo] || f.tipo} {f.funcao ? `• ${f.funcao}` : ""}
                  {f.valor_referencia != null ? ` • R$ ${Number(f.valor_referencia).toFixed(2)}` : ""}
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button
                onClick={() => alternarAtivo(f)}
                style={{ flex: 1, background: "rgba(184,134,46,0.12)", border: "1px solid #B8862E", borderRadius: 8, padding: "8px 0", color: "#8C6A3F", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              >
                Marcar inativo
              </button>
              <button
                onClick={() => excluir(f)}
                style={{ background: "rgba(196,100,75,0.15)", border: "1px solid #B5453A", borderRadius: 8, padding: "8px 10px", color: "#A83B2E", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              >
                Excluir
              </button>
            </div>
          </div>
        ))}

        {inativos.length > 0 && (
          <>
            <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase", marginTop: 12 }}>Inativos</div>
            {inativos.map((f) => (
              <div key={f.id} style={{ background: "#F5F2E9", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "#6E7A61" }}>
                <span>{f.nome}</span>
                <button onClick={() => alternarAtivo(f)} style={{ background: "none", border: "none", color: "#5BAA47", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  Reativar
                </button>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function CicloLeiteSecao({ financeiro, entregas, production, apiFetch, reload, setBanner }) {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ ...EMPTY_FINANCEIRO_FORM, data: todayISO(), data_fim: todayISO() });
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  const hoje = todayISO();
  const mesAtual = hoje.slice(0, 7);

  const doMes = financeiro.filter((f) => f.data.startsWith(mesAtual));
  const litrosMes = doMes.reduce((s, f) => s + Number(f.litros_entregues), 0);
  const receitaMes = doMes.reduce((s, f) => s + Number(f.valor_total), 0);
  const recebidoMes = doMes.reduce((s, f) => s + Number(f.valor_recebido || 0), 0);
  const pendenteMes = receitaMes - recebidoMes;

  const producaoTotalMes = production.filter((p) => p.data.startsWith(mesAtual)).reduce((s, p) => s + Number(p.litros), 0);

  const somarEntregasDoPeriodo = () => {
    if (!form.data || !form.data_fim) {
      setBanner({ type: "error", text: "Preencha as duas datas do período primeiro." });
      return;
    }
    const total = entregas
      .filter((e) => e.data >= form.data && e.data <= form.data_fim)
      .reduce((s, e) => s + Number(e.litros_entregues), 0);
    setForm((f) => ({ ...f, litros_entregues: total.toFixed(2) }));
    setBanner({ type: "success", text: `Somado: ${total.toFixed(2)} L entregues nesse período.` });
  };

  const usarCicloPrimeiraQuinzena = () => {
    const ano = hoje.slice(0, 4);
    const mes = hoje.slice(5, 7);
    setForm((f) => ({ ...f, data: `${ano}-${mes}-01`, data_fim: `${ano}-${mes}-15` }));
  };

  const usarCicloSegundaQuinzena = () => {
    const ano = Number(hoje.slice(0, 4));
    const mes = Number(hoje.slice(5, 7));
    const ultimoDia = new Date(ano, mes, 0).getDate();
    const mesStr = String(mes).padStart(2, "0");
    setForm((f) => ({ ...f, data: `${ano}-${mesStr}-16`, data_fim: `${ano}-${mesStr}-${ultimoDia}` }));
  };

  const startAdd = () => {
    setEditingId(null);
    setForm({ ...EMPTY_FINANCEIRO_FORM, data: todayISO(), data_fim: todayISO() });
    setShowForm((v) => !v);
  };

  const startEdit = (f) => {
    setEditingId(f.id);
    setForm({
      data: f.data,
      data_fim: f.data_fim || f.data,
      litros_entregues: String(f.litros_entregues),
      preco_litro: String(f.preco_litro),
      valor_recebido: f.valor_recebido != null ? String(f.valor_recebido) : "",
      data_recebimento: f.data_recebimento || "",
      observacoes: f.observacoes || "",
    });
    setShowForm(true);
  };

  const cancelForm = () => {
    setShowForm(false);
    setEditingId(null);
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!form.data || !form.data_fim || !form.litros_entregues || !form.preco_litro) return;
    setSaving(true);
    try {
      const payload = {
        data: form.data,
        data_fim: form.data_fim,
        litros_entregues: Number(form.litros_entregues),
        preco_litro: Number(form.preco_litro),
        valor_recebido: form.valor_recebido !== "" ? Number(form.valor_recebido) : 0,
        data_recebimento: form.data_recebimento || null,
        observacoes: form.observacoes || null,
      };
      if (editingId) {
        await apiFetch(`/rest/v1/financeiro?id=eq.${editingId}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Registro atualizado." });
      } else {
        await apiFetch(`/rest/v1/financeiro`, {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(payload),
        });
        setBanner({ type: "success", text: "Ciclo registrado." });
      }
      setForm({ ...EMPTY_FINANCEIRO_FORM, data: todayISO(), data_fim: todayISO() });
      setShowForm(false);
      setEditingId(null);
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao salvar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const marcarComoPago = async (f) => {
    setSaving(true);
    try {
      await apiFetch(`/rest/v1/financeiro?id=eq.${f.id}`, {
        method: "PATCH",
        headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ valor_recebido: Number(f.valor_total), data_recebimento: todayISO() }),
      });
      setBanner({ type: "success", text: "Marcado como pago." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao atualizar: " + e.message });
    } finally {
      setSaving(false);
    }
  };

  const removeEntrega = async (f) => {
    const confirmar = window.confirm(`Excluir o registro de ${formatDataBR(f.data)}? Essa ação não pode ser desfeita.`);
    if (!confirmar) return;
    setDeletingId(f.id);
    try {
      await apiFetch(`/rest/v1/financeiro?id=eq.${f.id}`, {
        method: "DELETE",
        headers: { Prefer: "return=minimal" },
      });
      setBanner({ type: "success", text: "Registro excluído." });
      reload();
    } catch (e) {
      setBanner({ type: "error", text: "Erro ao excluir: " + e.message });
    } finally {
      setDeletingId(null);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionTitle>Financeiro</SectionTitle>
        <IconButton onClick={startAdd} active={showForm} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 16 }}>
        <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: "14px 16px" }}>

          <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 4 }}>Recebido</div>
        </div>
        <div style={{ background: "#FFFFFF", border: "1px solid rgba(11,61,46,0.12)", borderRadius: 14, padding: "14px 16px" }}>

          </div>
          <div style={{ fontSize: 11, color: "#6E7A61", marginTop: 4 }}>Pendente</div>
        </div>

      {producaoTotalMes > 0 && litrosMes > 0 && Math.abs(producaoTotalMes - litrosMes) > 0.5 && (
        <div
          style={{
            marginTop: 12,
            fontSize: 12,
            color: "#B8862E",
            background: "rgba(216,180,78,0.1)",
            border: "1px solid #B8862E",
            borderRadius: 10,
            padding: "8px 12px",
          }}
        >
          Produção total lançada no mês: {producaoTotalMes.toFixed(1)} L — diferença de{" "}
          {(producaoTotalMes - litrosMes).toFixed(1)} L em relação ao entregue (consumo, perdas, etc.)
        </div>
      )}

      {showForm && (
        <form
          onSubmit={submit}
          style={{
            background: "#FFFFFF",
            border: "1px solid rgba(11,61,46,0.12)",
            borderRadius: 14,
            padding: 18,
            marginTop: 14,
            display: "flex",
            flexDirection: "column",
            gap: 12,
          }}
        >
          <div style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600, textTransform: "uppercase" }}>
            {editingId ? "Editando ciclo" : "Novo ciclo de pagamento"}

          <div style={{ display: "flex", gap: 8 }}>
            <button
              type="button"
              onClick={usarCicloPrimeiraQuinzena}
              style={{
                flex: 1,
                background: "rgba(11,61,46,0.10)",
                border: "1px solid rgba(11,61,46,0.18)",
                borderRadius: 8,
                padding: "8px 0",
                color: "#1F3324",
                fontSize: 11,
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              Dia 1 a 15
            </button>
            <button
              type="button"
              onClick={usarCicloSegundaQuinzena}
              style={{
                flex: 1,
                background: "rgba(11,61,46,0.10)",
                border: "1px solid rgba(11,61,46,0.18)",

                padding: "8px 0",
                color: "#1F3324",

                fontWeight: 600,
                cursor: "pointer",

          <div style={{ display: "flex", gap: 8 }}>

            <div style={{ flex: 1 }}>

            <button

            <div style={{ fontSize: 13, color: "#B8862E", fontWeight: 600 }}>
              Valor total: R$ {(Number(form.litros_entregues) * Number(form.preco_litro)).toFixed(2)}
            </div>
          )}
          <Field
            label="Valor já recebido (R$, opcional)"
            type="number"
            value={form.valor_recebido}
            onChange={(v) => setForm({ ...form, valor_recebido: v })}
            placeholder="0.00"
          />
          <Field
            label="Data do recebimento (opcional)"
            type="date"
            value={form.data_recebimento}
            onChange={(v) => setForm({ ...form, data_recebimento: v })}
          />
          <Field
            label="Observações (opcional)"
            value={form.observacoes}
            onChange={(v) => setForm({ ...form, observacoes: v })}
            placeholder="Ex: nome do comprador, nota fiscal..."
          />
          <div style={{ display: "flex", gap: 8 }}>
            <SaveButton saving={saving} />
            <button
              type="button"
              onClick={cancelForm}
              style={{
                background: "rgba(11,61,46,0.10)",
                border: "1px solid rgba(11,61,46,0.18)",
                borderRadius: 10,
                padding: "11px 18px",
                color: "#1F3324",
                fontSize: 14,
                fontWeight: 600,
                cursor: "pointer",
              }}

              Cancelar
            </button>
          </div>
        </form>
      )}

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        {financeiro.length === 0 && <EmptyState text="Nenhuma entrega registrada ainda." />}
        {financeiro.map((f) => {
          const pago = Number(f.valor_recebido || 0) >= Number(f.valor_total) - 0.01;
          return (
            <div
              key={f.id}
              style={{
                background: "#FFFFFF",
                border: "1px solid rgba(11,61,46,0.12)",
                borderRadius: 12,
                padding: "12px 16px",
              }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>
                    {f.data_fim && f.data_fim !== f.data
                      ? `${formatDataBR(f.data)} a ${formatDataBR(f.data_fim)}`
                      : formatDataBR(f.data)}
                  </div>
                  <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>
                    {Number(f.litros_entregues).toFixed(1)} L × R$ {Number(f.preco_litro).toFixed(2)}
                  </div>
                  {f.observacoes && <div style={{ fontSize: 12, color: "#6E7A61", marginTop: 2 }}>{f.observacoes}</div>}

                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, color: "#B8862E", fontSize: 15 }}>

                  <button
                    onClick={() => marcarComoPago(f)}

                      flex: 1,
                      background: "rgba(124,154,92,0.15)",
                      border: "1px solid #5BAA47",
                      borderRadius: 8,
                      padding: "8px 0",
                      color: "#6FA050",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: "pointer",

                    Marcar como pago

                )}
                <button
                  onClick={() => startEdit(f)}

                    flex: 1,
                    background: "rgba(11,61,46,0.10)",
                    border: "1px solid rgba(11,61,46,0.18)",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#1F3324",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  Editar
                </button>
                <button
                  onClick={() => removeEntrega(f)}
                  disabled={deletingId === f.id}
                  style={{
                    flex: 1,
                    background: "rgba(196,100,75,0.15)",
                    border: "1px solid #B5453A",
                    borderRadius: 8,
                    padding: "8px 0",
                    color: "#A83B2E",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: deletingId === f.id ? "default" : "pointer",
                    opacity: deletingId === f.id ? 0.6 : 1,

                >
                  {deletingId === f.id ? "Excluindo..." : "Excluir"}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------- MÁQUINAS ----------------
const TIPOS_MAQUINA = [
  ["retroescavadeira", "Retroescavadeira"],
  ["carreta", "Carreta"],
  ["trator", "Trator"],
  ["caminhao", "Caminhão"],
  ["outro", "Outro"],
];

const MEDIDOR_TIPOS = [
  ["horimetro", "Horímetro (h)"],
  ["km", "Quilometragem (km)"],
  ["nenhum", "Sem medidor"],
];

function medidorUnidade(medidor) {
  if (medidor === "horimetro") return "h";
  if (medidor === "km") return "km";
  return "";
}

function SelectField({ label, value, onChange, options, placeholder }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <span style={{ fontSize: 12, color: "#6E7A61", fontWeight: 600 }}>{label}</span>
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        style={{ background: "#F5F2E9", border: "1px solid rgba(11,61,46,0.14)", borderRadius: 8, padding: "10px 12px", color: "#1F3324", fontSize: 14 }}
      >
        {placeholder && <option value="">{placeholder}</option>}
        {options.map(([id, label2]) => (
          <option key={id} value={id}>
            {label2}
          </option>
        ))}
      </select>
    </label>
  );
}

      )}

      )}
